body:
  text: 廣陵集卷十三宋王令撰夜歸沖沖行路自多岐已踏歸途尚慮非夜犬只知人是盜不知人亦夜來歸口占示姊盎竭囊空且笑歌更從吾命聼如何不須直有牛羊樂只以無求冨自多姊答無求子樂我何悲且與兒曹并日飢子道合人終不苟有求雖欲可從誰和孫莘老將赴太平先生素志已形詩弟子何妨鼓瑟希時若伊周方有任命如孔孟可無歸要終四海乘槎去髙謝西山食粟非此道難言身未果且當從世共依違又紛紛世俗競朱金仕道人人説直尋但以一官求飬志豈于千古有遺心嗜偏羊棗情何甚戲及牛刀意自深何日山林遂歸計南風進講五絃琴露筋貞女廟待夫以死如知命信已輕生可謂貞指原為愚今尚衆莫言吾志不難行淹淹淹淹輕雲弄落暉壞簷巢滿燕來歸小園桃李東風後却看楊花自在飛寄聱隅先生黃晞王朝簮笏擁天扉肯以經綸假布衣老信蒼生終有命窮憂當世益思歸一身誰作千年望兩眼空看萬事非聞説韋編日開閲可應三復嘆知幾春愁只聞來客説春逰不遂花前笑自留浪説春期計春盡留春無術只春愁少年答春愁花枝裊裊笑當觴且作春風幾日狂縱使春歸猶有酒酒酣春去亦何傷和朱元弼春逰閉門無著只踈慵謾出留連與衆同栁却有情愁落日花惟能笑謝東風恨無日到三春外盡看人狂六極中泛泛相逄且相笑久將吾道付窮通春日提壺聒聒惟呼酒杜宇喧喧只説歸坐怪鳥聲皆有取靜于人事益知非巳嫌世濁胡為混能待河清固巳稀為語夷齊既甘餓可能分我首陽薇對花憂愁卒卒人無樂花草紛紛物又春安得無憂與無慮對花還作笑歌人靡靡源源世俗尚依違靡靡風流日正微吾病未能終是是人言何似喜非非况當天下難能地欲撥憸人未發機要格君心是知術不然應合買山歸觀水細如蝦影足留連大可蛟鯨出自然當使川流應到海只今坎止亦成淵民憂不見堯咨日地礙何由禹鑿穿可惜卧龍無意思不隨雲去雨春一本作秋田讀孟子去梁無故又辭齊弟子紛紛益不知天下未平雖我事巳身巳枉更何為後來誰是聞風者當世何嘗不召師士要自髙無顧世遺編今亦有人疑鸛毛羽人將鶴品流斜陽髙處自遲留人言殺爾三年旱應是巢成更不憂寄朱元弼春城春雨緑春潭冉冉一本作刻刻歸舟上去帆愛子有詩留我别悔豫無酒伴君銜東風隨卷行人袖落日猶明去客衫好有新詩寄幽寂我心一本作孤懷無泊似搖􅀈春逰春城兒女縱春逰醉倚層臺笑上樓滿眼落花多少意若何無箇解春愁龍池二絶滿目塵埃白日隂皇天無命且深沉終當力卷滄溟水來作人間十日霖又盡道神龍此有靈一池澄靜暮痕清如何蟠屈無飛志却放鳴蛙有怒聲月蝕盧同不作昌黎死天目雖盲未一本作孰見嗟坐嘆一本作睨清光無惜處一將吞吐聼蝦蟆偶成種花紅不實俗客醉仍喧拔去樹加榖日無人過門偶感壯志老來退窮愁無易攻風雲詩氣焰天地醉心胸午枕著不覺晝門關更慵由來自踈拙底處不相容寄滿子權西北風吹數紙詩神門樞鑰鬼關機九原黃土英靈活萬古青天霹靂飛我是懦夫無壯志近思依日竊餘輝髙樓暮插暗空助東望君心看翅歸寄洪與權劒氣寒髙倚暮空男兒日月鎖心胸莫藏牙爪同癡虎好召風雷起卧龍舊説王侯無世種古嘗冨貴及耕傭須將大道為竒遇莫踏人間齷齪蹤上聱隅先生夫子儒門傑心誠行亦醇玉金精粹美椒桂性芬辛一入隨邦計咸期利國賔生民待儒效天意屬人倫蜀犬爭驚日鄒人不識麟窮途千古泪白髮四方塵弊世誰思救仁賢自合振愛狙徒食費好鶴浪軒馴不結臨川網偷安厝火薪忠言驚苦逆恬議貴因循漆軌書三上清時死九濵不思防蟻壤徒欲衛龍鱗當道豺狼愎升堂犬馬嚚旱餘雲不雨命塞器藏身獨抱遺經老來為後進陳手提三聖出口壓九師堙衆耳雷霆震羣觀日月新韋編重一本作垂斷絶文席互酬詢魯變全歸道陳糧絶更貧賤生無自幸俗繫弗容親盆覆徒經日龜埋不仗人短詩徒自訟巳伏下斯民春晚雨後東風柔弱事春權劇雨無端轉愴然不惜好花都委地却令逺草直平天龍蛇久蟄應思奮蛙蟈一本作蠙乘時巳自先緑栁由來却堪笑葉眉愁劇遂長眠良農良農手足胝老賈不親犂歉嵗粳糟絶髙門犬馬肥天心不冝咎人理自誰尸安得悠悠者來同豫一悲瓊花無雙亭下枝密密復稀稀蚌碎珠駢出鬚牽蝶合圍會須珍作寶常恐散成飛况是東風後一本作暮遊人莫易歸夜深吟叩几悲歌涕滿襟聖賢千古我如今凍琴絃斷燈青暈誰會男兒半夜心和合春雪莫嘆年來雪句遲雪遲詩句更依微風來海國鹽波涸春入仙田玉氣肥雛鶴暖嬌搖羽脫老龍枯癢退鱗飛天工人代如端的安得吾能及九畿紙鳶誰作輕鳶壯逺觀似嫌飛鳥未多端才乘一線慿風去便有愚兒仰面看未必碧霄因可到偶能終日遂為安扶搖不起滄溟逺笑殺鵬搏似爾難贈别晏樊父太祝縮伏蒿萊聼命沉舊房孤劒鐵塵侵方思力舉滄溟水潑殺生平氣焰心不謂偶君誇意氣無端起我舊胸襟男兒合是公侯器未忍風前墮泪吟和洪與權溝中老弱轉流尸夫不容妻母棄兒常得民愚猶是幸不然死等更何為布衣空有蒿萊泪肉食方多妾馬思君也天心省民數未知死所又何辭題天長縣蘇太尉廟唐室無臣覆手移坐看悍媪制庸兒思量可惜當年死却是西來問鼎師春雪有感呈王正叔束徽之彼雪晚何淫乘時橫此臨必將滋及物自合大為霖也道春來好何餘臘後隂冬冥誠不道蒼帝亦何心俗口誇同粉愚觀謂似琳獨于平處薄不似險中深逆吹爭為力凌寒苦助一本作坐見侵落疑天未悟壓恐地難任蟄户開重墐氷魚上復沉欲開花謾妬垂死草奚禁短韻徒堪嘆慿君附入琴古鑑一片靈光合有神不知鎔鑄更何人春耕破塜衣冠盡鬼手摩天日月新鑒面祗知西子姣照心難見比干真主人深有收藏意當待清明不受塵代人送常州致仕張待制心貪進退適全冝上印飛書劇去翬荐口不加張耒老明朝竟放孔戣歸黃堂合有遺思在青史還留後世稀此去江湖見鷗鳥為言今合信無機代人送常州張卿挂冠清優四皓官瀟灑二疏顔直道空華髮明時獨買山如聞元老議尚恐軟輪還誰是塵埃者清風合自攀謝束丈卓鄭簪裾密作林相如貧病強來臨藜羮才飽無他志肉食俄充有愧心死馬偶能逄市骨濫竽常恐負知音古來一飯皆論報何日王孫遂有金和束熙之雨後獵獵風吹雨氣腥誰翻碧海踏天傾如何農畯三時望只得官蛙一處鳴何處斷虹殘冷落有時斜照暫分明當車收轍雲藏迹依舊晴空萬里平寄衡父滿翁甲午十六隻卓來篇不許雙社壇髙處立旌幢自知孤敵難為勝欲豎長幡一面降須學依墻勤哭楚莫同伏弩助收龎何時王子歸重搦笑倒秋醪瀲灔缸幽居感懷寄滿子權乙未夏卜得幽居四絶鄰尋常庭巷斷蹄輪門前犬豕卧橫道城上牛羊下視人滿眼夕陽間草樹回頭歸路正埃塵思君未有東來計何日雙眉對面伸廣陵集卷十三
