  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_009-1a, image: WYG1106/WYG1106-0437c.png}
body:
  text: 廣陵集巻九宋王令撰贈廬山老居訥訥公匡廬老詩句整以雅標韻樂天淳不肯外禮假所居遠城市絶俗就閒暇崗崖道路惡亦為佳客下余雖昔所聞相見今乃乍愛其語言好超絶忽世跨馬舁就其居燈火共清夜惜不見其壯巳老吁可訝髙才可施用售世嗟無價臨别更何論共是忘言者一本作共是相忘者旅次寄寳覺訥師小雨破宿暑曉風忽焉遒山深樹翳陰蜩蚻應已秋清坐想髙絶語言誰應酬豈不念一徃抱病終自留覊旅少徃還有来或非儔命僕一謝之縱我冠屨休移牀上髙堂解書散牀頭於此有嘉興念世誰與謀獨思山林人一本作林下人兹意可綢繆何當買田廬共遂丘壑游寄吕惠卿吉甫兼簡林伯通吕詩附踆踆門外馬客至知謂一本作為誰昔靣尚未逢那論心相知揖客拜上堂一本作拜客揖上堂謝客辱弗遺寒暑相問酬唯諾坐無為靜黙近尤遠多言足瑕玼勉從客所論還顧所學非念此廢無益對書坐長嘻一本作為此嘆無益廢書坐長嘻獨思同懐子念遠莫見之豈無寄我書嵗晩若苦遲聞頗困王事豈無閒暇時况有同僚賢相期在書詩人生天地間常恐食所縻去就兩莫謀㑹合寜有期余病不自樂舊學益以隳一本作日益隳近者非所同遠者勞夢思江水日夕東道途宛而夷寄書當在勤一本作寄遠當日勤無謂徃還稀答逢原吕惠卿晨在趨長司跪坐與之言偶然脱齟齬相送顔色温歸舍未休鞍簿書隨滿門相仍賔客過欹午僅朝餐平生性懶惰應接非吾真况乃重戕賊良氣能幾存就夜甫得息閲我几上文開巻未及讀睡思巳昏昏自知小人歸昭昭復何云每於清夜夢多見夫子魂側耳聼髙議如飲黄金罇覺来不得徃欲飛無羽翰昨日得子詩我心子先論怪我詩一本作書苦遲友道宜所敦豈不旦夕思實苦案牘煩豈無同官賢未免走與奔相見鞅掌間有言無暇陳嗟嗟兹世士無食同所患念我力難任聞子謀更艱乆知為之天安能怨寠貧吾聞君子仕行義而巳焉亦將逹吾義豈遂為利牽東海有滄溟西極有崑崙古来到者誰不過數子尊子巳具車航吾亦為檝輪欲一從子游不知何時然寄崔伯易擾擾閭巷士過我何所為屢来徒我煩不来我弗思少年樂知聞喜與客子隨晩歲事恬黙與世益參差騎馬出尋人中路輒自歸歸来亦何樂書史自相期巳與徃者親可無兹世違欲語無所得起視北鴈飛念子遠千里昔别今巳期寄聲雖云多所得竟亦稀近者忽報書期我徃就之不知予苦窮繫此不可離尚廹朝暮憂寜有道路資人生少所同老去財幾時予勢既若此子復不肯来但恐百年間齟齬終其齊詩以一本作僅寄子招亦以冩我悲寄孫莘老黙黙不自得勞勞非吾任不與君子逢誰復明此心偶客来自南口有千里音知無木索勤頗復山水吟對之為一笑欣如獲千金宣城風物佳古語昔巳忱太平又其有道途邈幽深溪流𣺌彎環山勢屹抱臨况復寂寞人黄綬事陸沉公田秫既收客席酒屢斟悔予昔南浮不徃一就尋波濤忘日月疾病廢古今歸来就覊銜外慮日巳侵適時愧非才對客輒自瘖譬如火炙膚一本作炙肌暫忍乆莫禁惟思一本作致百畝田為可足釡鬵投身脱世箝歛足蹈古箴寄言所一本作我同懐相期在中林夏日平居奉寄崔伯易兼簡朱元弼天風變春和晝日差夏永門䦨一本作庭閉無事燕雀志益靜紛翻詩書帙棄散懶收整時来就枕卧復可取窺省心恬逐物閒迹濶與世屏鮮鮮南山煖秀色在脩􅳠一本作穎苟嫌一本作逃安坐慵還可一本作與遠遊騁自縁智能薄反得閑暇幸交朋乆相逺疎懶欲誰警憮憮庭下樹隂影日已敷癯癯閉門人簟席自巻舒髙枝就逺冠曲枝掛裳裾一本作襦還來從此息卧視詩與書桓桓門外客從徒駕驪駒不知來何聞一本作為乃肯顧我閭呼兒往應門謂言出在塗非我敢厭客非客與我疎以予拙語言無以得客娛一不當客意恐與世患俱不如兩相忘何能效紛如效古流沙不勝車弱水不載舟謂言行子歸無苦事逺遊寄子素絲裳聞子衣苦單失今不来還歲晩將奈寒送朱明之昌叔赴尉山陽朱使拜書天上回志以身試百里障青衫飄若風外荷借馬載出塵土上凖眉嶄如見天秀獨立繫馬萬里望身軀雖小胷腹寛沛如絶海横秋漲乆宜脱絶事髙致豈願卑冗勞俗狀髙堂華髪親老矣四海無家寄几杖世外言髙信獨竒人前腰折嗟已强尉官雖小俸雖薄猶有餘錢買甘養想當家帷奉顔靣綵衣躬一本作身率婦子餉詵詵兒女戲滿前累累諸兄坐相向人間此樂不可幸一笑自足百辱當時清固應稀盗賊俗弊寜不煩笞掠好偷閒暇事簡編思予一本作我寜無尺字况學子𤨏𤨏来學子從我問古風謂一本作吾言古之人學不求世功以其明智餘施與天下同能知學為身自不恤窮通童子顧我笑是言得無䝉斯道使可遵曽不聞父翁謂言童子歸益自謀厥躬吾不能爾言亦不必爾從吾不能爾言一本作吾能為爾言出門出門將何從中道忽自思彼懐與爾殊亦合念子歸樂有詩與書遊有山與陂誰言竟無從猶有影自隨雜詩一云古人古人重非道飢不苟豆羮有為非其心或不脱冕行如何後世人以官業其生鄙哉樂欺人猶以聖自名寄滿子權昔心何悠悠今學益漫漫莽如浮江河一本作滄海浩不際崖㟁生雖樂文字勤不償几案重編空堆塵折簡乆枯汗徒知陳市肆表列環四畔巳無探討勤胡可賢否按零丁晩觀𤣥泯滅舊習彖得指来歲期失忘去日筭嘗聞勤惰間巳是愚智判䝉羞欲何顔避恥愧無翰不能繩已怠何力禁人叛文章觸世嫌議語限客竄時牽好惡卑俗撓是非亂早衰奪舊剛多病襲新懦心經衣食艱事廢米鹽半何謀脱身去割迹與俗斷耕荒食新收鑿窒復舊貫念生如冬冰至死僅春泮其間能幾時何恃苦自緩翩翩淮南英顯顯士林冠方手未為辱游子昔同閈篇章覿新華論説聼横捍包竒晩自走去實王府玩近書何相撩頗以名見謾不知老者拙棄此乆巳斷决斷之斷子方勇自樹解轡縱新駻行期拾春青采綴綰歸腕乖一本作暌離思舊歡遷徙就新絆無琴雖自歌有酒欲誰伴閒暇當寄詩持此資賀換梅花風吹冬暖變春暖江梅艶艶横新枝經年不逢間何乆忽此相遇如有期初開珊珊尚寂寞仙人綴佩懸瑶一本作珠璣後日重来不可辨漫漫月樹留寒輝清香芬敷志何逺可惜不使蝶得知遊人爭至無日夜對之但笑果喜誰不知春工用何術摶造萬物皆可為得非各使出所巧約與鬭競合一時不然裁剪未易給鞭役衆鬼寜不噫終年成功財幾日旋亦墮壊良可悲傳聞昔時大烹享九牛合鼎羊豕隨一取所實薦滋味神啜不吐人食宜安知後世無所用兒嚼不美還棄之古今萬事皆若此為爾一本作汝遠樹成嗟咨金山長江從天来意欲以地分西山避之逃東山開為門木石一本作石木所不捍土沙固隨奔東西兩隨海一本作兩通海勢巳無完坤如何中流居獨遏萬里渾坤維頼繫得地靈煩窺捫不然巳飄泊兩分不相存禹力所不除天意固可論全欲沉一本作决九淵下視萬古根畏强激常情中立愛此墩詩成欲誰和感慨心徒煩客次寄王正叔夜長夢反覆百瞑百到家歲計晩未一本作難成客愁與日加一本云客悲同日増長途千萬門何地容我過一本作車而子壯亦貧與余同一歌南山雪世於利禄不擇義苟可走奪足恐蹉家儲千金吝銖兩不敢盡費烏一本作焉用多百年到一本作至死財幾日恃若固有理則那莊生嘗以富為病愛其放逹與俗過南山衣雪變羣一本作為玊舉以賣世一本作俗售幾何山翁固亦富自喜稚子無誚一本作謂貧猶歌短謡忩中燈冷暈重緑忩前西風葉相逐曉霜披瓦月上軒枕夢不成鴈聲續拂衣起歩行繞壁萬慮無成淚沾臆鉄房老劒澁不青閃繫一本作擊八柱不可索白晝出門歸路迷冬日易夜還空歸人將豪傑視如草天困英雄未與時長鯨滯斬海波揺塞甲不巻邊塵囂吾徒顦顇乃一本作我如此安得長喙呼重霄暑旱苦熱清風無力屠得熱落日著翅飛上山人固已懼江海竭天豈不惜河漢乾崑崙之高有積雪蓬莱之逺常遺寒不能手提天下徃何忍身志遊其間贈杜漸子長吾鄙少與合杜子愛所多直木有正性深源無亂波齒少蔚未冠心古先巳皤卓哉金石姿勉矣勤鍜磨交難贈杜漸兩䑕共謀渴相飲期入水一本作及水一䑕下縋缶一䑕上􅋦尾前䑕以之跌一本作失後䑕以之死䑕死何足噫夫人纔可悲平地把手笑乘崕撥足擠賊防易為力壯楗完墻籬交防難為人笑靣惡肝脾前日信其是今日悟其非安得先知明有如灼火龜然則奈之何期子同吁巇廣陵集巻九
