  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_009-1a, image: WYG1106/WYG1106-0437c.png}
body:
  text: 廣陵集卷九宋王令撰贈廬山老居訥訥公匡廬老詩句整以雅標韻樂天淳不肯外禮假所居遠城市絶俗就間暇岡崖道路惡亦為佳客下余雖昔所聞相見今乃乍愛其語言好超絶忽世跨馬舁就其居燈火共清夜惜不見其壯巳老吁可訝髙才可施用售世嗟無價臨别更何論共是忘言者一本作共是相忘者旅次寄寶覺訥師小雨破宿暑曉風忽焉遒山深樹翳陰蜩蚻應已秋清坐想髙絶語言誰應酬豈不念一往抱病終自留羈旅少往還有來或非儔命僕一謝之縱我冠屨休移牀上髙堂解書散牀頭於此有嘉興念世誰與謀獨思山林人一本作林下人兹意可綢繆何當買田廬共遂丘壑遊寄吕惠卿吉甫兼簡林伯通吕詩附踆踆門外馬客至知謂一本作為誰昔靣尚未逢那論心相知揖客拜上堂一本作拜客揖上堂謝客辱弗遺寒暑相問酬唯諾坐無為靜默近尤遠多言足瑕玼勉從客所論還顧所學非念此廢無益對書坐長嘻一本作為此嘆無益廢書坐長嘻獨思同懷子念遠莫見之豈無寄我書嵗晚若苦遲聞頗困王事豈無間暇時况有同僚賢相期在書詩人生天地間常恐食所縻去就兩莫謀會合寧有期余病不自樂舊學益以隳一本作日益隳近者非所同遠者勞夢思江水日夕東道途宛而夷寄書當在勤一本作寄遠當日勤無謂往還稀答逢原吕惠卿晨在趨長司跪坐與之言偶然脫齟齬相送顔色溫歸舍未休鞍簿書隨滿門相仍賔客過欹午僅朝餐平生性懶惰應接非吾真况乃重戕賊良氣能幾存就夜甫得息閲我几上文開卷未及讀睡思巳昏昏自知小人歸昭昭復何云每於清夜夢多見夫子魂側耳聼髙議如飲黃金樽覺來不得往欲飛無羽翰昨日得子詩我心子先論怪我詩一本作書苦遲友道宜所敦豈不旦夕思實苦案牘煩豈無同官賢未免走與奔相見鞅掌間有言無暇陳嗟嗟兹世士無食同所患念我力難任聞子謀更艱久知為之天安能怨寠貧吾聞君子仕行義而巳焉亦將逹吾義豈遂為利牽東海有滄溟西極有崑崙古來到者誰不過數子尊子巳具車航吾亦為楫輪欲一從子遊不知何時然寄崔伯易擾擾閭巷士過我何所為屢來徒我煩不來我弗思少年樂知聞喜與客子隨晚歲事恬默與世益參差騎馬出尋人中路輒自歸歸來亦何樂書史自相期巳與往者親可無兹世違欲語無所得起視北鴈飛念子遠千里昔别今巳期寄聲雖云多所得竟亦稀近者忽報書期我往就之不知豫苦窮繫此不可離尚迫朝暮憂寧有道路資人生少所同老去財幾時豫勢既若此子復不肯來但恐百年間齟齬終其齊詩以一本作僅寄子招亦以寫我悲寄孫莘老默默不自得勞勞非吾任不與君子逢誰復明此心偶客來自南口有千里音知無木索勤頗復山水吟對之為一笑欣如獲千金宣城風物佳古語昔巳忱太平又其有道途邈幽深溪流渺彎環山勢屹抱臨况復寂寞人黃綬事陸沉公田秫既收客席酒屢斟悔豫昔南浮不往一就尋波濤忘日月疾病廢古今歸來就羈銜外慮日巳侵適時愧非才對客輒自瘖譬如火炙膚一本作炙肌暫忍久莫禁惟思一本作致百畝田為可足釡鬵投身脫世箝斂足蹈古針寄言所一本作我同懷相期在中林夏日平居奉寄崔伯易兼簡朱元弼天風變春和晝日差夏永門闌一本作庭閉無事燕雀志益靜紛翻詩書帙棄散懶收整時來就枕卧復可取窺省心恬逐物間迹濶與世屏鮮鮮南山暖秀色在修􅳠一本作穎苟嫌一本作逃安坐慵還可一本作與遠遊騁自緣智能薄反得間暇幸交朋久相逺疏懶欲誰警憮憮庭下樹隂影日已敷癯癯閉門人簟席自卷舒髙枝就逺冠曲枝挂裳裾一本作襦還來從此息卧視詩與書桓桓門外客從徒駕驪駒不知來何聞一本作為乃肯顧我閭呼兒往應門謂言出在塗非我敢厭客非客與我疏以豫拙語言無以得客娛一不當客意恐與世患俱不如兩相忘何能效紛如效古流沙不勝車弱水不載舟謂言行子歸無苦事逺遊寄子素絲裳聞子衣苦單失今不來還歲晚將奈寒送朱明之昌叔赴尉山陽朱使拜書天上回志以身試百里障青衫飄若風外荷借馬載出塵土上凖眉嶄如見天秀獨立繫馬萬里望身軀雖小胸腹寬沛如絶海橫秋漲久宜脫絶事髙致豈願卑冗勞俗狀髙堂華髮親老矣四海無家寄几杖世外言髙信獨竒人前腰折嗟已強尉官雖小俸雖薄猶有餘錢買甘養想當家帷奉顔靣綵衣躬一本作身率婦子餉詵詵兒女戲滿前纍纍諸兄坐相向人間此樂不可幸一笑自足百辱當時清固應稀盜賊俗弊寧不煩笞掠好偷間暇事簡編思豫一本作我寧無尺字况學子瑣瑣來學子從我問古風謂一本作吾言古之人學不求世功以其明智餘施與天下同能知學為身自不恤窮通童子顧我笑是言得無蒙斯道使可遵曽不聞父翁謂言童子歸益自謀厥躬吾不能爾言亦不必爾從吾不能爾言一本作吾能為爾言出門出門將何從中道忽自思彼懷與爾殊亦合念子歸樂有詩與書遊有山與陂誰言竟無從猶有影自隨雜詩一云古人古人重非道飢不苟豆羮有為非其心或不脫冕行如何後世人以官業其生鄙哉樂欺人猶以聖自名寄滿子權昔心何悠悠今學益漫漫莽如浮江河一本作滄海浩不際崖岸生雖樂文字勤不償几案重編空堆塵折簡久枯汗徒知陳市肆表列環四畔巳無探討勤胡可賢否按零丁晚觀玄泯滅舊習彖得指來歲期失忘去日算嘗聞勤惰間巳是愚智判蒙羞欲何顔避恥愧無翰不能繩已怠何力禁人叛文章觸世嫌議語限客竄時牽好惡卑俗撓是非亂早衰奪舊剛多病襲新懦心經衣食艱事廢米鹽半何謀脫身去割迹與俗斷耕荒食新收鑿窒復舊貫念生如冬冰至死僅春泮其間能幾時何恃苦自緩翩翩淮南英顯顯士林冠方手未為辱遊子昔同閈篇章覿新華論説聼橫捍包竒晚自走去實王府玩近書何相撩頗以名見謾不知老者拙棄此久巳斷決斷之斷子方勇自樹解轡縱新駻行期拾春青采綴綰歸腕乖一本作暌離思舊歡遷徙就新絆無琴雖自歌有酒欲誰伴間暇當寄詩持此資賀換梅花風吹冬暖變春暖江梅艷艷橫新枝經年不逢間何久忽此相遇如有期初開珊珊尚寂寞仙人綴佩懸瑶一本作珠璣後日重來不可辨漫漫月樹留寒輝清香芬敷志何逺可惜不使蝶得知遊人爭至無日夜對之但笑果喜誰不知春工用何術摶造萬物皆可為得非各使出所巧約與鬭競合一時不然裁剪未易給鞭役衆鬼寧不噫終年成功財幾日旋亦墮壞良可悲傳聞昔時大烹享九牛合鼎羊豕隨一取所實薦滋味神啜不吐人食宜安知後世無所用兒嚼不美還棄之古今萬事皆若此為爾一本作汝遠樹成嗟咨金山長江從天來意欲以地分西山避之逃東山開為門木石一本作石木所不捍土沙固隨奔東西兩隨海一本作兩通海勢巳無完坤如何中流居獨遏萬里渾坤維賴繫得地靈煩窺捫不然巳飄泊兩分不相存禹力所不除天意固可論全欲沉一本作決九淵下視萬古根畏強激常情中立愛此墩詩成欲誰和感慨心徒煩客次寄王正叔夜長夢反覆百瞑百到家歲計晚未一本作難成客愁與日加一本云客悲同日增長途千萬門何地容我過一本作車而子壯亦貧與余同一歌南山雪世於利祿不擇義苟可走奪足恐蹉家儲千金吝銖兩不敢盡費烏一本作焉用多百年到一本作至死財幾日恃若固有理則那莊生嘗以富為病愛其放逹與俗過南山衣雪變羣一本作為玊舉以賣世一本作俗售幾何山翁固亦富自喜稚子無誚一本作謂貧猶歌短謡忩中燈冷暈重緑忩前西風葉相逐曉霜披瓦月上軒枕夢不成鴈聲續拂衣起步行繞壁萬慮無成淚沾臆鐵房老劒澀不青閃繫一本作擊八柱不可索白晝出門歸路迷冬日易夜還空歸人將豪傑視如草天困英雄未與時長鯨滯斬海波搖塞甲不卷邊塵囂吾徒憔悴乃一本作我如此安得長喙呼重霄暑旱苦熱清風無力屠得熱落日著翅飛上山人固已懼江海竭天豈不惜河漢乾崑崙之高有積雪蓬萊之逺常遺寒不能手提天下往何忍身志遊其間贈杜漸子長吾鄙少與合杜子愛所多直木有正性深源無亂波齒少蔚未冠心古先巳皤卓哉金石姿勉矣勤煆磨交難贈杜漸兩鼠共謀渴相飲期入水一本作及水一鼠下縋缶一鼠上􅋦尾前鼠以之跌一本作失後鼠以之死鼠死何足噫夫人才可悲平地把手笑乘崕撥足擠賊防易為力壯楗完墻籬交防難為人笑靣惡肝脾前日信其是今日悟其非安得先知明有如灼火龜然則奈之何期子同吁巇廣陵集卷九
