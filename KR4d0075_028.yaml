body:
  text: 廣陵集巻二十八宋王令撰答吕吉甫書令頓首吉甫閣下辱教甚厚其所推望期我於君子令乃鄙者何能及是乎雖然事固有不然不容黙黙令以謂今之庠序非古之庠序也惟章句是程苟得利者是學日夜講之㡬希而不禍仁義也必由今之法度則不待自信之士不由今之法度惟古義是陳則不有問者言之何哉不有聽者告之何哉古之人所以教者葢曰不憤不啓不悱不發舉一隅不以三隅反則不復也孔子豈不欲人盡聞其道耶勢不可耳以謂不若是則人非自得之非自得之則資之不深資之不深則居之不安令觀近世之士固有力學矣惟其志意不安於所聞行義不繇於道其弊在學之不明知而不信耳學之不明惑也復何言哉知而不信者繇口言之而耳聽之其思不至乎心故也語曰學而不思則罔思而不學則殆况欲聚無求之人告以其所笑之行耶其不聽也必矣假有聽之者君子其告之若是乎令故曰今之庠序有德者所不居不及德則不敢居然前之所言葢推明今古之同異有德者之為不為耳皆不為不肖發也前日至揚州有以其拒府命告之者令怵惕以驚知非其所居也忸怩以慙既不得已也輙以是告之自以不肖之學慕於古人者當如是敢自取進退於其間也夫世之公卿大夫不謀道德也久矣今馮公信賢不知令之不肖欲㧞之于民衆之編折公卿之勢而以禮加之此乃不苟然者葢有意於道德也令亦以謂人之過以古人望我我雖不及是苟以世人容悦之道報之不盡其所言竊以謂不忠因自進其區區不謂其傳乃爾也令之不肖不足以信於人久矣彼以所聞之異故驚也夫以無足信之言告不信之人傳所驚異之語宜復於上者失令之心也吉甫視令平日之言豈不然乎詩非法言與孔子弟子不為詩令諸嘗有之但傳者失令之意耳夫七十子之於仲尼日聞所不聞見所不見彼方瞻之在前忽焉在後何暇以作詩為事乎後世學聖人者取其文字而學之數百年其説漫漫㳂其流而遠其言攀其華而不取其實士之舍道德而爭以文字為學也令竊悲之因其間而及此耳夫古詩之在者三百皆聖人因人言而存者謂其道有在乎是者故不廢也孔子嘗言曰為此詩者其知道乎以鴟鴞之詩為知道則其他有不及道者矣故其用於詩者可以興可以觀可以羣可以怨用是而邇之事父則不悖遠之事君則知義夫學固多術矣欲為大人者學為大人欲為善人者學為善人何謂大人之學非先王之法言不言非先王之德行不行口無擇言身無擇行者也何謂善人不踐迹亦不入於室者也古詩之得聖人之道者多矣其有不合於聖人者豈少乎然其意之所存要歸乎善則其作於善人者多矣豈容無擇乎士之學孔子者乃知盡信其言而不擇推古之為者以為道而教後世乃大放於言以馳騁其末習用壯其夸滛靡麗之為其間雖有不失正者吾恐揚子所謂風一而勸百壯夫固不為也孔子曰君子於其言無所苟而已矣如世之作詩者能無苟乎令故廣孔子之意以為存詩所以載道而不作今世之詩未必不為道也何以言之夫多聞擇其善者而從之多見而識之此古人之所以學也施之於古詩不可耶顔子曰博我以文約我以禮夫學固自有約也夫孔子之言傳於今者葢然其詩有曰不忮不求何用不臧豈不爾思室是遠而則曰未之思也夫何遠之有夫孔子豈毁詩者耶言之有不便義之有不盡耳固曰學者豈可執詩以盡信乎因吉甫之問復自陳其不肖試一思回示其末也不宣令再拜與杜子長書子長足下令貧無資身術從禮有責不敢易受寒餓死懼辱先人後以故偷苟自全令將伏聖人之道以乞丐於諸公非不自念其詭拙念此外又甚詭拙也此月二十日欲與諸公㑹子長還喜來否令載拜又令載拜相識多日所道多常式言不及所存暮而多切急怨歎語宜乎君子疑且畏也雖然相交結之道固心須相同耳若夫出處遠近旦夕旬月之不相面者此固迹耳心同而迹異於交何所害所患者迹同心異耳十囚同圄亦非不同處也至於心則二五其異矣幸得君子聽信之為學雖然貴相親近有漸摩然君子與僕尚同州里間必不遂棄則言語相問對文字相假借亦固尚無疑直恐君子必疑我書此以待後質令再拜與李君厚書令頓首令之西來初未為媿也及日以所學食於人然後大有媿焉夫古食於人而安不皇媿者皆内有餘而推以及不足故當世之聞者從而過者化故曰其君用之則安富尊榮子弟從之則孝弟忠信者以其賢有道者之效如此爾假不為然安得人人而食之今令之所食則異矣已不足而强於人故聽者不從觀者不化日㝷鞭抶而學者雖懼猶附離相半然後自歎非賢有道而益知人不可欺也方日懼慚奚暇貪有所取也所賜束修謹具回納懇愊懇愊不宣令頓首魯子思哀詞令居揚之日久而相從事為友者槩多求其久而相親歡者惟魯氏兄弟令方少年時尤狭中不能容人過故與友者初時猶相能終多置吾而去之而於兄弟則未之然也令學日益久而所為益與前日異而視二魯殊沾沾一作怡怡可喜如前日時每退而懼之久而亦一作益相好也問以年而第之二魯皆長於吾則從而兄之二魯初讓不肯予當也久亦從之今年之八月予以事如揚從魯氏家則見其仲氏康安民而不見其伯氏子思者怪而問之曰疾也予雖不得見之為不足亦謂時時小有疾人人之所不免亦不加憂也歸而令亦病久不通人事而忘為問也或者以死聞而不類傳疑者信矣子思之死也予之西來甚窮所為亦一作益自信益以為友不堪而去之者衆今乃聞子思之喪其心之哀可知也子思少孤無他兄弟其兄弟安民者為子思叔父之子子思之死時尚未娶無子而其後絶矣嗚呼可哀也已作哀詞一首寄其弟安民與故與子思㳺者見之無過余怨也詞曰嗚呼子思信去我而死耶生有死而為常猶行者之必一作有歸然衆人之安以施遲而子何去乃忽兮豈視今世之無可樂兮釋然自脱以去之不然繫之天者命兮才止絶於斯始子之學汲汲兮固願有以設施既充而成科兮豈寧就死而不寧待時雖適世之不逢兮顧居身之甚約而前聖古一作後賢兮道固不樂因一作顧忽然而逝兮何其無乃非子之一作無子然兮命也止斯嗚呼不可論兮天有知而無知曰人人而命者人竟誰為間不吾應兮思之益疑善人如子兮殞亦先時評一作誶曰嗚呼子思人之無良口豁髪蒼駢走不僵子而不祥年夭以殤蒼天蒼天彼人謂何此何不長嗚呼子思人之無良食玉以朝衣金於腰子何不祥不容糠糟蒼天蒼天彼人謂何此何不聊嗚呼子思人之無良十百孫子𤓰瓞延裔子而不祥斬先人嗣蒼天蒼天彼人謂何此而不世嗚呼子思兮已矣可懷來不及父飬兮去不子遺名無留世兮學與腹埋嗚呼子思兮何負于天哉弔李顯之秀才文至和三年閠三月二十一日元城王令謹以文敬弔於亡友李君顯之之靈曰嗚呼顯之死為無知歸於冺黙一世之勞萬世以息死為有知子適何去又果與生孰為樂否親呼吾子弟號我兄腸裂心崩絶不復生人不忍聞子忍去之似非子心乃命之為禍福之來應不在身有如乘高射其下人中者乃偶不中則多理其若兹又安用嗟子有高材躓於世學急名一科以就親樂其為文章振振儀儀如裂錦紈製為裳衣玉尺金刀度裁適宜合以縫袵上祫下齊可衣以㳺亦可以朝人皆子宜子亦逍遥嘗謂吾學不可得禄挟已有餘慊吾不足曽敢謂子而不得科又終夭年命其如何吾嘗有持要取自適不寧愉愉從人戚戚生死有天窮達我命學非以官求輔吾性以是而言孰為短長孰為生死孰為得喪何欣何嗟何咲何洟唯其義仁情則有之子為有靈吾言其䆒子而無靈何憾之有送窮文維皇祐壬辰十二月三十日謹奉香酒送窮鬼而告之曰嗚呼窮哉果有鬼歟人皆送爾行爾又行乎自我之生迄於如今拘前追後失險堕深舉頭礙天伸足無地重上小下卒莫安置刻瘠不肥骨出見皮冬燠常寒晝短猶飢衰人之趨幸徑㨗途已或徐徐衆人之避蝮手斷臂已或必至人趨宜前人避宜去不前不去為我何故是宜有鬼扳前推後不然曷為顛倒去就今日晦日傳子欲行有酌斯清有焚斯馨揖行頌禱期爾之行在昔有唐賢曰韓公立爾名字俾傳無窮謂鬼為無公豈紿我疑鬼為有爾其來些跛倚以須目瞑心醉若有若無若發夢寐軒然而來翼然而至叠足竦膊閃目哆喙如將有言臨吐復止顧視前後更相咲指乃進而言曰贈行以言在人則然我徒鬼爾何有於言必欲遣我是亦有畏桃茢葦索古人所謂我非常鬼亦不畏是主人乃恐悚而前攝衣謝之然則不敏敢問何畏曰夫長足先趨長手疾取見利忘義喜得忘與此名曰貪笑面美口拜膝喏手進常在前退每居後此名曰佞負口苦身中藏外貧磨針續髮補故代新此名曰吝比終輕初勇於利圖閉目百思開口千塗此名曰巧貪佞吝巧我實畏之有不我遣我背而馳借問主人子還有否主人乃愧心汗手澁舌訥口鄙實無之去留願受五銘序古之人於物常有銘自經見之餘而它傳記之雜出尚多唯古人之不徒為言而來者愛之益新非余敢謂為能也然余獨取不得余心者銘庶㡬以自觀耳冠銘不可以已不可以薦趾既尚而貴亦有以弊棄衣銘誰能有衣不惟其良誰能正衣不素其裳履銘既素而承胡不用以行杖銘惟其不能而願行跂而便軀可輔而趨既偃且踣其亦何力嗚呼杖不能扶人而人用杖扶吁門銘入而謂何出者誰其日缺然以開非所宜者來而常盜是離一作罹可不慎哉言銘昔余嘗有言矣而不知售言之難也及人有言于余而後知售言之難而余猶在小人也然人之言于余皆非其過而余猶不能虛以答于不既况余嘗實刺中人所甚病幸而及君子則余復何言不幸如余等小人則余之獲罪於人多矣作銘自誦且戒多言是可誦也且可戒也銘曰子必于賢人之于賢胡有言人之為言非子然人以為言胡得焉舍旃舍旃子以為言胡恤焉人不必賢於不必賢胡有言子以為言雖子然子之為言胡得焉舍旃舍旃人之為言胡獲焉故秘書丞徐君墓誌銘嘉祐三年東平吕倚將葬其舅徐君於揚州江都縣某鄉某原卜以某月甲子吉語其㳺王令曰舅諱天錫字日休故吳忠武王温之後秘書丞某之子秘書君之葬南豐曽鞏銘其墓序其家世甚詳惟舅氏㓜有竒志方其少時徐氏雖失勢然故將相大家子弟絶不近書舅氏獨為學以自業天禧中以進士起家為筠州司理叅軍主祥符縣簿荐者多論其材至於亷以謂可學而不可及也改著作佐郎知寳應縣改秘書丞明道二年三月十二日以疾卒卒時年四十九及舅氏時倚尚㓜未嘗從之以久其為人沉深終不自道其能以故不能得其所為也及其既卒倚嘗愛思其賢惜其無所聞于後而一時交㳺無復在者下從其家之故老遺𨽻問其所為又皆鄙俚賤人無所紀識獨能道其富時視財利無所愛惜至其甚貧亷葢毫不假也人有誣取其田者不與之校亦終不非其人然此皆倚所已知于舅氏之所為乃其常耳非其慷慨大節也其治寳應寳應之人飢大疫募民出米為饘粥以食民聚醫藥以治病者其家屢戒之使自愛無身行民間以切近病人君以為為令當然不聽也然竟卒以疫後二十五年倚過寳應而問之吏民猶能記其卒之年月日時葢其稱念不忘也卒而無子先人痛傷之至于倚而力及葬葬宜有銘而舅之為不傳此倚之所以問也令謂之曰古之志士仁人號名施於後世其行事無聞者葢多徒以聖賢學士所嘗推道之爾後世信其人謂其所稱者不誣必然也今子欲見其舅于後世而不求人之道德可信者乃以問令此令之所以自懼其不肖也雖然徐君信佳士其為不復見其詳今其所聞猶足銘其人也銘曰因其所有輙推散之不求其無喜亷自持以我任民死弗顧辭猗歟淑人宜後之貽廣陵集巻二十八
