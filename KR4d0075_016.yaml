body:
  text: 廣陵集卷十六宋王令撰詩到潤望竹林寺憶朱昌叔常與幽人過竹林重來無地豁煩襟青山欲去誰堪語薄俗相期不到心何計江湖終隱釣去隨魚鳥共飛沉塵埃聞說難為客早晚歸來憶舊吟奉寄伯兄泰伯心迹牽羈逐勢分一生襟抱向誰論十年漂泊迷南北千里憂思厭夢魂書託逺懷期日月眼和衰淚望乾坤何時得就歸來賦老守桑麻聚一門奉寄崔伯易功業嘗聞亦有時可能天命出依違終看世態真何道不得吾心自合歸一本作厭從流俗學依違已知兹世非吾事况有斯人起我歸廊廟得逢應有義草茅雖老尚知非秋來客况無他異時向西風誦式微寄滿子權窗前干枕夢忘還門外清風晝掩關天下誰當千古後牀頭自笑六經間能將道繫窮通裏安用身居進退間自愧公心猶有蔽清時無日不思山又終年謀食亦何得浪取窮愁只自侵餓死有時非正命勞生幾不愧常心百年此去塵埃在一本作滿萬古從來意思深莫說山林是輕往窮來無計得山林寄李君厚一笑東風去十年重來稚子巳差肩脫衣呼客家聲舊把酒論心士氣全病驥逺思牽直道老鷹秋夢入青天自言出處身無纍一把窮通寄自然一本作自言暮齒雖憔悴醉膽猶能忽十年寄滿粹翁滿子吾逢久皇皇未見閒老成終到孔窮死亦為顔學術思無際誠明去一間吾雖有心者力苦未能攀強顔寄任道子權強顔求世亦何從甔石時時得復空何日能無寒餓役此身得與聖賢終人生汲汲須髙致世態渾渾未易窮安得相逢共相語荒城回首又春風招夏和叔矻矻雕鐫役俗兒六經塵土有誰吹我追往聖思前躅子苟安行即後時大遇定為當世福不逢猶作後來師思量最是男兒事此外吾曹不足期贈崔伯易巉嵓惡面插蒼鬚中道時時自笑呼但怪佯狂輕去俗果聞髙論足開余惡看富貴庸男子喜見徜徉隱丈夫我是自髙無許可今朝為子一長吁贈裴仲卿匣劍光芒射斗牛持携天下洗人仇英雄心膽老猶壯道路風塵行未休名重更須完小節義高何必論間愁濛濛細雨陵陽市折取重梅上酒樓寄都下二三子失舉翹翹數子拔羣倫落筆文章妙有神清世暫時藏琬琰紅塵終不卧麒麟淹留京國三年客牢落江河一病身得喪窮通雖付命雙眉忍淚巳沾巾又太學虀鹽共苦辛寒窗筆硯日相親梁王臺畔一分袂揚子江頭三換春篋裏黃金須買酒鬢邊白髮解欺人窮通得喪誰能定况是男兒有此身李南夫罷舉歸隱夢寐風儀近十年塵埃無路覩雲天清朝未得榮簮紱黃卷何妨樂聖賢物外髙情誰與共人間佳句已爭傳欲知富貴終難動一片丹心本寂然甫里甫里先生得古風放身全入隱淪中足磨漢榻星辰動筆挫吳天物象空往事欲尋人寂寂舊田安在雨濛濛當時引重髙才者誰是曾來一畝宫次韵朱昌叔見贈雖無才學可人羣偶有誠心與古親兹世幾人能永富此身何恤不終貧生無簮綬身寧屈死有詩書志尚伸自匪與君嘗素計斯言何敢易謀人次韵滿子權見寄當世雄圖不可懷退居蒿艾自沉埋門無來足荆生道病不能鋤草上階自是直方違世易况將踈懶合人乖無由與子同樵種回首平林浪可柴和束熙之論舊當年齠齔偶同門糊口重來巳十春仰嘆早成渾屬子始知老拙盡輸人火烟論友勞薰灼桂蘗為生合苦辛待看聖賢堂奧去願持箕帚掃遺塵謝束丈喜赴西招足屢蹉自慙愚鄙取無他能終未學生何幸得活諸孤賜最多愧面未甘徒巳矣報心全寄命如何須知下客終思用不必時時彈鋏歌答許勤之不作明堂柱石一本作唐虞稷契臣要當歸去老江濱不知何處田堪買拋却浮生一片塵答劉成父四愁詩倦客維揚每自悲有時雙淚等閒垂眼前所識皆庸我天下為憂可語誰把臂便嫌逢子晚開縢乃見起豫詩卷舒萬徹吟千遍此後多應手有胝謝成父舊說詩無三百年于今拭目讀君篇巳嗟吾道微如線不意斯文未喪天金玉有聲情不俗蕙蘭之臭美尤全塵埃滿眼逢何晚氣類相期久合堅以義求人今遂得于心無愧果為賢不須刺口論憔悴吾輩一本作黨恓惶自古然還蕭幾道詩卷武夷山骨插青冥秀氣中蟠産俊英髙似君平于市隱窮如東野以詩鳴驊騮老騁青雲足緑綺純含太古聲顧我自憂衰病久為君雙眼暫時明再次元韵答幾道塵囂擺落到鴻冥始見當時遁世英叢棘敢思丹鳯至寸筳慚叩巨鐘鳴須知奔競浮榮路未若喧傳不朽聲此道固為流俗笑苟非夫子欲誰明謝幾道見示佳什因次元韵曾酬唱和向家溪嫫母終慙敵艷妻豈意誤將三獻玉翻來輕博一丸泥利能絶地同莊劍巧可凌雲上魯梯巾衍珍藏雖巳固祗愁飛去化為霓又篇篇光絶奪春華中有純音正不邪跛鱉久慚追駭足降旗今巳怯崇牙清新格調空吟諷猥冗言辭自咄嗟為我指迷終有得曲蓬從此長叢麻偶古卒卒往來舟翻翻逐利謀中流誰自溺方去不回頭思歸平生孤憤自􅏰然不作春蠺但食眠干祿有心羞枉道無田虛日望豐年每將浩嘆期黃卷已許多憂競白顛舊笑古人輕獨往近來還自憶林泉秋日感憤擊劒髙歌四顧遐男兒何事繫如瓜蛟龍不是池中物燕雀烏知隴上嗟命有儻來猶未耳天徒生我使窮耶謝安未是才難者底事蒼生却盛誇又坐睨歸鴻起自嗟西風吹落淚痕斜聚書老懶堆塵楮秋劍寒酸蟄鐡蛇自是卧龍猶戢角浪嗟穴虎向生牙從來思擲班傭筆况是西山舊有家襲襲襲襲前修與後生要言髙爵是身榮却將獵較誣師聖不見三年學有成病中十日身無一日寧病源知向百憂生寒侵騏驥應方瘦蠧滿楩楠豈易榮小閣晝間書帙亂畫堂風靜藥羅聲北山扶杖終歸去寄語嵒猿莫曉驚寄介甫時為郡牧已推事業皆歸命空有文章自滿家借使牛羊雖有責豈于鳯鳥獨無嗟人留孟子皆非道客議揚雄正自譁賢哲相望每千古得逢猶設與時差上杭帥吕舍人溱玉海澄中粹金山拔外佳無前誰與敵獨進不容偕列象明星璧遺思結館娃蘇為舊治一麾迎日下四海望霖乖今見詢僉允從來注意諧推溝常巳任濟域定民皆富裕吳中俗優游治外懷樽環常滿客醉擁坐添叉賤子儒名業平生客旁淮塵埃方困頓時命兩沉埋居拙思營窟炊窮欲析骸毛生禰衡刺麻繫吕匡鞋海逺狂圖酌天髙妄欲階請雖非久得來實為貧嗟况是常瞻目將希未施崕雖然愚者慮庶享惡人齊肉骨非難力銘心謝莫涯定須為進互庶或未愚柴上邵寶文必出處身之道窮通命所關孔猶聞宋逐軻亦退梁還兹道方中否流風有後艱客來方病憲人戚不堪顔士有髙山仰身嘗送駕攀徑心思古到獨手欲今扳憔悴窮年學乖踈五兩綸魚鹽聞古隱畎畝識今間蹈海時何謂無田力亦孱清醒甘澤畔富貴奈墦間進壯羝羊觸行屯乘馬班食貧欣道在愠見笑兒頑時巳輸雌雉心猶恥瘠環偶逢邦有道喜眷涕無􅏰觀水求窺海知天顧適山雖歸滕國聖尚賤許行蠻進效無橫草希仁等棄官聖門猶進惑惠政况先鰥自道非能賦幾希不敢一本作取刪誤知何一本作奚以報忠信赤心殷贈致政郭大丞冠蓋冲冲語退居幾人年少褫銀魚風波脫去都無纍日月間來靜有餘一斗獨傾花下酒五車時晒腹中書大丞洪飲而自儒書之外浮圖老子隂陽方技之說無所不覽故云論詩深愧非商也敢向邱門望起豫間居奉寄幾道門前一徑長寒莎耳冷不聞車馬過踈竹有風堪待月空庭無雀可張羅道心自覺間中得懶性還從病後多回首西城望詩老此心此性復如何廣陵集卷十六
