  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_005-1a, image: WYG1106/WYG1106-0418a.png}
body:
  text: 廣陵集卷五宋王令撰金繩挂空虛自勉兼示束孝先金繩挂空虛日月繫兩垂天童坐戲弄縱掣成東西百年未死間晝夜無窮期短短固可惜舒舒定非宜有聞未之行有學未及知白髮巳班踈朱顔亦童黎智慮昏晚年聰明退前時縱欲加自修去日何勝追奈何少自廢老則成空悲寄洪與權與權江南來適自滿門會初無合我志財以客靣待時時相鈎探稍稍互酬對根源豁披張扄鐍失分解君然頷還嗟我恐敬若戴相逢時既多相待兩交快豫初請子交子曰何可外中又謝不德卒曰吾而愛既而苐以年子合我兄拜揚雖士云多往往事冠帶中間滿夫子崛出百萬最更以子從之而吾米則稗朋從偶許攀會合日與在春晨巧誇招月夕因論話書狂逸飛蛇碁毒甚含蠆相謀務竒勝聚口笑拙敗貪歡不知嵗冬律忽移再余飢奔先西餓色靣留菜子待去亦恨書以問我奈别來君何如思子我心痗朋分無舊歡世險有新態髙言足瑕疵俗學牽細碎貧知身貴重病覺學力怠壯心已無多况去日有退豫期後相見頑陋徒老大好勤寄余書思子百憂萃寄滿子權子權今謂何久不治蘭書子素賜我多豈以此遂疏豫亦知嘗時病與貧相俱冉冉草沒階客腳不踏廬貴者事名位崖岸誇異殊賢者縱肯來顧我欲取一本作取取無惟餘齪齪徒吾亦羞與居潭潭一室空編帙環三隅暴陽不憂償偷飽幸未誅且可延朝昏憂思老頑愚獨有思子懷涕下時喑嗚冬陰寄滿子權玄雲載雨惜不下北風吹急水相黏周遮覆蓋不通透錮結巳厚難披燖微陽未復老陰壯計去暖律時猶淹青天何可一日失漸恐此去無由瞻日馭自懼不得脫略出急入地下潛憑陰托寒恣凌爍風伯得意一本作志欣沾沾但幸天公不省悟誰顧地下人嗟讒隔絶霜露曠不下帝有潤澤何由霑非惟勾芽凍天折亦恐萬類由兹殱九龍銜火互相暖稱有日我借不甘羣兒鋭奮不量席欲仰吐氣吁以炎惟有壯士抱劍卧思得美酒聊自酣弱弱誰氏子弱弱誰氏子鮮鮮一何姝來奔富人家妻與富人俱一本作居嚴一本作華粧問夫子我豈彼室如夫子笑遣之彼寧與汝舊本作爾都升堂一本作褰裳由阼階德色溢以舒親賔不敢笑退語相嚱吁髙堂聚羣婢唯諾相咨睢家事忽不圖顧指取自如朝令拆柱薪暮遣藩籬除風雨半夜來百釁生不虞屋壓盜隨至夫死别嫁夫東鄰有淑子一本作女惟一本作恬不事鉛朱端居待人求正色不敷腴清鏡見一本作照白髮行媒不顧閭不知愛妻人取舍何異歟贈黃任道長河之流幾萬里駭若瀉自天上來奔湍衝山拔地走直有到海無邪回人之所觀乃流沫猶以激射憂天摧想其根源發聲勢如縱烈火燒千雷古來走死萬萬腳竟莫識自何來哉我疑鴻荒混沌日沖破天地之元胎夸娥搖頭巨靈走避不敢道曽疏開鋤耰之成乃畎澮欲計議此誠可咍長帆大艦不敢絶尚恐飄去無垠崖愚兒腳慣踏潢潦安敢逆此如泝洄答黃藪富道角角適時足力走猶或遲從而不逮人不若坐視之而豫始用此巳無先人思間自念斯世固亦未易為以其得而慚曷若退自宜老身可孔顔餓死猶夷齊豫心最樂此尤喜用自持豈將六尺軀賤易五羖皮但無百畝田得一本作可抱剛氣歸年來事窮蹙露暴無自依姊寡不能嫁一本作無為家又一本作子得家兒孤牽我啼平生事文字無路活寒飢勉從進士科束若縛襁兒時時忽自笑一本作笑自忽往往窮加悲一本作述窮悲有如髙飛鳥中路飢自低鋭知從食來不一本作豈意身投黐神龍拏白日挾雨萬里飛使其一本作之口有銜安得無馴隨雖然平生志固未忍相遺間時自散開縱吟助噓􅐵財將舒一本作輸己和豈敢偷人知黃君道德者術業何頎頎手提九黃鐘旁取折籥吹懸知失氣類誤以唱和期不知里社歌不可郊廟施况余衰病餘有氣亦巳卑加之困俗學羝角方牽羸詩陳盡自道幸子憐無疵一本作玼春風春風東來暖如噓過拂我靣撩我裾不知我心老有異亦欲調我兒女如庭前花枝笑自愛風裏草力更相扶旁林曲樹足飛鳥不問燕雀鴟鳶烏求雌要雄各有意豈但聞競爭春呼春巢成多夏卵衆明年計此更有餘非唯喧呼亂人耳漸恐巢穴妨人居收殘射中豈無道我亦力可彎長弧林深枝曲矢不入况弓待借家所無行吁坐盻不可奈安得靜默投身俱長風長風吹百草勢力亦隨靡地長風易休草力復隨起長風隨令歸風去何時來百草安正繁蘭生爾何哉東風東風來幾日窮巷不見春不知得花由只見插花人東舊本作春風能幾時聼爾多歡欣徒恐春風歸汝我同悲辛哭詩其一死者徒巳死思之恨無涯生者非素心還作死者嗟今古悲略同斯道竟奈何哀絃直易絶哭詞曲難歌其二朝歌聲吁吁暮哭聲轉無聲無血隨盡安得目不枯目枯不足嘆無目心自安目存多所見不若無目完其三切切復切切淚盡琴絃絶憤氣吐不出內作心肝熱朝漿渴不勝暮潦濁不清何以慰我懷安得滄海氷其四哭莫傍滄海淚落長海流流深風濤多駕蕩覆我舟不若灑春草荆榛蕪蔓莖怨氣觸草死猶得香蘭生其五一云又哭詩二首朝歌憂思多暮歌無奈何偶嘆氣亦絶未慟血先沱淚落入口少不如出眼多安得常病軀不為瘠且瘥其六目雖淚所出由來心乃源白日照我靣意欲乾泛瀾而不照我心我淚何由乾况在重雲遮使我何自安張巡祿兒射火燒九天鬼手不撲神聼旃羣庸仰口不肯唾反出長喙噓之燃睢陽城窮縮死鱉危繫一髮懸九淵巡瞋睨逺兩眥拆一本作折兩怒嚼齒碎鬚張肩恨身不毛劍無翼不能飛去殘賊咽翁軀腥刀子磔爼日嚼血肉猶經年霽雲東攘兩臂去西來才有九指還胸中憤氣吐不散去隨箭入浮屠㙛忠窮智索其自效更臠愛妾嘗飢涎我疑沒日賊不食恐其肉鴆死不痊又疑身骨不化土定作金鐵埋重泉何時山移陵谷變發出鼓鑄戈或鋋吾如得之顧有用不誅巳然誅未然贈李定資深涉川固有道造舟不如梁曽聞水覆舟不聞死乘杠奈何揭厲子先先勇褰裳豈盡水害人固亦謀非臧鳳雖謂靈畜無竹或一本作終死飢竹今無方無鳳云非其時使之羣一本作隨鴟鳶飢飽為止飛非惟失所一本作厥靈亦與彈射期又坦坦誰之田施施繳且弋烏來玩其機鵲至喜其食長鴻飛冥冥志與萬里極豈無啄飲心寧飢不人得湍激日蹙蹙風稜勢漫漫奈何舟上人試死才一間苟不以利涉安坐思誠艱客雖懼謀梁而木嗟在山古廟古廟隆隆敝庭扉風雨剝壁黦柱榱我來安知神所依穹堂窸窣風幡旗神君龎軀突鬚眉視我睨睚坐倨箕惕爍觀者駭不怡羣鬼後先張福威直東之廂步逶迤目益所見怪可噓馬牛羊犬雜豕雞或戴以首旁四支間有人靣身亦非老祝趨前為衆詞口吻囁嚅言嗢咿稱别狀類顧東西唱號名字分何誰空虛冥寞非所期豈亦以此為人尸視其膚革巳彪狸寧有中反恬肝脾又有械器身挈持一本作提携傳言癘疫此乃資古之日行厯虛危猶恐盛陰鬼所隨磔儺於門驅使馳今安取此廟以祠不念延虛殆尫羸農凶年多苦餓飢苟幸得飽不擇一本作釋祈來則拜叩盡敬祗幸天之澤偷自歸民德且恐報之時餗肴豐鮮牲魚肥欲奠以獻更濯巵進謝千語拜百低工鼓於庭巫舞衣祝傳神醉下福禧農謝神去祝徹之庭前匕割棄餘遺鵠烏下爭趂不飛回顧神靣如故時意者不為祭謝移嗚呼神固非吾知雜詩方春不種蘭終嵗無自佩良田弗加芟徒稚亦無嵗空令雨露恩日夕被蒿艾安坐飢怨天此理果誰在一日不為田百草巳有根况復間三時其穢何待論豈不有錢鎛從羞慵借勤嵗晚憂不耕何獨議鋤耘毶毶晚春樹上下聚百蟲不有口似躉則生尾如蜂設不二者然亦徒生無庸清陰不可居嵗晚還秋風廣陵集卷五
