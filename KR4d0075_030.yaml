body:
  text: 廣陵集巻三十宋王令撰外域問外域之與中國抗甚矣大者並帝而爭強扵其小弱猶以王自居令之而不肯聽拒之而不可制國家四有天下東盡海浦南連交廣西引羗巴北極并代中貫萬里不為無地生口蕃衍載在簿籍者不可勝數不為無人鍜金挽革貢甲萬里獸皮鳥羽膠漆絲枲隨其所出交易扵天下以相為用砥礪剡刻日無休工其器錯出扵州郡交輸扵天府所在充塞不為無器拔距投石猿臂駢脅蹶強挽長射中飛鳥走及走馬一作奔馬一日令下則以身自試者無慮千萬不為無士金角旗鼓進退坐作未嘗一日廢習不為無敎因百年之安承既富之後以天下之力不為無備每一議據前世以占成敗盈廷自天子謙謙大臣好問延及幽側其披草萊奮巖穴自出者不可勝紀不為無謀以主對客以逸待勞以我之直加彼之不直不為無名然而師出無功遇敵輒挫頓重兵扵乆屯屈至謀扵成筭外不得休内不得息財困扵重弊糓糜扵乆費中國力為之勞財為之貧而外域葢自若也以予考之自秦漢而下皆然其術不足道也自三代之時其詳雖不得聞然其大畧可舉也予竊疑之方其盛時天子合諸侯以禦冦攘其勢固易為力與今無甚異也扵其衰末中國自相并伐方是之時如韓晋秦趙皆以國自立被兵終世然力亦能支之今反不然何也諸君子行且仕矣有如陪大夫之末議承朝廷之遺問其將何以計此諸君子幸明以示我肉刑問肉刑之用扵世今其明見扵書傳者三代之法爾唐虞之世不可得而詳矣故記説多謂起扵夏后之世而書亦曰象刑惟明故荀氏者謂非之曰象刑非起扵治古葢起扵亂今所謂象刑者象天道而制刑耳如使殺人者不死傷人者不誅赭衣屝屨以為戮雖尭舜之聖不足以治而適所以為亂其為論甚詳世皆以為然而揚子雲獨曰唐虞象刑惟明夏后肉辟三千何不相從之如此諸君子之學其講唐虞之治詳矣肉刑之用否豈無説乎今日之學葢異時之用扵世之道也可無議哉稅法問古者之稅其法什一而民足後世之稅加寛矣如漢文景之間或三十税一而民尚貧雖今亦然願聞厚税而民富之道何術可行扵今薄歛民貧何由而異扵古此亦治道也幸無譲禮樂征伐問孔子曰天下有道禮樂征伐自天子出天下無道自諸侯出此孔子之所以作春秋也以余攷之扵春秋諸侯之變禮易樂者有矣侵伐圍入者有矣斯皆孔子之意也至扵征則不言何也使當世之無是事孔子不應曰征伐自天子出有而不書孔子之意安在若曰征者上伐下敵國不相征則天王亦不稱征何也願試辯之言行問孝經曰言滿天下無口過行滿天下無怨惡葢卿大夫之孝也昔孔子嘗言矣陳蔡之大夫惡其議也至圍之以兵將殺之其行也宋桓魋欲害之孟子行其禮扵齊王驩怨其簡巳甚矣其人聖賢也或以言或以行其不得扵天下如此考其下賢士大夫見扵書傳既嘗位扵朝廷而親信矣後卒以讒惡敗者未嘗不以言行也何獨孝經之言然言聖賢者皆不能然也諸君子學且進以仕其為卿大夫何以自取扵孝而免扵怨惡余竊欲聞之焉為邦問顔淵問為邦孔子曰行夏之時乘殷輅服周冕樂則韶舞放鄭聲逺佞人夫夏時自漢固巳行之矣假如後之作者有乘是輅服是冕求韶之遺音而舞之斥鄭聲與佞人而逺之苟盡是道亦能致治如古之時否封建問周建子弟同姬姓者五十三國秦起周後謂周以封建失天下盡除前世之法雖子弟不得有土然傳二世而秦亡漢監秦弊當世之士争以封建推言周秦所以長短者故髙祖文景之間子弟半天下後頗以敗亂然斷則復續與漢相終凡四百年由是晋宋隋唐之間言封建者益多晋取用之卒敗隋唐之間名雖用封而實與周漢異矣然唐亦垂四百年故後世議者多以封建為守矣敢問周漢唐之君歴年之乆秦之歴年之短果以此耶果以此則周漢之君所頼者何事必不以此求破後之議者以何説夫封建同姓以自藩屏用求永世果聖人之意乎非聖人之意則周公為周而用之何也諸君明以敎焉幸無讓治效問孔子曰如有用我者三年有成孟子曰有得百里之地皆足以朝諸侯有天下苟大國不過五年小國不過七年必為政扵天下自周秦而下漢唐之間仕者非經明行修世通以為不稱而孔子之學大盛扵天下士之挾是道以進者世常至宰相大官方是之時時君世主皆巳統有天下號令興廢通行扵四海非如百里之小而朝諸侯之難士之大者出有為小者出有言其居朝廷甚者終身至淺少矣猶不啻扵七年五年三年而功效曾不見扵天下不知學古人者何失之也諸君子既學孔子行且進仕扵朝廷嘗以思往者之失而有所得乎而令願聞之賞罰問湯之伐桀其誓曰爾尚輔予一人致天之罰予其大賚汝爾不從誓言予則孥戮汝武王之伐紂亦曰多功有厚賞不廸有顯戮予以謂桀與紂天下之大惡湯武天下之至仁致其伐亦曰順乎人而巳矣故書以謂東征則西夷怨南征則北狄怨曰傒我后后來其蘓夫民望之若此故曰無敵于天下夫因人欲去而去之其勢如以水滅火何獨廹其人而用之狃之以賞罰其誓乃如此予竊惑之願聞明教分田問分田之法計民之口以授食自五口之家逓而上至九口以為下中上凡三等其家雖授地不同固亦均矣自其外子孫之蕃過扵是者則有餘夫之田予嘗考之扵書以周制言之其法甚備然皆地巳均定獨餘夫之田因其食口之衆而增之不知取扵何地以今視之上農之家食或數十人古豈無此邪其田亦何可勝給也分民以就田則父子相離如近郊逺郊之差葢相逺數十里况四封之内其逺有過甚者耶苟老者無以養則少者之居安耶誠使其往來無間則地逺有不勝者力從而廢扵田則王政果何如耶諸君子博學知古其說如何稅法問漢武外事四方饋餉賜予内興宫室池臺苑囿一切過古封禪廵逰招延方士禱祀非鬼求致神仙其費極甚以至扵不可勝算逮其末年財用大屈扵是用𢎞羊之計始𣙜酒以禁天下至唐天寳中天下大亂兵用滋廣第五琦自蜀以御史使淮南始收塩利以禁民至其後以天下之財十分計之塩利占其六自是方鎮稍稍自負其強阻兵以叛不復貢賦凡數十州方是時中國之費益多財賦之入日衆至張滂王涯以茶亦可禁如酒自是山海之利無有在民者矣扵是趙賛復建雜稅今之百物之征古未之有葢自賛發之雖然賛獨用以資常平視嵗之豐儉以為出入以便民不以給國家費也朝廷承五代之後百年以至今日天下既平四夷無事宫室苑囿不増禱祀一切如禮行在未嘗廵逰天下一家貢賦非有缺虧凡唐漢之利皆盡用之而有司之費尚闕不聞富足何也夫承中國多事之後財力困竭之時一得其利猶用以濟安有如平時兼用之而反有不足者今竊怪之諸君子以謂其弊安在思欲革而治之何法語曰好謀而成夫欲進而仕者謀國之道所宜謀也禮樂問禮樂壊扵世乆矣今其書尚存而可考然皆廢不復舉當世屢痛之豈惟今哉求扵前世自三代而後皆然也往者卿大夫或請扵朝士亦奮行扵家見者頗怪之甚者以為笑而皆不能明也况扵行之乎以予考之扵古葢三代異禮而樂亦不同也夫欲新一世之民而民不聽乃欲家至而人觀之使必置而用此耶近者嘗作樂矣陳其器皆世所未識也按其聲則宜審而莫辯夫興禮之士皆獨行以抗一世世亦不相為用反頋而笑之自縉紳之士且然而欲望下俗末流被服其風聲不亦難乎予固疑其不然則禮樂何縁而變也諸君子當有以言之讓徳問讓者天下之盛徳而聖人之所推髙也然而吾徳當之聖賢固有其事而弗讓也伊尹嘗曰惟尹暨湯受天明命周公曰在予小子旦孔子曰文不在兹乎孟子曰舍我其誰哉葢吾徳當之聖賢固有其事而弗讓也若堯以天下歸之舜舜曰徳弗嗣舜以天下歸之禹禹曰徳罔克然二聖人者若其徳誠不足以當天下之任則並時而在舜禹之上者誰歟苟無其人其偽讓乎且堯之命舜以相天下而不聞有辭至舜命禹而以相讓之稷契暨臯陶垂又讓扵殳斨伯與益又讓虞扵朱虎熊羆伯夷又讓䕫龍而讓其秩宗焉舜之命官必當厥徳而裁諸位者也四人者宜如舜之宅相而弗讓可也反固辭者何歟然又終不聞易四人之位以遂其稱如稷契䕫臯陶今猶見之書而列扵二十有二人之職至扵殳斨伯與朱虎熊羆又不見舜以垂益之推避而卒任其人以成其讓道而列扵是職盖其才各稱而不可易也然則四人者是偽辭歟孔子曰䕫逹樂而不逹禮而伯夷乃讓以典禮焉又豈舉爾所知乎或曰堯舜之朝其臣雖有盛徳猶不敢當盛位盖其道之素行也然伊尹周公登師保之位未聞稽首推避如古四人者孔子孟子自任天下之道而不曰有人焉語曰泰伯可謂盛徳謂其能以天下讓也夫其能讓則其不讓者所不直歟不然則巳徳當焉皆宜固有其事而弗辭可也諸君幸詳言之謀斷問予讀書至舜禹之盛亦可謂盛矣然其相告戒盖曰弗詢之謀勿庸也或者以謂人之謀不相同乆矣以孔子孟子之聖避扵天下數獨扵諸侯當世卿士大夫任朝廷之事者其甚則欲殺之其下猶以為迂濶無足用也故其自道曰莫我知也夫吾見亦罕矣吾退而寒之者衆也使其謀之皆同問之皆得則其困不如是也昔漢文帝議以賈生任公卿在朝之臣訕之以謂年少其為專欲紛亂耳而賈生卒以是見踈唐憲宗將伐淮西裴度獨持其議其他將相大臣皆以為未可而度卒有功夫二主固嘗詢之矣漢文詢而從之則非憲宗詢而不聽則有功惡在其必詢也其考扵詩亦患人謀之不同其詩曰謀夫孔多是用不集何是詩書之不相同也諸君子以謂如何徳禄問記曰大徳必得其位必得其禄必得其名必得其夀古之可謂大徳者誰歟非孔子伯夷栁下恵顔淵冉伯牛之徒歟然而絀扵魯逐扵宋周旋扵天下應其聘者七十國卒以窮死位可必得乎飯疏食飲水曲肱以樂絶糧扵陳蔡禄可必得乎無仲尼則西山餓夫與東國絀臣名可必得乎伯牛夭顔淵短命以死夀可必得乎昔孔子之扵世亦曰無所必而巳矣今乃必得之何也或者以為此語指舜而言也夫既曰大徳矣則天下皆然也豈止舜一人哉諸君其明言焉民食問民食之制尚矣余考扵周禮廪人之職是其制曰凡萬民之食食者人四鬴上也又三鬴中也又二鬴下也說者以為此給萬民糧食之法也謂四鬴三鬴二鬴皆舉一月云也夫年雖豐凶無常然民食多少固有常也亦可增減乎夫食二鬴而足則多至四鬴不亦過乎食二鬴而不足則制民者下嵗亦使民飢乎給食之法果何如也苟聚歛扵國則期扵民者逺矣出納能無難乎苟散廪扵野期民扵近則吏職不勝其多也夫民食要為之制而巳耳使其蓄之有餘用之有節民自為藏良易也欲以千里之地天子為置吏而以時給之不亦難乎其扵食之不足則移民就糓必如斯言則遂空其地苟空其地則耕耨安得以時耶不空其地其移民之制何如哉古亦有行之者見扵書傳者乎後世嵗凶民之流亡甚苦矣在上者思以法制之而議者難焉諸君子學且進扵仕則可不思扵此乎兵法問世之言兵者不宗孫武之書則司馬法也其道何足言哉然其謀人之國帥人之兵計利以去害其說亦有長者自武之後至今葢千有餘嵗或未之能過也則其可無取乎其說曰兵乆而國利者未之有也予視後世良然間者西方亦常有事矣兵出三年而大臣憂頓兵費財非利就其臣伏輒釋其罪而聽從之盖朝廷經國恤民之制也以予考之扵古乃不然易曰髙宗伐鬼方三年克之詩書載周公東征其久亦與髙宗無以異以二聖之智何其成功之緩也以後世計之兵乆而國不為利者髙宗周公亦不憂扵此乎固有憂而不得巳者乎豈聖人之兵與後世之兵有異也賦稅問聖人職在飬民亦所以資民而飬也然而天下之廣調度之煩賦之稅之不適多寡之中是桀貊之道考之扵古葢有什一之法在焉此謀治體者所宜圗也國家承五季之弊馭四海之衆旁連三垂延衺萬里其間復有偏伯之地先朝納土之後務在便安元元一從寛假是以稅法雖存而重輕未適其中今一旦欲舉天下之籍而均之然慮民心乆安重為煩擾至扵經制之方注錯之術亦未知所從諸君講學洽聞必有佳畫悉心陳之庶驚䝉陋廣陵集巻三十
