body:
  text: 廣陵集卷二十二宋王令撰烈婦倪氏傳近世父母死兄弟相利以財遂因緣不相容必分以居豫嘗恨之又求世之謂律者自非父母在與喪則聽皆勿科噫造律者何邪豈以孤孺未自立一本作主則強不仁者得以侵而分之為限耶使其果孤孺而偶強不仁縱分而不侵者有幾使其不孤孺而為相利一本作人為利以分幾何不長而不容幼而不弟哉一本作兄而不容弟奈何不禁且刑也豫觀今世父母在一本作在盛時則兄弟常無不容或時有亦能相解補一本作相利解補助死則遂割裂以相一本作自殊絶巳而復多相復歡以是而言豈有他哉財既利矣一本作之律復開不禁之爾嗚呼孝悌苟不能尚將教及之奈何率天下而路也噫造律者何邪故今世謂久能相家者為義門朝里交多之往往加旌識復租調以為表勸而民猶不樂從信哉孝悌見於薄世也况又見者少耶可悲也巳天長縣而有夏侯氏兄弟而家者二十年豫固常疑其久也巳而徴之乃為績一本作乃名為績者力焉績善總維每相求柔之族賴以久績死則夏侯氏之族離矣甫其釁者曰開性愎拂不樂相長幼既利分逼兄以兵既而從之巳叨其財田尚慊於他兄弟欲稍稍并欺之間爭不為有則尤強自為利時時攘寇無忌其妻恥而諫者數四巳而知不從又欲奪弟之廡門不得怒捽弟於階墜之傷其妻爭之強既不勝且嘆曰吾言不用爾類相吞嚼終殘傷無復時一本作尚時我不得終為若家婦且死矣是不忍目見如夫為也言之明日而亡既得之死於池池之水才深三尺自非甚疾恨與篤自信者不能死嗚呼果哉使其婦於人尚不以此容於夫而為之死使其夫且官又肯容於民哉其行已又可知巳豫聞而惜之為之傳且傷世之兄弟者又嘆家有一如績者尚不能動死則遂然况君子乎天下可知矣烈婦姓倪亦天長縣人也急針急人之知枉巳之為急人之好枉巳之道世不已好世不已知必為不移守道不隨吁亦幾希憂針天下為憂將道是求一身為憂將利是謀道求我悅利謀我拙悅固莫加拙亦我嗟嗚呼得天下為憂而不憂者又豈若我視一身又况視天下不及我視一身者耶説孟子序自孔子沒百家之説興而聖人之道始散逮至於今而天下之説亂矣故學者求其有知而無所從焉自堯舜三代之書既缺先王之言亡於世者幾半而異端之説日興則天下之學者幾希不去先王以從夷狄也夫五經雖存而説者繆異學者安所取信哉昔孔子沒羣弟子各取所聞集於書今之論語是也幸而聖人嘗言之幸而弟子能存之今其書財此耳不幸言之不及言及而不存者固多矣有如仁有如性有如命皆一時之罕問問而智不及之皆孔子所不對也故語以謂孔子罕言然則論語之載亦略矣世之傳論語者多矣少而讀之壯而不知其義老且忘之終不察其何用故世通以此書為習而未聞有篤信好學守死是道者則其于五經之學可知也今嘗自孔子之後考古之書合于論語者獨得孟子以其言信其人與孔子不異惜其古之人學是書者稀也自戰國荀卿劉漢揚雄隋末王通皆有書以配孟子稱于世而荀卿之非孟子見于書王通蓋未嘗道也夫不知而非之與不知而不言其為雖殊要皆不知孟子者也就三家之中獨揚雄以謂孟子知言之要知德之奧非苟知之亦允蹈之其言雖不多見然亦足以發雄之知言也彼孟子之所為直與聖人者並信夫二子亦何預之哉昔昌黎有言曰夫沿河而下苟不止雖有疾遲必至于海如不得其道雖疾不止終莫幸而至焉故學者必慎其所道求觀聖人之道必自孟子始雖昌黎斯言則然今其書具存而可考其他亦多與孟子不合然則昌黎之闢楊墨以排釋老此得之于孟子者也至于性命之際出處致身之大要則又有與孟子異者固多矣故王通力學而不知道荀卿言道而不知要昌黎立言而不及德獨雄其庶乎大學亦難矣哉是其能立學名世如三子者亦稀矣然或失如此使孟子而在三子者同時固應有辨也假孟子而出其後于其書固應有所取舍惟雄切近之庶幾取合焉令嘗考求古書之當否以聖人折之蓋所見如此故令于孟氏嘗願學我猶病其不能故于所疑皆闕之今其所言皆令所巳信者然亦不敢自謂必與孟子合諸君子盍去其不肖而加擇焉夫道豈難能哉顧其力行何如耳苟聽之于耳以存于心用會于行事則古之好學者皆然也不然亦何為出入于口耳之間徒以為煩耶孔子曰知之者不如好之者好之者不如樂之者學者可不勉乎送黃莘任道赴揚學序人有長冠偉裾氣敦色舒白而輕軀傴而善趨者豈士之謂耶曰非也士豈獨以此而或者士以此耳人有窮窮處處徽攣纒牽􅎲肌出精磨滅日年粘毛續綜錯會朱丹終年求其名能一朝以之入官者豈學之謂耶曰非也學豈獨以此而或者學以此耳人有行肩相差坐肱相支苟論其同不論是非轉圓而旋惡方不然好惡出已去就以焉者豈交之謂耶曰非也交豈獨是而或者交以是敢問何謂耶曰始吾而先千百年古人有為此者吾不得而見也始吾而先千百年古人有惡此者吾得與稽焉昔之人嘗有竒衣婦飾者矣聞有荀子者非之曰是非士之道也昔人嘗有雕蟲篆刻者矣聞有揚子者非之曰是非學之道也昔之人嘗有小人成羣者矣聞有詩人者惡之曰是非交之道也或問士惡乎宜曰仁義是言也仁義是行也學惡乎宜曰遷善而逺過交惡乎宜曰今人與居古人與稽好賢而進不能然則惡從來曰源于經流于人或問人曰師也士之不相師也久矣自三代而降聖賢者久不作天下之弊為日逺矣凡一民之有不獲于古一事之有不宜于今者皆學者所宜焦思苦心以取古而付今於此時而士如此士學如此學交如此交而不知求所師其為不仁亦大哉國家自慶歷以來詔書屢以育材飬士為志而郡縣多立學學益弟子員然鋭精之士野不減少而學不加多或者聘師之道未廣耶前日稍稍聞揚官有學議既而起縣主簿黃任道先生以主之余謂其人也嘗往賀之而任道語余曰教育非我所願當也然我將起州之信有道者與之俱而河南滿建中粹公者乃人也令聞之喜而憂之退而思之曰粹翁賢者也豈特一州善士哉然投藏蔀隱者久矣揚之士誰為知者請誦其一端昔令嘗居揚矣揚之士往往見之而獨粹翁而未嘗見也嘗徴于人曰某宜佳士捨曰不之識則吾言為過矣它日就見之則色溫而言厲其為則大不與吾同令凡心與志就爭者久之未樂也既而矢學之進而視其禮退而復其言者三年而後盡信之故令嘗師處之而粹翁許我則友也雖然嘗試思一本作私之先令而學于粹翁者令嘗問之矣而未之聞也後令而學于粹翁者令宜見之矣而未之見也夫學者更三年猶不肯一就見之借粹翁為任道來假有如令而從粹翁者肯直三年而待盡信耶使令之不自逢粹翁則今日之學前所謂學也今日之交雖璘亦覿耶以我而計人粹翁豈意知之此令之所以當喜而憂也今嘗視任道之為則甚哉多似吾粹翁也所為似之則令之憂于人者同矣如其不然則將見揚學之成也師師而友友坐者讓先行者避後居之家而祥處之鄉而宜登之朝廷而才風而示天下則環千里而慕以來嗚呼盛哉雖然固在學者也于其行為之歌曰歌在古詩之中周伯玉字元韞序至和二年髙郵之學成後三月而令來因盡得髙郵之士方是時元韞之來蓋巳久而學之人多附而喜者令至獨甚後元韞間嘗謂子曰人之于我則然而我之于人要待子則合也豫猶辭且不之嘗然觀其泛泛相上下與衆殊不相分久雖知其意自有所在而外終如無所好惡者然此乃令之所不能也令性朴略趨世喜自徑不能曲折以顧避以是多失于人間亦自撓引時就低下未幾而復以是亦自憂而子乃得吾所不能者久則願合焉一日乃請曰吾親之名豫以玉殆亦有訓而字者忘所稱今敢望子焉令謂之曰甚哉大人之善名子也然他人之字子既不稱是吾亦人也子何所望哉雖然古之言玉者多矣皆非豫所及也豫獨愛孔子之言曰沽之哉我待價者也蓋豫嘗盡心焉又常思玉之所以能取重于世者由玉終自貴重世有知玉而願用之或時一本作將自求去假人無所用之則玉貴猶爾也信乎有玉而強人使售之非唯玉以是賤一本作以是自賤而得者亦不知玉將安用之也蓋聖人之取于玉者如此豫亦敢用是以為元韞之愛也至和之二年二月日王令序杜漸字序杜君山東士名漸少嗜學性澄淡不易語笑平居循循若不自足豫與之交且三年不甚見其喜之與怒也一日採字于豫歸作漸説以字之曰舉世奚不漸天地不漸也一分而永定也聖人不漸也自誠而明者也不午不斥不望不豐日月亦以時而然也履霜而堅氷首夏而清和寒暑亦不即至一抔土之多一毫末之微山林之所以廣大也漬涔行潦乘卑而深積少而多江河之所以無量也一本作河海之所以不竭也􅈱呱而嬰一本作􅈱􅈱而兒羈貫而童一本作羈貫成童華巔而班白人亦一本作以幼而後老也一本作人以幼而漸老也故飛而上者先卑走而逺者先近一本欲上飛者先卑欲逺走者先近物理然也非聖人學亦有漸也一本作雖聖人學且有漸也無漸奚其至故日月寒暑天之有然山林江河地之有也有漸無不至飛禽走獸與人同也有漸有不至自止之也學亦飛走之匹有漸有不至戒之在止則長久而後見其見也必至嗚呼哉請字曰子長幸聽之無忽河東王令序廣陵集卷二十二
