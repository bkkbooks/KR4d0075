body:
  text: 廣陵集巻十一宋王令撰答友客嘗疑西伯何至羑里辱瞽鰥雖父子尚脱井廩酷昏主雖聖臣飛禍安可卜致命遂其志雖窮不為戮送崔伯易歸髙郵山頭喬木長山髙山下泉深沒榜篙春牛畢耕巳閒暇春馬還有人逰遨田中青旗署沽酒道上雙孫抉白毛子有歸資好来比我方飄泊可嗟勞觀魚江渚日夜歸江痕下汀磯漁者不自勞推舟就寒漪得魚樂㡬多忽忘身在泥未聞任民風豈信絲緍非山中山頭樹青青山水日泠泠攀樹掛冠一本作衣裳飲水清肺腸自然古心髙忽與世態忘有道不足名無責身始康快哉行呈諸友兼簡仲美脱巾草坐踏地歌花影落酒生紅波㧞劒横膝仰面笑醒眼不識天為何平時塵土埋英雄却學弄筆為雕蟲太阿補履不足用老驥捕䑕終無功安得雄心大胆子與之把臂論心事不使生前眼見仇何用死時尸磔市人生病老多壮時百嵗祗如梭過機安能跼促努筋力眼穿仰望丹桂枝壬辰三月二十一日讀李翰林墓銘云少以任俠為事因激素志示杜子長并序皇祐壬辰嵗天子詔天下興賢者予以故不預因竊自念生太平世讀書學古自少壮期切切以自奮進裨補當世之萬一不幸窮蹇顚倒不得比常流作古詩二十韻示山東杜子長秀才喜我者也亦可預進士舉因以勉之云嗟吾為顓䝉木朴無所思成童始就學數嵗通書詩十五尚意氣自待固不卑嘗為冨貴易有如塗上泥苟意欲自進足至則履之二十忽自笑學乃謀寒飢倘冨貴是致其亦壟斷為雖曰為學難我易易則冝墻籬號障塞猶可鑽隙窺豈此聖人道苦勉不及期反覆私自念已急猶懼遲思而或有得行之固不疑跛以見聖賢不及猶可随道逺志所畢疾驅亦忘疲逮兹五十年財若穿銅鎚柄執似可役持用寧無施何意甚困躓不及庸常兒多病骨出露薄食筋力羸䑕飽晝睡穴鷄飛暮乗塒世旣鷄䑕儔冝吾安窮竒慎交昏鏡無好面惡土無善禾鏡不但自昏損人顔色多地惡根不長禾死其奈何必欲識巳真抆鏡除埃塵必欲得善禾易地勤耕耘安得浪與兒誦口而思身西園月夜醉作短歌二闋我有壹欝氣從来未經吐欲作大嘆吁向天穿天作孔恐天怒琥珀春撥醅泛艶紅出盃無客尚有月把對心尚一本作暫開踏地長歌仰天笑突兀坐見朱顔頽從他日月趂人老一醉萬事皆悠哉丈夫身在不憂困未必天心竟不囬又醉眼不識天疑是髙帳幙忿月喝不住起欲取繩縛誰令吾不飲飲劇始知樂若令東海觧醉人吾亦去取北斗酌春夣春風兒女喜不合丈夫愛日午困魔来四體倦欲觧春禽只随花中飛幸此無聲聒我睡一夣夣周公笑與伊尹語問今天下賢者誰何為見棄不見取紙傳周官十巻書安用久留不燒去二夣夣孔父㦸手怒目瞋天下皆曰自孔氏獵取利禄安榮身髙官志遂不思道牽以嗜利露已真如何貧賤用我者皆是冨貴用我無一人三夣夣我身化為鳴鳯雛飛飛兩足髙迅迅六翮舒直上髙髙天天門閉鎻阻我囘我留不肯去以翼摶天天門開天公遣玉女問我何事来再拜謝天公賤臣無所知幸至天公前敢問無一本作何所尸臣聞伊尹于湯旦于周安致天下如山丘愚孫騃子相承繼卜世以過天位留自從中代来世世亦有相如何反覆無定時猶以亂割醫瘡痍天公何忍是不救恰如旁坐觀奕棋又聞人間人一一天與命孔飢孟退荀楊賤天公豈不知其賢與聖顔子號庶幾早死不久生子夏旣䘮子左丘亦失眀伯牛疾牖間原憲貧病成晁錯死非命賈誼夭不卿賜死蕭望之罪免劉更生羊祜許國斸墓破反得墜折無完肱又如草木及禽獸苟推以理亦莫知春氣不加松柏好秋風先敗蘭蕙枝蝮虺中人皆巳死鴟梟食母然後飛願天明告臣以祛臣心疑天公未及言起遂東風吹覺来何所喻壹欝雙泪垂寄王正叔形骸飫饜城市勞思得逺志與俗逃借来馬病行欲倒著鞭廹急翻奔跳連綿半日走十堠急雨随濕衣與袍到家覔火烘衣濕亟書名紙揮墨毫由来道同志易合頋人謂我此一本作子可交形穢向逄珠在側聯坐愧用狗續貂喜愛常令對面月招延不許他有庖𤣥談直抵世不到大論許致君為尭喧呼脱落一本作路笑絶倒中樂不肯旁誚嘲久孤得聚一本作助氣遂振張目視人皆麽么促席捉手坐接膝不肯放去逾分宵平明懶睡未及起稠叠僕足煩見招披嚢示我丈數紙晚霞爛漫一本作滿新晴霄魂迷心醉不敢議畏伏縮若䑕見猫同騎疲一本作瘦馬逺眺望獨止不進湏連鑣江東山水雅豐冨熟視若在圖畫抄嶙峋髙疑地作限浪一本作浩𣺌逺若天不包是時髙秋鱸可鱠愛欲棄綬同魚舠直道有知私自賀生平欝結數日消笑顔快意面改色食飲愜足腸生膋今之腐儒不可洽欲近俗氣先腥臊尋常語我我不聼視如秋月鳴蜩蟧數日忽得正叔語温玉摐一本作縱擊金相敲胸懐坦儻氣熖大天馬斷轡鯨横濤惜乎偶㑹復促别歸鞭行袖交相飄還家日益無聊頼口久不語如著膠畏人常先走木猭得食毎後殘桃螬飄風西来嵗月晚寒壓天面低不凹一夕濃霜死一本作洗羣翠病若火逼毛髮焦鳴鴻南飛一本作歸地得暖鴉一本作雛烏暮去林有巢使人對之亦自感平時乃此窮途號百憂叢侵方寸亂頂髪不癢手自搔時時強酒期自醉不忍把筆一本作把筆不忍私成騷近嫌文字不足學欲出簡札臨淵抛惟思邊堠願得到耳静意若聞金刀安得鐵馬十數萬少負弩矢加矛腰力在快戰不願守直令疻鬬而血鏖東西南北四問罪使人不敢誣天驕增尸為城骨築壘滴血釁地塵不囂歸来再拜賀太平亟出敵首都城梟如何壮志不可遂窮愁壓挫朱顔彫因君知我故道此以代面語相喧呶贈劉成文予生謝早先晚世相逅邂禮俗不可徴百孔千瘡壊平時以是念食美不知􅓐一本作嘬誰為醫國者已亟不圖瘥引脰望古人去我逺以太斕斑紙上語十才一二在思人樂其言把讀不知懈愛其善調理未訖已期再探窺古人心憤懣世俗敗常思得英竒肝肺相誘勱以是求世人未免許以漑不特學憂孤直恐性失介嗚呼聖賢人旣以舍我邁如何有常者亦不可得拜雖然衆嘲揚未忍徑伍噲劉生江東儒心臆寛不隘遇我數日語收若俯拾芥久從固所望驟得尤所快立海觀鯨鯤乘霄飲沆瀣和風吹滯酲利爪搔痒疥我質遂媿陋香禾映粃粺和言遂愧踈長江掩涔派辱索冝有獻百擇無一愛作詩期笑咍幸無怒目睚唐介并序唐介以言事得罪人多詩之僕亦欲詩之又嘗思曰為諫官以諫得罪冝矣而人詩之是亦當世以諫得罪者少也然則介又可詩也已以諫得罪者為誰一本作聞者誰四海多作唐介詩俗兒口狹文字碎欲状介事語反卑嗟嗟我亦介之徒一本作介之比此恨不助一本作恨不助介掀目眉三更燈死百慮息四睫不交雙目眵推枕起坐状介節以手捫臆為介思信乎介亦壮男子直能金鐵其肝脾雷霆之怒萬鈞重人主之威猶過之一語所犯百死在要領可斷族可夷堂堂介也人之難不畏所畏将所持捧書入奏伏文陛身視赴死如食飴面折庭諍語論險直舌鐵硬堅不移天子怒叱大臣語衆笏交一本作共抵侔戈揮如何面笑目不瞬氣不略讋顔怡怡即日議下得逺斥中使臨遣監妻兒奈何左右口吻毒只有死請無還辭然今天子甚明聖雖暫盛怒終復歸嗚呼能對治亂鑑介也能􅋞其瑕疵語曰五諫吾從諷仲尼逮一本作遣殆有激而為後世巽懦禄位徒縁此粉飾尸素非必也事有不得已冝乎訖死争不囬偉哉介也已不朽日月為字天為碑寄語𤨏𤨏媒孽子介縱蹈死吾何悲還東野詩吾於古人少所同惟識韓家十八翁其辭浩大無崖岸有似碧海吞浸秋晴空此老頗自負把人常常㸔于時未嘗有誇詫只説東野口不乾我生最遲暮不識東野身能得韓老低頭拜料得亦是無量文章人前日杜子長借我孟子詩三日三夜讀不倦坐得脊折臀生胑旁人笑我苦若是何為竟此故字紙童子請我願去燒此詩苦澁讀不喜吾聞旁人咲嘆之殊不巳又畏童子言藏之不敢示奈何天下俱若然吾與東野安得不冺焉偶作女醜忌明鏡不知自羞人士醜忌公言不知自羞身羞人不出前醜聲日可湮修身無不至令問一本作令聞日益振鏡與言何尤見忌不見親烏鴟雄烏無空衝雌烏無定飛一巢不易成兩口千柴枝巳髙懼風顚已下憂人窺欲集更自翔旣安復重移烏巢又生烏復哺猶可期鴟梟亦有巢母死子後飛嗚呼造物者於此竟誰尸寄王正叔微生不過人氣力兩𦕈麽力學失自謀徑古與今左病世相陷賊樹性期剛果豈不中是時然亦未嘗過奈何衆好殊未語咻已夥倀倀獨何之云云鋭亦一本作易挫忠言不售耳直面屢得唾怒目瞋以環謗口焰而一本作如火出門先自羞一本作慚有衣恍疑裸過市不成歩傴僂侔鼈跛周旋不出扉迷若蟻循磨人惡固為甚自厭近亦頗媚世定有術欲學從誰可必也泥自售一本作信恐由此始禍賢子逺相問幸有以敎我得報速是冝翹企不容坐不願漁終焉一本作身可伯為不願為漁子當時渭陽人自是一本作示直釣耳今非結網身一本作心豈有得魚喜試身風波間特用豢妻子古今同為漁意義不相似採薇南山阿歸耕南山下食苦心無虞守約自閒暇出處皆有一本作由義在理無用訝今人舉一隅何足語學稼雜詩效孫莘老孫詩附魚蝦無所能動輒困人得蛟鯨能則乖覆舟取人食龜龞能謂殊刳剥同一劇龍不入網羅亦不為人識犬羊飬扵人壮則人食之猛虎嗜人肉一本作能食人終一本作亦昧獵者機豺狼與狗同為害豈必威封一本作豊狐能為人還作行子妻雜詩呈逄源孫覺鴻雁最知時未逃羅與網不能忘稲粱千里安得徃鳴蜩腹空虛見喙因其響丹鳯穴九霄虞人常夣想廣陵集巻十一
