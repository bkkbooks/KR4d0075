  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_006-1a, image: WYG1106/WYG1106-0423a.png}
body:
  text: 廣陵集巻六宋王令撰猛虎猛虎出白日其欲未易量人人有怒心常懼不敢戕壯士獨何者忿氣裂怒腸脱身㧞劍去奮躍如驚翔雖挟必勝術豈無邂逅傷虎不食壯士壯士自虎當意貪衆人完豈暇為軀防虎死衆人惠虎存憂一鄉果哉彼丈夫頼有一劍將使其無所操未免伏道旁有劍不刺虎為謀信非臧無劍徒虎爭雖勇適為狂利劍亦可嗟人有我獨一本作獨我亡日暮南山阿直道何可望一虎固已爾况復千豺狼答問詩十二篇寄呈滿子權令既愛盧仝蕭宅二三子之詩而猶恨其發之輕也然忘其効而更重之則得矣逮子權之起予予實慕之輙為十二篇其意亦不異子權所謂東墅諸子答問者予獨廣之爾其水車之篇獨異於子權然特其文則然吾之子權與吾與他知詩者謂為不異也鎛問耒金堅雖不磨木曲亦已揉幸䝉主人用反要主隨後適從一本作彼慵耕兒雖功不見取良田常無収何塞不耕咎耒答鎛我用常在金任金適由木苟得金為用何惜木微曲幸得主人隨不恤汗行犢必求隨主人我用諴不足又我用於主人良田无虛種主人不我以我適為無用不知主人飢嵗卒安自奉由来我求人孰與求我重又我必為人用不必用於人若也責不耕君眞問諸田耒問鎛一畦失之荒爾力亦可耨天下方漫蕪爾功亦何有鎛問耒一本作答耒天下方漫蕪顧我適有庸使其巳除滌我將何以功我豈大無效一本作無大效自是用我慵耒問斧子斧誰爾為黒白大分别朝伐一樗死暮伐千樗蘖爾終不自謀幾日一本作幾何不缺折斧問耒大樗吾猶伐小樗何畏蘖吾缺猶俟磨爾折將奈何水車問龍来何必召雲去何必飛天我名不為龍何能雨爾田龍答水車神龍謝子車子能未足多上潤雖已然一本作足下竭將奈何水車謝龍水車謝神龍下竭固無奈旱則我為用爾龍尚何謂龍謝水車神龍謝水車吾語爾来前爾雖用於人亦我用於天在物固不同於用豈殊然水下髙田乾爾能俯水取假人不爾用爾受田責否吾身雖為龍動亦天所主天猶不有命我安事為雨秋懐槭槭庭前樹一本作槭槭庭樹葉朝零非昔稠呦呦草蟲鳴暮急曉未休爾雖無不平豈亦有哀憂胡為勞吟呻與士傷感投壮士亦何者哀我與蟲酬所抱不列陳調苦難謡謳髙目有逺見直懐羞曲求蒿藜襲乆安功名忘前休日月忽未幾天地今復秋少壮負所懐老大將安謀生無及人功死骨埋泉羞胡為不奮飛徒與寒餓仇中夜晝日苦卒卒忽焉一本作然不加思長夜漫不眠起復日所為所為浩多愧不與初心期虛云聖賢學實從世俗歸雖恥猶奈何長歌涕垂頥又擾擾從俗為日與所學戾茫茫坐三復心面自相愧守道惡從人取俗一本作食患髙世誰令二者異不得一吾致士患常不學士患常不學不學常㒺然學成安所施用舍繫諸天孔孟去已乆寥寥泣遺編斯道未易為今古如同年舉舉媚學子舉舉媚學子居曰不吾知知而有不能無乃失於欺不知未為患不欺浩難期咄哉天下懐何以天下為秋日秋日不照天秋雲自明晦脱葉下衰草蜩蟬事今退天地功方成草木猶怨顇志士感所懐長吁下清淚秋興秋風吹人有髙興醉懐感物傷盛衰秋来縱得蒿艾死嵗晩已非蘭蕙時哀歌不入俗耳聼大笑自與萬古期長鴻𡨕𡨕爾飛好雖有繒繳安所施翩翩水中舟翩翩水中舟既滿何用載主舟者誰子無乃忽於敗兼濟雖期仁過任適為害自是人致然已溺何足怪書懐寄黄任道滿子權西風吹雲空晴日露髙曬駑馬無速騁歸客思逺届長林剥霜紅逺水漾寒派露蟲悲自一本作且咽風菊老猶介昔予来方春㷔㷔樹生態今歸亦未幾馬踏落葉壊時物固有然盛衰信難概吁嗟為生勞黽勉計無奈伊余有遐致乆此困俗械嘗思擺絶去自放出世外髙懐樂天寛逺目斥人礙有田足晨昏有圃具葅菜父母不待養妻子固易頼世孰得丘山亦孰失蔕芥人自能輕重吾將守所愛六經老誠明萬古熟成敗得時為醢鹽滋味和鼎鼐失猶有萬世令名自沽賣自視乆已明决不事謀蔡寄詩侑子觴期子和而一本作且再令既有髙郵之行而束先兄弟索余詩云擾擾利學者乆不可與謀讀書乃何為老不知軻丘弗恤義所在務期髙爵収嘗聞失則嗟不聞得之羞知誰洪其源使世乗其流於今巳汗漫更乆將遡游嘗聞古人言饕餮為共兠謂惡豈必多偷飽徳弗修不知自思者舍此何所由故余早知懼誓將異人求寜為寒餓嗟不同富貴謳此行况有獲師徳髙前修因嘗請子行勉子無逗遛於吾乃何有同病不獨瘳雖愛謂予然尚疑子終不惜子有髙材竿幢揭華旒苟能自擺去不為世學囚行將見逺到强弩射弱菆何必請予詩自合治子輈酬束丈貺詩兼叙所懐白日立中路犬去不形相夜以一本作有盗自来何敢怨犬傷主人忽加念謝恕犬無良盗子愧伏前有言願加詳見賜固巳多恕犬誠未臧惜交詩贈束孝先千金得寳刀不若得揷歸寳刀雖云利邂逅傷瘡痍傷瘡有復日傷皮無完時不若逺所傷取揷安自持一鑿以成井再鑿以深資清泉冽其中定徳發不移飲可沃吾心浴能清吾肌此道如必尚一本作當庻幾有常為既庸銘我前又書薦余知再贈束孝先玊缺見不撓劍折知真剛張目不見心人固未易量念我未知子徒知一本作然外觀望安識子所懐赤日包白光去去終我身兩兩無相忘縱予道路憂骨尚付子藏卜居吾求一屋逮兩月貧不謀貴一本作富何以圖朅来自放就窮巷幸得之喜何敢吁頺簷斷柱不相締瓦墮散地梁架虚門無藩䦨户不閉時時犬彘入自居主人於我莫自致為我補葺加垍塗翻翻匠氏乃誰子頡頏作氣厲呌呼羣雄洶洶助聲勢睥睨凌我要我酤歸来嘆息無自得兩日財致酒一壺徴多償少意不惬棄我忽去如逃逋重来閴寂不可問依舊四壁編空蘆嗟余雖貧日猶爨可不善為盎釡謨外户不閉古則爾今也盗賊過街衢乞錢買籬作籓固更學關楗防朝晡鄰翁問我乃何者得毋亦以名自儒王朝潭潭聚冠盖幾人不載卿相車子何布被不盖肉浪自名士一本作浪稱為士實則奴假為無能守編户猶可自擇安閻閭胡為􅆭戚卒困此去矣何屋不可徂此居卑注不待説四髙中下流無渠夏霖連延乆積注徃徃竈下秋生魚始来圖此不自擇終見坐與蚯蚓俱何况梁壊日蛀一本作傾腐一仆非爾力可扶苟来暫安急旦夕反以身就殞壓虞乃知窮則失自愛死得正命有幾且翁乎爾言誠得矣我方困甚非眞愚聞哭冬温春疫早死者晨滿街但聞哭子悲不聞哭母哀老慈愛益深壯剛氣則乖嗜欲奪天性情思占妻孩詩三百具存聲巳亡南陔人情古不美况復嗟今哉養賢萬鍾豈不多財得孟子辭千乗友子思猶曰須我師古賢不易養養賢則巳而今賢養自易無於古加疑廣陵集巻六
