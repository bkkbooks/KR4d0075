body:
  text: 廣陵集别集類二宋提要臣等謹案廣陵集三十一巻宋王令撰令元城人㓜隨其叔祖乙居廣陵遂為廣陵人初字欽美後王萃字之曰逢原少不檢既而折節力學王安石以妻呉氏之妹妻之年二十八卒遺腹一女適呉師禮生子曰説其集即説所編凡詩賦十八巻文十二巻又拾遺一巻墓誌事狀及交遊投贈追述之作皆附焉今才思竒軼所為詩磅礴奥衍大率以韓愈為宗而出入於盧仝李賀孟郊之間雖得年不永未能鍛鍊以老其材或不免縱横太過而視局促剽竊者流則固倜倜乎逺矣劉克莊後村詩話嘗稱其暑旱苦熱詩骨力老蒼識度髙逺又稱其富公并門人相答孫莘老聞雁諸篇古文如性説等篇亦自成一家之言王安石於人少許可而最重令同時勝流如劉敞等並推服之固非阿私所好矣其集久無刋本傳寫訛脱幾不可讀今於有考校者悉為釐正其必不可通者則姑仍舊本庶不失闕疑之意焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:060fab093329f8053b2e8808da5447de409b1ffffc3d429e833147274bb9fb07
