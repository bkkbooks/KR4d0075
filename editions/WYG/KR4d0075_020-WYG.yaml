body:
  text: 廣陵集卷二十宋王令撰正命語曰子罕言命然則命固聖人罕言之矣自西夷入中國以佛而性命之說始雜而孟子嘗謂人之性善而荀揚者互出以爭之自二子之興而孟子之說益明而今世言性者尤多而詳大要歸孟子則為得而世之好事者徃徃偷去以附佛而為說然亦言性者未罄也而命之說尤旡言而佛者盡狀人死生終始之迹以籠人而為命而隂陽之家復推歩五行之支榦日月星辰之經躔遲速以迎合人之脩短貴賤以為命而愚者自思旡以出其說而信惑之其源盖始出于惡不必斥賢不必用而人始惑于貴賤矣死有脩短而賢者或丁其短而愚不肖或老而稱年一本作老而二字而人始惑于死生矣故佛老包妄以為談而隂陽者騁竒以取􅃷然人之信且惑者大要不知命也夫舜賤而為庶人貴而為天子是莫之致而至者也然而舜致之以孝使堯之時而舜以孝且聖則命亦可為邪抑堯以丹朱為不嗣而廢之耶以旡命而廢之耶而舜避之南河之南舜何為不知命使舜而為知命則避亦詐哉歴者曰歴之数始于易是伏羲而來知易莫如文王也然而文王拘于羑里曷為不知命苟為知命曷為憂患而作易哉一本無而作易三字文王之後聖且知易又未有如孔子也孔子曷為不知命苟為知命曷為聘七十二國老而後止哉如古之文王孔子猶且不知命而謂今之星家歴翁能知釋者能言耶借釋氏隂陽之言之然則是人無死非命也人無死非命則死實命之由然而不在人則是桀殺龍逢桀非有罪也龍逢之命之一本無之字下同然也桀順天而致命者也紂殺比干紂非有罪也比干之命之然也紂順天而致命者也如是則桀紂不必為善為善不免于誅命之然也跖蹻不必不為惡為惡而死不减夀命之然也幸而釋氏隂陽之言不盡信民則惑而無自立不幸而釋氏隂陽之言盡信之則當死者不死不得以義責命之由然也當生而死之不得以義正命之由然也若是則上無暴誅誅者命其時也下無暴死死之者命其時也夫然則烏是堯舜烏非桀紂哉嗚乎其亦不思矣夫人之學釋氏隂陽者謂堯舜生桀紂之時則亦為桀紂之暴耶不然則人之命死者何自處之也謂桀紂生堯舜之時則亦為堯舜之仁耶不然則人之命不死者桀紂安得而暴哉使釋氏隂陽之說行而天下盡信以為命則將見盗殺其父而子不復曰父一本無父字君字命適至然也盗殺其君而臣不復曰君命適至然也不然則不知命而逆天理矣故予嘗謂人不可不知命而不可知非命不可知非命者前之謂釋氏隂陽者之謂是也人不可不知命者知其命之自我云也命之自我云者天下有道以道殉身富貴我命之也是命在我者也天下無道以身殉道雖窮賤死而不囘亦我命之也是命在我者也夫人生之有死人之終也死雖有長短一歸于終爾故曰死生非為命唯其死生之者為命貴賤貧富非為命唯其貴賤貧富之者為命若是則死生有義我不敢苟死生亦義之云也我所以命之云也故事父有道事父不敢不死事父之義云也我之事父之命云也事君有道事君不可不死事君之義云也我之事君之命云也如是則子得其子之命臣得其臣之命旁推而逺及之無適而不得命君子謂之知命昔者孔子嘗言命矣在困之卦曰君子致命遂志夫困為無用之世有言而不信君子尚何命以動哉故君子致而遂志耳使如人各有命則雖死何可致耶又彌子瑕嘗謂子路曰孔子主我衛卿可得孔子曰有命然則命者謂我有義命之也不可主佞人以求卿也其傷顔子則又曰不幸短命伯牛則曰亡之命矣夫者亦謂二子之死之短不能盡其所以自命云耳而孟子亦謂知命者不立巖墻之下而桎梏者非正命夫然之謂知命志述士之所志不同因以有得失則信然予固不能一也若夫明哲自重之士惟其道之所以而信之猶謂其志有得失余盖非之而未信也夫士之所趨不同固多而其志則有二利與道云也志于利者禦人而襲其千金䝉惡犯上以盗其國與非其道而枉人之斗筲雖所以取之不同輕重小大之各異然志于利則為之不志于利皆不為也是其志于利則同也夫禦人而人亦禦之䝉惡犯上而不獲任人之斗筲而不得其是曰失吾志云耳然則是失其志也若夫志于道者得其時挟其道進而行之天下所得吾志者道也富貴豈吾之志哉非其時而道不行于天下去富貴而不居是猶吾之志也曽何損益于吾心哉以是言之士苟以其志進退于世雖大行窮居于勢利則然其為志則一也夫心雖不可必得之于天下豈不可得之于一身哉故曰士未嘗有失志也今之沛然坐人上以享牛羊之食者人視其面盖赫然退而語之者謂得其志故也是人亦謂以吾之得志故也今褐衣不完飯糟糠嚃藜羮以自顧者盖其氣怫然人之言者曰是其失志故也其人亦曰為其失吾志故也不知人將志于富貴者乎直將志于道者乎夫苟志于富貴則誠然苟志于道則余知其兩失也若夫良志則不然其堅如金石其常如金石其照如日月豈以外物之接與否遂以為得失哉余觀世之顯者驕而不見其道于天下賤者失已不能自恱以余考之常兩失其志如此今吾言之欲求其志者知在此不在彼則將有得巳而巳者雖然余亦用自鑒耳或曰孟子之言得志者非歟曰彼以天下言也故有得失余言志之在身者故無得失然歟然則孟子與余言何異哉醫喻一邑之醫舉十人一人實能而九人名不能能者嘗任醫不能者嘗任人任醫者如何曰某病也是必砭某病也是必藥曰砭楚而藥苦奈何曰病必砭藥而巳如為置楚苦則死未可諱也任人者如何曰某病也是宜砭某病也是宜藥曰砭甚楚如可藥易之曰是亦藥可也惡在其必砭曰藥甚苦且奈何曰是亦有甘者耳惡在其必苦以故而不能者常為用能者常不用他日邑長病疇咨左右而可者召其九人之一人焉重数月而病無損又召其一人焉則仍無損更五六而不及能者然後嘆曰邑無醫後之者不尚前不若復召初為醫者巳而召之噫是人也何不思使其有可療之道則前固用之矣不待数月而後徒巳也如為無益雖召之將加病何一日困且憊其子有為能者言則罵之曰醫召固在我是故惡出夫彼吁乃人也何其瘳其于未死也幸讀孟子予讀孟氏之書一年而奮奮于㫖中二年而縮縮懼不能行三年而退黙以吁嗚呼孟氏之道可知矣方周之衰天下諸侯紛起以爭强謀相弱一本作脅弱衆謀一寡天下之士鋒口以起迍兵交戈相搖以一本無以字鬬而不休惟恐殺人之不殘收地之不多屠城滅國之在一本作或在人後然後天下之君下堂去席引手側耳以願就其說而謀聽計行故朝而襲人於前暮而人襲于後一勝一負不移踵而相復血骨滿野不一顧者而日磨銛淬鋒以力齊地醜抗不相上下方是時貪狼之君朝敗而暮討已心疾一本作忌口歎謂復恥之不速又聽昏視淫廹於一切之見方此時而教以王者仁義則謂為迂濶而無益于事也必矣辟猶志在逐免寧肯輟坐以待免一本作鹿又肯信不顧之走墮穽而遇虎耶故三代之季暴亂未有久于周者無他聖人不出賢者擯逺不聽而中庸之君耳窒目蔽樂于所以亡而不悟所以興卒至咽呑銷蕩財六國而秦復暴有之又遂大亂而聖人之言息矣漢興孟子與五經連置博士而當世學者不知先此自西漢賈誼劉向軰號為多言又嘗爭出以謀憂天下而于孟氏之學不切切深造則漢儒之學可語哉自唐韓愈前一本作首倡之後天下日知所向至今則孔孟之學盈然矣然卒有疑者今其言區區欲以百里数百里之國五年七年之間懐諸侯以有四海復為政于天下又其言皆曰有七十里五十里興者未聞以千里畏人何時如此其難而功如此甚大效如此甚速也而孟子之後學孟子者皆為公相輔有天子之天下而乃至不能治辦務理顛倒而不能條貫舉天下求柔四夷年飢蔬榖不登則民皆殍散烏在其能不以千里畏人也豈孟子利于自一國而有天下以為政一本無此三字而不利為政于天下耶不然虛語耶不然吾何言哉吁書墨後班固言墨書七十一篇而今之傳墨者財十三篇耳又其書多非墨所素心予嘗按書傳之雜出者合質之多無得也然論其大㮣亦時時取吾儒裼襲以自出故同是堯舜而非桀紂無足疑也自司馬遷之博聞而猶不知生於何時故云或先後孔子而未知也予嘗評之而謂使翟而先孔子以生則翟之荒愚當得先矜哀而後誅使翟而生孔子後則元惡何待教耶予讀其書至其所謂絲染篇則益憐翟之昏不明而妄傷人之失習而不知巳將習人以失也然後亦疑翟實生孔子前也然翟學之興雖翟固有罪而所由亦時然方周之衰先王之法禁盡廢天下之士爭出而名家者甚衆然翟亦其一爾方此之時先王之道息天下之士皆不知自為學雖仲尼之先之後而道未盡信天下故翟于此時出與間㑹故從翟者多也然翟之能偷天下以自名豈不為幸耶而予獨傷翟之不得後孔子故不能自有知又其書傳之不幸而令人信以遲永翟罪以予觀之翟乃不幸也然予獨愛孟子之能第次人曰逃墨必歸于楊今而視之雖害人者有殊差而豈能一逃孟子之言予嘗病世之釋老者則思得楊墨之書以校比其淺深故嘗兼求之而楊氏之言絶矣豈害輕者去之易耶而墨之書雖不完在然要之世傳不盡廢也其書雖缺而其大槩固具存爾夫楊氏為我㧞一毛利天下不為豈老之謂耶墨氏明鬼尚同磨頂放踵而為之則佛矣然佛老之害當世雖同然當世之受害則老輕于佛以是計之又豈逃楊歸墨一本作逃墨歸楊之效耶至于二夷之荒妄雄猾所以資禍當世者計楊墨則其倍又百矣然世之學多謂孟子之後楊墨者空矣而不知老楊佛墨之関合如此也嗚呼道之不行自文武一本作成康而來其巳逺矣然仲尼之後数十年而墨墨数十年而秦秦数十年而老老数百年而佛佛今千有餘年矣而其間特力獨抗撥邪說而自正者財孟子與韓二人爾然又身立無由道不及天下財空言以待後世則今其道得不絶冺者抑亦二賢之言耶而予嘗觀當世佛老者徒張誕以射愚而人不知其為害者信亦幸矣亦不幸吾儒之道不被不為却掃逺弃耳而亦幸而釋老之無人不然則孔子不復容于今而暴秦不獨暴于古也然世之學者獨奮攘兩手直進不旁顧以鋭于入夷非唯終自愚更左右出以牽獵當世合羣起而助之攻噫亦甚哉予嘗視世之䧟佛老者有道惟貪與懦愚不思耳貪故樂為之誘懦故易為之懼愚不思則自擇不明合三者于一心則何適而不入耶今予之區區惜翟之不後孔子以生而惡前孔子者非徒愛翟也欲學者之知今而學翟者罪之過翟也言學翟之罪過翟者又欲其知釋老之又甚之也作讀墨廣陵集卷二十
