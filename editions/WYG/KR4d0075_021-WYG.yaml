body:
  text: 廣陵集卷二十一宋王令撰書秦醫後太史公曰秦醫其智矣乎夫知其不可為而不為也彼攻之不可逹之不及藥不至焉醫亦何以為也吾觀世之醫而死者甚多未見知其不可為而不為之也彼知其不可為而不為之者其良醫乎其亦智矣乎書明皇紀後唐續大亂之後天下困苦人人思休息迨一作逮諸盗殱盡四方無事抛棄弓斧歸復耒耜民始有生心時亦小康至貞觀中君臣胥熙上招下來朝無遺謀民無遺殃而天下治平矣然當世之臣猶失淺近故唐雖暫平而無長久光大之策卒使于古有愧繼之髙宗循而不修終無事於天下而武氏女子排房闥出自稱制而天下亦安之豈非武德以來積治承平民方德唐而未思亂也及明皇帝平韋氏戡内難出承睿攬有天下然能多自勤明又天資神度超㧞上世而亦鋭意有天下心又開元以來諸臣忠公宣力悉心加之天時連仍吉而不凶故能斗米五錢民行千里不裹粮糇天下既富矣人人自愛䕶不肯欵觸刑辟故連嵗决獄纔数十計自周漢而下千百嵗已來語為治平無出貞觀開元也太平既久上志日益銷墮當時窮謀竭力之臣半以老死後來者幸以佞媚進亦以佞媚終然不雄悍狡愎隂為中賊故直者伐㧞忠者流逐天下之事靡靡寖敗壊而不之悟方且伐鼓賡歌曰形咏太平更漬溺一本作清竭幸愛雄牧要官随意授之不問其賢能何如故内包國忠之奸而外稔禄山之禍又天下久平人不識兵革令守皆常俗吏惟知循奉條章文飾奸隙以窺伺富貴而巳故潼關一䧟而京師旋溺天下守土之臣如壙土爾誰知赴君死國之為宜然哉及其西遷之初棲棲如旅人以天子之尊数世之德而不能活一妃妾宗族逋棄或且誅死而方􅋞淚􅐵吁以為無甚負天下不亦謬哉迨肅宗即位計較户籍而禄山一亂所失五百餘萬存者半之吁人死又勝数哉百姓何罪也唐室之衰自此始矣嗚呼明皇帝以積德之後又承豐餘富庶之時如此然且不免一旦之亂又况其不及明皇者可不思哉詩曰迨天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮予信夫作此詩者知道也非周公吾其謂何書李勣傳後論曰隋唐之交天下大潰而所在虎鬬龍争而勣於此時能牙爪出以自用天下巳平矣文皇猶多事四夷而嘗得勣以甘心故突厥延陁之平勣尤用自偉而世主亦多尚之獨君子者有以罪勣也而文皇頓傾心以注勣雖耏鬚有以為勣用者猶不嫌有損以賜之而况其外者耶殆其終盡之言則甚矣太宗寢疾謂髙宗曰汝于李勣無恩我將責出之我死後汝當授以僕射則必致其死力豈於勣猶有遺憂而平時亦以竒御勣耶及髙宗廢后之議竟亦得勣力以致武氏移天下然余嘗病文皇之不果于明如使勣尚為用固巳嘗用之如猶有一日之憂尚多其前功則自可休豢之且俾來者無授以柄則巳矣如天下方有事顧勣獨有能不若亦以忠死之一本作不若以赤心死之又惡在賣之以収其力哉然如勣雖有用于一切而常不可為文臣謂其未知夫所以愛君也方武氏之議如遂良無忌軰更探沸一本作湯以患􅉯而勣獨忍不顧雖其心固自有存然亦有所從來也然勣曺終無用假之得其力尚何用之適宜為憂矣余讀之至此惜其知人常無難而使人常難于知人又病其使人者多不以道也故重言之然至勣之孫敬業竟以兵動武后時而謂為復唐以誅豈非天耶然為人臣者亦不可不知其愛君也讀石介原亂因書古之治要自井田之壊百實同踣無復張起昉于衰周以至今日二千年間其為治平如客寄故靡靡日轉潰腐猶一軀緜百創雖間有膚儒碩人摩按吮傅為得飬䕶旋即剖割以至於肉盡骨出無可奈何猶將觧筋折節􅋞血視髓破碎而未之止嗚呼弊吾道者不巳甚乎於予何從而誅也雖然固有可疑者聖人不出賢者棄之不用而邪駢蠧交相扇蕩而不休又豈孔孟之謂天之將喪斯文與未欲平治之然耶宋有天下行百年名儒六七作然猶逗滯淺近未經絶古雖間得聖人之遺言苟置于大有為則未免泥與匱以是使人不多喜其書及得石公操所留文若原亂明禁等篇是亦欲有為者也有欲救之言無可救之道吾則謂斯一本作斯吾具不為公操爾惜夫不之用也巳道傍老父言癸巳道傍老父髯而黒瘠天甚寒衣破上而露下王子過而嗟之老父曰小子何為嗟答曰翁老矣衣食不足以勝寒餓筋力巳疲不能得自休小子不肖竊有志故敢以嗟父曰子來前吾語汝夫畜者求食蒭犬者懐葅然則尸之者宜若然耶且不知吾軰又尸之誰也天乃亦宜牛馬其思歟答曰太平之世明天子在上四民各獲其利衣食所不及者游惰之民爾雖然公何為至是父曰時運凶有田不足以償租負子孫散亡不能見保然則老人者尚有罪耶謝之曰公無多怨歳飢爾奈之何父怒曰飢可罪邪受人之羊匪牧是思十羊而來九皮而歸曰羊病死奚牧之非然則可乎小子未可與語也又何志之有邪掖其杖而去追而謝之弗復應段秀實太尉傳作時新唐書未出吾每讀栁子厚上史館書及太尉遺事再三欲捨而不能也心疑其韓退之直史館時而久不得太尉傳今而得之徒齗齗無竒節又烏覩所謂遺事哉巳而疑子厚實獻否也間取而并之此則栁志耳更為之賛云段秀實字成公隴州汧陽人也方六嵗時母且病侍不食者七日及長喜自厚重内敢㫁而與人欵欵不疑實剛决者初從安西節度馬靈詧討䕶密以功為其府别將更事髙仙芝而李嗣業請以為判官得綏德府折衝肅宗起靈武呼安西兵節度使梁宰不起應秀實見嗣業曰事繆矣天子令而有不從者嗣業亟以白宰得兵五千去赴朔方而以秀實為之助力戰有功㑹父死以喪去嗣業不可曰公且去一本作爾去嗣業失兩手無能矣起之為節度判官復奏為懐州長史知其州而嗣業卒秀實哭泣營塟之皆有禮荔非元禮見而義之復奏為節度判官及白孝德為使累遷太常卿為度支營田副使而大將焦令諶以田課民曰比秋入我熟一本無熟字㑹嵗旱以訴不得哀民其窮有死終無以輸乃以狀関營田秀實書其狀仍使人求柔諶諶怒入田民罵曰段秀實非我所畏也爾何心謂我畏而訴之叱以所書狀加其背而杖之人二十訖垂死輿以來秀實走䁕之泣曰爾窮以我為歸意我脱爾也借我不自能則亦巳矣今又苦爾使得杖咎實我為之不在諶即呼水來為洗其血手裂裳帛裹藥傅所創即觧馬使賤以速售得急錢以入令諶而令諶亦不之知軍有尹少榮旁不之平䟽令諶而罵之令諶聞而大負媿不自食且曰段公仁人我尚何面目見之一夕亦㑹其卒軍之遷西時汾陽王子郭晞軍客在一本作于邠士卒甚亂暴而不加制而節度白孝德亦顧惜自一本作其為難聽不加裁秀實不可之孝德曰公言非不願獨汾陽奈何秀實曰公誠能以都虞候假秀實當無不可者孝德喜如言既一日晞軍十七人坐市飲奰不相平奮以兵㫪醸器壊酒出流散秀實急取斬以令市晞軍聞而怒譟且盡甲矣孝德懼以謀秀實曰無恐也行往辭之因觧其一本作觧去所佩刀麾御者曰退命一人老而躄者進隨以行入晞軍笑謂甲者曰爾徒取而殺我我徒一老卒耳惡用譟我且來以吾頭授爾爾可不待甲也晞軍大驚不敢害且俾見晞秀實譲晞曰汾陽王于國家有甚盛功雖然為子者可不終為惜愛耶借尚書軍有一旦之變尚書雖自為何如乃惡連汾陽也今尚書兵暴縱無賴取掠恬不為嫌乃至折人手足撞殺孕婦夫軍有甚暴幾日而不大亂邪晞拜謝之且曰晞之幸以得公教願以軍從公顧叱左右者令觧甲去而秀實徐謂晞曰秀實方來時猶未食願得食于公晞辦之而食無疑矣謂躄者曰我疾作不可以歸矣爾可以吾馬去須來日復來遂就卧晞軍晞敬寢不脱衣遲旦同謝孝德請去而之他以故邠州僅免禍㝷拜涇州刺史而尚為邠寧軍之虞候馬璘亦奏加開府儀同三司璘視軍寧有一不合秀實者輒據爭之㑹有詔璘去軍士心猝摇校有王童之欲得之以亂間以其謀來白童之以夜盡相約至旦叛矣秀實持不為動徒戒鼓人加于常少促之鼓未四更而夜已曉叛者不及發又焚軍草于埸期救者于一本作以亂秀實令中軍曰火且發有動與言救者斬爾戒軍門無入童之救以故又不及亂出一本作旦盡取斬之璘去至鄭潁舉以秀實為思又奏為司馬兼都知兵馬使而吐蕃㓂鹽倉戰璘軍却虜阻不得歸部校稍稍棄而間來秀實召譲之曰兵法失將麾下盡坐之公等奈何以頸迎兵而來邪諸將恐且拜秀實命統竒兵出張以示虜虜懼觧去璘亦賴此得歸及璘疾又奏秀實攝節度使㝷拜涇原鄭潁節度使吐蕃懼之去不踏邉德宗即位加檢校户部尚書張掖郡王建中初宰相楊炎元載用事請城原州秀實以方春不宜輟農以土功炎怒降徵為司農卿將行戒其壻韋晤曰吾家過岐朱泚且有間慎勿為受一本作必致饋慎不可受泚果致綾三百晤竟不得謝秀實怒甚晤對不可辭秀實曰雖然終不可凂吾家置于司農堂之梁及朱泚以姚令言兵反意秀實以楊炎故有憾宜可得與謀秀實又啖之似從且欲隂有以圖而未及得㑹源休教朱泚以韓旻將兵三千去一本作共迎上奉天且圖不利于上秀實謀于劉海賔何明禮等曰事殆矣韓旻至則上不可勝諱公軰奈何時姚令言用賊事而岐靈岳為判官因急盗令言印將為將追韓旻而不果得事且急取司農印倒署之符以還旻旻果疑以囘秀實謂海賔曰旻且來吾屬今不死後亦為泚得猶不若先搏泚擊之死假弗及不猶快乎海賔然之明禮亦願外為之應明日泚呼秀實議秀實當戎衣與源休㑹泚前休語及泚秀實奮起奪休笏急走唾泚靣罵曰狂賊爾身不斬萬叚我恨且死欲誘我反可得耶即以笏急擊之泚窮以臂自遮不得擊財中額流血以走而海賔明禮不至羣盗初驚人人自失志未及動秀實曰我終不從而反可殺我也衆殘之而海賔明禮及焉德宗聞而惜之自悔曰誰為一本作謂前日不加一本作知哉詔諡以忠烈贈太尉賛曰自古勇傑奮義之仕一本作士尚矣然遭平時不自得而徒以死者亦多使人人如秀實而死不虛所得可勝言耶以是知士之與時逢者常少而秀實乃能自㑹如此其死何假嗟耶然人人未嘗不卒以死而人常樂待自盡而不喜死而得義者豈以長短為較耶吾嘗計秀實之死以及朱泚之敗財不及歳月其間源休姚令言軰竟以逆誅以是較之與秀實所得又孰多哉惜乎得自終死而人不食尚不及犬彘惡在其偷日以生哉秀實之孝仁勇義巳自能皦然不待文而後明也雖為之文復何以加之哉故徒傷其死之難得而人常不善擇死而巳吁夫廣陵集卷二十一
