body:
  text: 廣陵集巻十九宋王令撰雜誌招學說寄興叔乙未曰吾固愛木之不自已焉安得吾學而木然也安得人學而木然也吾學而然將有以與之人也人學而然將有以取於人也吾學而然與之人友道也人學而然取於吾師道也友且師學而不倦者夫木哉木哉安得吾學而木然也安得人學而木然也今夫木始於萌蘖眇於毫髪計其根萌之徑相長不過以寸及其春夏之綿苗雨露之兼仍積之日長生之不休彌抱而不可拱焉則休者安其隂息者仰其材睨而上計之千百尋而不可逮視其芽蘖毫髪時豈不過甚而得巳耶然而不足猶若也向使其拱把而止則朽折若芽茁然惡在能千百尋哉今夫木生於山林而用厦屋木非能手舉以招言列於人而自謂其材也而又山林之與厦屋其逺勝言哉而人不能遺斧斤必至焉故木患不材耳安有材而遺者也使其材而或遺則為材益大則世豈能終遺之哉雖然木生自爾也非為材而後生也非為人不以為材而不生也故木有似夫君子吾固曰學者曰吾固愛木之不自已焉安得吾學而木然也安得人學而木然也今夫人之所以異於禽獸者非謂其衣一本作角而不毛也以其聰明視聴然也視父而知為親聴長而知為順此人之所以異於禽獸也然而未善視聴焉百歩之間荒忽之外察一芒毛之垂而熟蚊蠅之聲者邾婁師曠之所以異於衆人也然而未及大視聴焉顔子坐而視百世之上見舜之行焉聞舜之言焉坐而視當世見孔子之行焉聞孔子之言焉閒而視一身見過欲萌于無形非欲倡于無心聲故孑然自持循且曰舜何人也予何人也又曰瞻之在前忽焉在後惟顔子為能見也他人固不之見也非惟顔子為然惟舜亦然舜樂取於人以為善取於人以為善是見而取之也樂取於人以為善是聞而取之也非惟舜為然孔子亦然孔子曰今吾于人也聴其言而觀其行顔子以之自明舜以之取人孔子以之改過夫人一本無人字能自明若取人與改過豈不為大視聴哉故邾婁之明師曠之聰是天與之也顔子之聰顔子之明學得之也天與之故能勝人學得之故能勝天今夫視者聴者纔天與之也然而未如學得之也學得之如何如顔子而巳矣如之何如顔子學不倦而巳矣大哉學夫今夫一本作之人莫不學一本作莫不好學也然而未得名一本作為好學者猶范之冠蟹之筐耳以其名為而實非也人有能惡一本作知范冠蟹筐之心則知好學矣夫道固不逺人而人自逺之苟有求道之心而持之至誠則何可當耶苟為有求道之心而不能持以至誠亦末如之何也巳詩不云乎伐柯如之何匪斧不克謂其學道非至誠不能也人皆曰我智過禽獸而視之而未有以過之也故求髙不如鳥求深不如魚千仭之山人不勝其髙也而鳥常卑之更擇髙而巢焉以是人不得而窺也千仭之淵人不勝其深也然而魚猶薄之汨其深而穴焉故人不得而釣也苟能充魚鳥髙深之心而施之學則人能及之者鮮矣夫道無逺而人無不能有逺不能者謂不為也今有人曰吾不能走千里之逺而能反覆百歩之間不休則千里也夫末喜子都天下之大姣者也人同以末喜子都為大姣而末喜子都尚自懼未為姣更漸朱塗粉慊慊然唯懼人或美於已而不得一本作能美於人嗚呼曾謂好聖人者不及末喜子都好姣乎然學者亦舍已而先人故夫今之人責人一以義而待已卒以恕責人以恕則人之就聖人也速待已以恕則己之去小人也緩且不知責人不已竟何多於已也苟能以攻人之心而攻已之心則過失不勝其多矣夫觸刑辟而為非禮義者小人之肆者也懼刑辟而不為非禮義者小人之拘不得志者也可以為非禮義而不為非禮義學者之守也情安禮而行安義君子哉惜乎未及好學者也吾學而求為君子者也嗚呼不為小人之拘不為小人之肆者幾希哉夫人之於人則患有不知有不能問而自為已則安不知而學不能陋夫欺人哉今有疽瘍之在身則求於人而願去雖撓困折顙累百拜而不辭也有不求而為之治而愈則必思謝之至於一本作有過惡之在身而不知求人或者告之則不謝更怒甚哉疾惡之不如疽瘍也斯人而有恥者鮮矣人之為父兄愛子弟皆知擇師而教之至於已身而反不知學悲矣夫惑矣夫迂說非禮之舉非義之動皆是也以其非禮非義而止者盖未之見也以其非禮非義而止之者又未之見也今有學聖人之道而行聖人之義者皆曰迂以其迂而止者皆是也以其迂而止之者又皆是是也是何勇於彼而惡乎適此也止之為愛人耶豈樂人之為非禮義而懼人之為聖人也耶是非說是非人人之有也是非或非人人之有也何為其然指已與人曰爾為爾我為我人皆曰是也智者觀之亦曰是也指已與人曰爾為我我為爾則人皆曰非也智者觀之亦曰非也斯其為是非是也故曰人人之有也於此有人生而未嘗之山也而原藪是居又未嘗聞人說山之為何如也一日客有自山而來者以山之髙大語之原藪之人相與笑駭曰是豈有是出吾門適吾野䟦足引目而四望之地皆平也何曾為有山則語其為山者是也謂其無山者非也故曰是非或非人人之有也今人所以能是非原藪之民者以其常見聞諸山也如不嘗聞與見則原藪之民何以異故曰是非不徒於山也夫道則亦有然者矣交說送杜漸孟子道性善信其性之善也然其有不善者非其才之罪也不能擴而充之而習之逺之然也有能資性之善而充之習不相逺之則信夫純乎哉前吾學者吾師也吾見其擴巳充而習不逺者也吾不知其始為何如然也後吾學者吾之徒也吾多見其不能擴而充之而習之逺之始吾亦為然然後知杜子賢夫人逺者也能資性之善而充之習不相逺之是將信夫純者也杜子名漸年少朴茂韜藏不挑抉平日未嘗輙語言與吾居且五年乂最為親洽而未見其懈且過也言之有實也行之有信也與吾交而游者多矣未見其可愛如杜子者故吾獨樂朋友之杜子亦猶然乃不輙他人之從而獨我自待也居相為羣也別相為思也見相為喜也言語相唱答而出處相往來也故悲而同為吁窮而相為謀樂而相為讓去就相為之可否過失相為之扳牽吾獨杜子望而杜子亦望予然也方吾窮困寒餓牽而之東西不旬月必復合于其未合間已共嘆恨而况今而去吾乃乆也故序其行獨道其可愛與相合與去可嘆恨而不及所學者吾與杜子素講之熟矣吾知杜子之不吾忘而吾又敢自忘耶龍池說距真而西七十里曰六合縣地皆原阜無川澤縣行五里曰龍池池之南居民數十家又有亭以休行者余嘗過而宿焉愛其池之寛逺既而䇿之又殊渾不可窮極且怪其龍池之謂因求而問之則曰世傳此地舊無池為常人居昔而忽䧟焉既而有龍居之也今其池之東北冬寒水涸淺處尚見柱石與遺井在焉以是騐之舊為人居也决不疑矣民四時必具祭否則水旱如旁郡即不爾則風雹害稼余舊嘗疑於龍今又得此說私怪駭之因退而思之曰天地人三才也上而為天日月星辰在焉而不得下而雜人也下而為地山川草木在焉而不得上而雜天也况又中而人與禽獸哉是各有分定而不可雜以上下也故飛者雖髙巳上則窮穴者雖卑巳深則死而龍者潜而伏淵躍而飛天風雷雲雨動且從焉是其神亦大矣獨能雜出於天地人之間吁亦盛哉今何孑然獨居此也夫人非龍曹也地陷真郊人則䧟死龍獨害人而居之安耶祭而有求也所求非所力則雖祭當不受而民或不祭而龍又當凌風厲雹以驚禍之耶夫風雨天之付龍者以其能行雲施雨蘓焦活枯而然爾龍何旱而不用為雨不祭而用是求食耶江海至大也横亘數千里鯤鰕共容之龍盍居而且樂焉而何為齪齪居此與蚯蚓伍也豈彼不容龍而龍私居此耶不然則龍懼其大而不往也余觀易之乾卦及他經傳所載凡擬聖人君子則必以龍是豈龍者能利人而不自私者耶今何乃爾也夫龍者豈盡居此焉耶又將若人者有君子人而有小人人耶馬說東郭之兒生而未嘗逢馬意其四足而甚大者皆牛也他日適市而逢馬焉驚而呼之曰是牛何以是斑斑也其聞者笑之語之市人而市人笑之東郭之兒自失焉歸而語諸長者則馬也以是不語者三日東郭之先生聞而過之曰孺子亦有所失乎曰非也吾嘗以馬為牛既知其為馬矣吾慙而未言將無以見市人也先生曰噫馬信為馬矣孺子以為牛孺子之過也市人乃能笑孺子者是以馬云也苟不以馬而以他使是非幾不能不以牛為馬其於孺子有間乎孺子殆未之學耳市人固不足慙也廣陵集巻十九
