body:
  text: 廣陵集卷二十四宋王令撰代韓退之答栁子厚示浩初序書子厚足下相别闊久時得南方人道譽盛徳甚相為慰快又間得子厚文皆雄辨强據淵源衍長世之名文者多矣未見加子厚右者也其間亦小有務辨而屈理趨文而背實者然古之立言者未必皆不然亦説詩者不以文害辭之一端也愈比置之近有傳送浩初序來者讀而駭之不知真子厚作否也雖然子厚素友之宜真子厚作然反覆讀之亦駭而疑又恐非子厚而他人作然也不然何子厚見禍大甚耶來序稱浮圖誠有不可斥者與往古聖人之書周易論語合其于情性奭然不與孔子異道雖使聖人復生不得而斥之也子厚亦不思哉夫易自乾坤以及未濟皆人道之始終聖賢君子之出處事業至於次第配類莫不具倫理故孔子原聖人設卦之因而繫辭之首則曰天尊地卑乾坤定矣卑髙以陳貴賤位矣之類是也其中則曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所措夫婦之道不可以不久也故受之以恒主器莫若長子故受之以震又其下則曰漸女歸待男行也歸妹女之終也而皆不若浮圗氏棄絶君臣拂滅父子㫁除夫婦之説若論語二十篇大率不過弟子問仁問政問為邦問患盗之類爾至子路問鬼神與死則皆曰未能事人與焉知死之類又非若浮圗氏誇誕牽合以塗瞽天下而云也不識子厚謂為與易論語合者何哉借如其中有萬一偶竊吾聖人之言則君子者遂不思其患而崇好之耶是拯救桀跖之誅以耳聞而目見有類乎堯也孔子曰如有周公之才之美使驕且吝其餘不足觀也巳况去父子夫婦而無萬一於周公之美者耶且子厚謂愈所罪一本作好者跡也而不知其石中有玉者不知子厚之學果中與跡亦異耶夫然子厚心仁義而手㧞劍以逐父兄謂其為跡則亦可耶子厚患愈因跡斥浮圗以夷反為之説曰将友盗跖􅁖来而踐季札由余也嗚呼子厚又不思矣哉昔者孔子作春秋諸侯用夷禮者夷之若杞侯稱子是也若愈不得斥浮圖以夷則孔子亦不得斥把子以跡而不思其中也聖如孔子者其取舍猶不免子厚之過邪又不知子厚謂季札由余者皆若浮圗氏之拂君臣父子耶不然則否也愈嘗探佛之説擬議前世盛徳者而皆無一得也若堯舜孔子者皆佛之甚有罪者也以智者觀之不知堯舜孔子果當然耶不然佛妄人也自孔子死千數嵗惟孟子卓然獨立今讀其書則皆教人興利除害驅龍蛇除禽獸與殺牛牲犬豕以飬老一作生祭死其大不與佛合則若君子之親親而仁民仁民而愛物以堯舜之知而不徧愛物者急先務也以堯舜之仁而不徧愛人者急親賢也不能三年之䘮而緦小功之察放飯流啜而問無齒决是之謂不知務以是言之是孟子又異於佛而得罪也甚矣且不知子厚之讀堯舜孔孟之書也将讀而盡信之耶抑徒取其一二而棄其十百也不然則孔佛之不相容亦已較然何獨子厚能容之也愈常觀士之不蹈道者一失於君則轉而之山林羣麋鹿終死而不悔乃至有負石而自沉者以君子觀之是皆薄於中而急於外者矣惜夫何至是哉今子厚雖不幸擯斥於朝乃亦不能自寛存以至於蹈夷狄而不悔也薄於中而急於外在盛徳雖不當然然智者觀之不得無過也必求其不愛官不争能樂山水而嗜安閒者則浩初之心尚何完如一作於麋鹿也心溺於虛髙之言而遺於人倫之大端其比於負石而沉河者孰得哉愈嘗笑今人之謂有智一作知者為毁釋氏釋氏非毁之也譬之器然舊嘗完而暴礫之謂為毁也可矣其從前不為器者是自然耳豈人毁之耶此皆不知道者之言也自釋氏之説入中國流數千百年其徒樹其説而枝葉之者衆矣烏知其有不取此以假彼者耶况又玩其説者常名像也孟子謂矢人豈不仁於函人者豈盡無意耶正謂是也使佛之福可求其言可信其教等於堯舜孔子而或上之則君子者當先衆民而學且行之矣伐彼善而固為我異謂愈肯自行而為之耶雖然子厚猶謂愈為之也子曰道不逺人為釋氏者竟不逺人耶謂為聖人不得斥者果信然哉果信然哉石中之玉信何如也愈白上王介甫書元城王令謹候臨川先生之起居以書進於左右揚子曰在則仁亡則經是經亦猶人也孟子曰聞風不如親炙之則何先人而後聞哉而韓子亦謂彼囬也有聖人者為之依歸而恨巳不逢然後知揚子之言之畧也自孔子沒而後世之弟子源移流漫故六經之學皆襍出異同駢為門户而後世學者老身白首更疑是非銜黙終死無所折問與其親承聖學口出耳納者何可概論又惡在人而經同也又仲尼之世髙第弟子名列迹著者凡七十人雖名庶幾者獨顔氏之子而他皆指學入堂戸卓為髙絶自仲尼沒緜今二千年其經俱存而七十子不時輩出則經人之效又可概見矣夫然聞風不若身親服修不如習化也决矣嗚呼如孔孟者率千載不一出猶學者積思紵念身将如見之設有庶幾孔孟者同時而出則宜何如哉其向望有從来矣伏惟座下純道厚徳髙於近古休風盛烈流决當世䝉童瞽年皆覘望盛徳思欲奮起以沾被餘澤豈令顧不願得事前後耶徒以身困地逺自致無由耳今座下入為天子用而令適在路隅因自奮餙以来希丐教命且償其素心耳其如聖賢進時退身之道當世之取舍所宜皆座下從来所自飬者况令知不及之何敢言哉南山之田詩一首輒敢歸賦從者輕瀆左右慙負無已令再拜代人上時相書夫天下有三言其上者以道言其次以志言其下以窮言夫以道言者用以有為者也以志言者不得其有為者也以窮言者有逢而不自得者也假窮而無逢與有逢而無足愬語者皆不言也故不得於道則言志志猶有為也窮則何所謂耶不得於身而已爾是故古之昌明之朝甚盛之際明君在上賢宰相掖以輔之故其用人之詳得士之急日招延而望来更推挽以惡去故天下之士無有以志言者謂其口能輸心舌以播慮故在上者虛耳而側諦為下者披腹以露藏一作腸如是則天下之士恨自用之不足何暇畜以為志耶志猶且無言又况其窮者哉其無可知已伏惟昭文相公閣下昔嘗柄天下以自任矣未幾而去去未幾而天子思太平知所由来則復在相公則相公之所以任於天下者甚重而天下之所以待相公而任者亦不輕也所宜回唐虞於已歸赫禹稷於既晦則将見天下之士口寫腹竭而後無以志言則窮者又可忽耶嘗聞古者至治之世民有㓜而無父謂之孤老而無子謂之獨孤獨之民謂之窮而無告而有為者莫不先之夫有子而無以為飬與無何殊有親而無以為孝與無何異苟如是若某者亦宜仁人之所念也又况適逢大有為之時而家世於門下復有一日之雅者耶則今日之言雖實以窮来而今日之賜亦仁人大有為者問窮恤故之資也干冐臺嚴恐悚待罪不宣某再拜見朱秘丞書日月元城王令謹以書見於著作執事揚子曰周之士也貴秦之士也賤雖然豈獨秦哉取士賤自秦而始耳方三代之盛時教化之具修􅊀故士出有從来及其成也賔於鄉論於司徒拜受於王皆自有禮致然大要皆為上者有取於下而在下者無求於上而士之出處巳有方矣周衰之末天下大壞而戰國之世其君皆狼視虎吞以腊肉天下而深謀巧譎之士罅隙以出顧其為何足道語哉然當世之君皆撤席屣履伏傴而願見如子思孟子之髙引不下合而時君亦恐恐其不及飬是其故豈有他哉以其心常有求於士爾當是之時進退去就常在士而取舍不在人及秦漢而下變天下郡縣而以郡守丞尉主之而郡守丞尉常自有法度之成熟而無求於士而士始無用於天下一求於京師蹉跌一失之則有老身不及遇者故士之不遇當世者始多甚者不知士於天下為何用也然此固士賤之道爾而令亦嘗笑天下之士善自賤也夫士之無去就之分者多矣惟其自待不高故望人也速自守不固故求人也輕不徒不擇而見之而又不知見之謂何也今夫卒卒而趨唧唧以見俯承聼如不及望入門以自媚者此果有道者所為耶顧不畜狗而冠爾曷足以士進退論哉始令之既學也嘗願以古之人士就而見之既而卒無得也伏惟閣下為縣之日已藹然衆相以為賀既而修治矣然猶切切日不暇視其所為心常偲偲日在民然常較之雖環千里而更數十年謀其為民者未易一得也令雖久聞執事之風而始有猶待者今則自来矣惟其所以見執事不敢妄而令自處不敢輕敢以書焉幸執事照之不宣令再拜上邵不疑書知軍學士閣下夫草茅之㣲布衣之賤遊身於公侯之門託迹於卿相之庭古人為之為宜今人為之為羞學大而謀逺先義而後禄古人為之為祥今人為之為狂雖道非不同而義非有二也其時與勢有然也昔者孔子既聖矣盖身見者七十君而孟子亦進退齊梁滕薛之間盖終死而後巳何其勤且勞哉是一聖一賢豈亦身希公卿之髙而意得萬鍾之多哉其以道云也然猶大夫不得齊諸侯不得髙故陽貨饋豚則瞰亡而投問齊王欲朝則以疾而謝行非樂於自髙而忘其為卑也義有然也亦士之有以用而然也今夫裂天下之分而占官府以坐居者豈一人哉然皆有左右之吏即而守三尺法度之成書是其所為自足而所責已盡其又烏待士之為哉故士之仕於今世者何所為哉人無用而自進幾希而不羞人無用而自學幾希而不狂既羞而狂幾希而不自絀窮且自絀幾希而能自樂然而有不自絀而能自樂者非徒以義云也亦有以説云也今夫人之所謂利欲者豈以富貴尊髙之為哉今人之富貴尊髙者不少也是非為良富貴尊髙也獨士能有富貴尊髙為異也夫恬無求而樂易足則富不可勝用也知天下之所以貴而不為可賤則貴不可勝用也扳堯禹以自學配聖賢而為名則尊不可勝用也謙而益光卑而不可踰則髙不可勝用也士之有是四者則何慊於富貴尊髙哉又安用不得於身而戚嗟求於人而不獲則憤懣哉故士之有直巳而不屈信道而不回雖窮餓死而不悔者誠以中有以存也雖然皆非令之所能也亦嘗仰其餘風矣非其義也非其道也亦不敢見也故學彌久而勢益窮身加修而時譽一作愈不至凍餓身腹而人不恤孤者不育而處者不嫁日近衣食之圗以牽所學其勢信益蹙其迹信益窮然而處之不敢不恬也亦古人所謂知其無可奈何而安之命者也雖然目不望富貴之門身不雜縉紳之間非惟巳不喜取合於人計其從之亦人之不取也伏惟閣下之徳其聞有日矣始也迫窮餓之役願從事於左右而無由今則少間以来也幸閣下憐進之雜文一編輙敢贄左右律詩一首因以賦侍者其學淺狭無足收采如閣下姑進之則令齒尚少自待未易巳則閣下猶可待其他日之成庶幾不辱門下也干凂尊聼慙恐無巳不宣令再拜廣陵集巻二十四
