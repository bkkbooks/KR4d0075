body:
  text: 廣陵集附録有宋王逄原墓誌銘王安石嗚呼道之不明耶豈特教之不至也士亦有罪焉嗚呼道之不行耶豈特化之不至也士亦有罪焉盖無常産而有常心者古之所謂士也士誠有常心以操羣聖人之說而力行之則道雖不明乎天下必明於巳道雖不行乎天下必行於妻子内有以明於巳外有以行於妻子則其言行必不孤立於天下矣此孔子孟子伯夷柳下恵揚雄之徒所以有功於世也嗚呼以余之昏弱不肖亦固士之有罪者而得友焉余友字逄原諱令系王氏元城人也始余愛其文章而得其所以言中余愛其節行而得其所以行卒余得其所以言浩浩乎其將沿而不可窮也得其所以行超超乎其將追而不可至也於是慨然嘆以為可以任世之重而有功於天下者將在於此余將有之而不得也嗚呼令去余而死矣悲夫逄原左武衛大將軍諱奉諲之曽孫大理評事諱珙之孫而鄭州管城縣主簿諱世倫之子也五歳而孤二十八嵗而卒卒之九十三日嘉祐四年九月丙申葬於常州武進縣懐徳南鄉薛村之原夫人吳氏亦有賢行於是方娠也未知其子之男女銘曰壽胡不多天實爾嗇曰天不相胡厚爾徳厚也培之樂以不罷嗇也推之不怨以疑嗚呼天民將在乎兹廣陵先生傳劉發王氏舊望太原自先生之七世祖居於魏之元城不知其始何遷也叔祖父乙居廣陵先生㓜育於乙故遂為廣陵人年十數嵗晝從羣兒嬉夜獨誦書徃徃達旦不眠率以是為常未嘗從師為辭章即雄偉老成人見之皆驚年稍長倜儻不覊束周鄉里之急為不義者面加毁折無所避人皆畏而服之里人滿執中謹厚人也一日先生過之執中以先生所為為非是先生因自悔更閉門讀書乆之所得益以閎深乃為竹賦以自廣具載文集其姊寡居貧無以自存乃聚徒天長巳而積薪之中得芝之葉先生有感焉乃著藏芝賦賦序多不載載其賦具載文集是時丞相荆國公赴召道由淮南先生賦南山之田詩徃見之公得先生大喜期其材可與共功業於天下因妻以夫人之女弟焉既而徙髙郵大守邵公必延請主學先生辭不獲巳强應之尋亦辭去邵公為部使者以其節行聞於朝廷不報先生既喜退隐思江南山水之勝乃遷居潤賦江上山中之詞居頃之熟於潤之山川道里又著逰山記以寓其意居無何以江隂幽僻乃去潤遷江隂江隂地下濕得疾苦足弱因復遷常未幾以足疾終天下士大夫無論識不識皆痛惜之荆國公為誌其墓荆國既誌其墓又哀思之著於詩多至十數篇先生徳業之敏如駕四馬馭夷路駸駸驟馳雖徤歩者邈不可及然聞一善言見一善行未嘗不嘆慕自以為不逮事寡姊如事父教姊之孤兒不啻巳子歳時祭祀於其考妣必流涕親識饋遺纎介無所受諸生有獻度其家為禮雖甚貧不取也平生為文多操紙立書未嘗有藁或有藁即焚毁故其終家無遺文先生方生管城君命之曰令兒未及更立名而管城君卒故先生因名令初字鍾美建安黄莘以其造道之深字之曰逄原吳氏從先生一年而寡歸治田桑布素以待盡其趨操議論皆是宜為先生配先生既終方得女荆國公為擇所宜歸歸吳夫人族師禮亦名士嗚呼道之不明於世乆矣惟道之不明故士之出處皆莫知其所宜守仕於朝廷者知進而巳時不足以有為雖或援而去之猶不能自止也不然則溺於厚利苟狥世俗以自私無足道也隐於山林者知退而巳時若可以有為雖或援而出之猶不能自屈也不然則喜於名髙苟違世俗以自顯而無足取也夫天下有道以道狥身天下無道以身狥道古之君子無必出也無必退也顧道何如耳苟外於道而拘於出處之迹宜其無自而可也方先王之盛時所以造士者有術優㳺崇養成其自得之實而不使其少累於外物故士多見夫道之大全而進止行遁無所於􅘅三代而後世不知所以造士士未明所以行巳而紛紛外物既巳變易其思慮矣則其所守無所適當固其所也嗚呼若先生者可謂豪傑之士矣去三代之乆如此而以宏材敏識偉節髙行特立於一時使其無不幸之死而幸於世則其所施設當如何哉雖然以太王王季文王武王成就天下之士至於易商為周而士之備道徳之美者宜不可勝數矣管蔡一以流言而朝廷上下遂皆信之知保周公而賦四國者才十夫而巳然則士不待文王而興者豈特罕聞於後世哉雖先王之世固巳然矣推此則若先生者其可易得哉世之知先生者或以其文或以其行未為知先生者也知先生者惟荆國公而世或疑之故詳載先生之行事而論次之門人劉發謹傳與王逄原書王安石安石頓首讀所辱書辭見足下之才浩乎沛然非安石之所能及問諸邑人知足下之行學為君子而方不巳者也惜乎安石之行急不得乆㽞從足下以逰及求足下所稱滿君者而見之所示稿副輙㽞玩不審定復枉顧否不勝幸望也二安石頓首逢原足下比得足下於客食中窘窘相造謝不能取一日之間以與足下極所欲語者而舟即東矣閲足下之書竊有疑焉不敢不以告足下書有嘆蒼生淚垂之説夫君子之於學也固有志於天下矣然先吾身而後吾人吾身治矣而人之治不治係吾得志與否耳身猶属於命天下之治其可以不属於命乎得於行而不得於知吾耻之也得於知而不得於行吾不恤也盡吾性而巳孔子曰不知命無以為君子又曰道之将行也與命也道之将廢也與命也孔子之説如此而或以為君子之學汲汲以憂世者惑也惑於此而進退之行不得於孔子者有之矣故有孔子不暇席暖之説韓子亦以為説吾獨以聖人之心未始有憂有難予者曰然則聖人忘天下矣曰是不忘天下也否之象曰君子以儉徳避難不可榮以禄初六曰㧞茅茹以其彚正吉象曰㧞茅正吉志在君也在君者不忘天下也不可榮以禄者知命也吾雖不忘天下而命不可必合憂之其能合乎易曰遯世無悶樂天知命是也詩三百如栢舟北門之類有憂也然仕於其時而不得其志不得以不憂也仕於勢不在於天下國家與夫不仕者未始有憂君子陽陽考槃之類是也借有憂者不能奪聖人不憂之説詩者非一人之辭也出諸國之賢者則道不能盡軌於聖人也宜矣然汲汲以憂世事孔子固有取而不為也孟子曰伊尹視天下匹夫匹婦有不被其澤者若巳推而内之溝中可謂憂天下也然湯聘之巳猶囂囂然曰我處畎畆之中以樂堯舜之道豈如彼所謂憂天下者僕僕自枉而幸售其道哉然其謂孔子曰可以仕則仕可以止則止率皆聖人也乃吾所願則學孔子也又論禹稷顔囘同道曰鄉隣有鬬被髪纓冠而救之則惑也今窮於下而曰我憂天下至於慟哭者無乃近救鄉隣之事乎孔子所以極其説於知命不憂者欲人知治亂有命而進不可以苟則先王之道得伸也噫且以七十子之賢親出於孔子之時獨曰用之則行舍之則藏惟顔囘有是况去聖人之乆而私力於學者耶孔子論聖人有先後者學者知其然則宜法孔子安可慕其所以慕而巳乎世有能喻知命之説而不能重進退者有矣由知及之仁不能守之也始得足下之文特愛足下之才耳既而見足下衣刓屨缺坐而語未嘗及巳之窮退而語足下終歳食不葷不以銖忽妄售於人世之自立如足下者有幾吾以為知及之則必能守之故以安石之所學報足下荀子曰塗之人可以為禹以足下之才行僕安敢不以孔子之道友足下乎不宣安石頓首三安石頓首逄原近已附書亦得所賜教殊感慰唯逄原見教正得鄙心之所欲方欲請而已被㫖還都遂得脱此亦可喜也但今兹所除復非不肖所宜居不免又干溷朝廷更增不知者之毁然吾自計當如此豈能顧流俗之紛紛乎不乆到真州冀逄原一來見就不知有暇否幸因書見報安石止寓和州耳來真唯迎老親來視女弟既而歸和俟命也冬寒自愛安石頓首四安石頓首承䟦渉到江隂與賢閤萬福良以為慰安石居此鬱鬱殊無聊念非見君子誰與論此不乆來江寜冀逄原一來不審可否倘可與子明同來乎不知脚氣近日如何切自慎愛千萬千萬近見莘老其不肯與人事固知其如此乆矣而書來過相稱譽似以俗人見遇不知其故何也既巳在此職事矣彼以此遇我殆其宜也冬寒自愛五安石頓首辱書感慰舟但乘至蘄陽當無人何問兼是吳舅法所當亦何嫌不自駕之以徃還就載官物可也旅居僧舍良亦無聊千萬自愛時以書見教今日尚苦大風不可行怱怱不謹六安石頓首被命使江東按刑獄事明日遂行欲至揚州宿留别乞一差切欲一見逄原幸枉駕見追只於丹陽奉候切勿以事為解也他湏面陳此不詳悉切見過専奉遲切切七安石頓首辱教具曉盛指陳山人今在此幸便訪友也他事面謁怱怱不謹安石頓首八安石頓首比辱足下來見顧存而人事紛紛殊不得從容盡所欲言而遂爾逺違區區嚮徃之情豈可以盡言哉到天長乃知行李巳到毘陵脚氣已漸平復殊以為慰即日動止想與吳閤俱萬福貴眷各康寜巳到宿薄晩遂行更數日即到京師别上狀然書所傳道豈可以盡意乎近見説脚氣但於早起未下牀未語以前取唾以手大指摩脚心取極熱乃下牀乆之自不復發嘗試為之此乃嘗有人以此除疾為之方也葛子明得書否二舅處有書來否熱不可勝任殊以為憂為之奈何安石頓首九安石頓首不見已兩月雖塵勞僕僕企望盛徳何日無之怱辱惠書承以論語義見教見微㫖奥直造孔庭非極髙明孰能為之仰羡近辱子固夷甫過我因與二公同觀大所嘆服何時得至金陵以盡逺懐安石頓首十安石頓首自别逄原一得書遂不知行李所在伏惟巳還暨陽今此介徃幸喻動止之詳以慰思渇也居江隂果可以徙否安石之勢恐未能自脱於此矣罪戾日積而缺然無友朋之救此寤寐所以怵惕而不知其所為者也逄原不知可以逰番乎番亦多士可以優㳺卒歳試思之也人還一報幸自愛重安石頓首十一安石頓首得手教承尚在江州思企何可勝言安石昨到金陵匆匆遂歸番陽冬末須一到金陵不知逄原此行以何時到江隂今必與吳親同舟而濟但到金陵莫湏求客舟以徃否近制舡難為謀自金陵至潤只一兩程到潤則求舫至江隂亦易矣安石處此遂未有去理如孫少述丁元珍曽子固尚以書見止不宜自求便安數溷朝廷則他人復有可望其見察者乎罪釁日積而不知所以自脱足下奚以為我謀哉配兵不習水事甚善但計今之勢如此等事皆不可與論説不知足下意以為當如何施行幸試疏示更有所聞悉望見教所至幸望留意訪以所不逮也至冬末到金陵欲望逄原一至金陵見訪不知可否私心極有事欲面謁切試思之幸能一來為恵大矣安石頓首十二安石頓首逄原足下方欲作書而得所賜書尤感慰唯逄原所以教我得鄙心所欲出者窮僻無交㳺所與議者皆不出流俗之人非逄原之教我尚安得聞此方力求所欲但未知何時得耳及冬春之交未得脱此冀相遇於江寜不審肯顧否承教許如此當可如約也但不謀潤居何也江隂豈不可留乎若在潤則相遇尤易耳配卒事湏靣叙乃悉餘更有所聞悉望見教今世既無朋友相告戒之道而言亦未可必用大抵見教者欲使安石同乎俗合乎世耳非足下教我尚何望於他人切無所惜也冬寒自愛安石頓首寄王逄原王安石北風吹雲埋九垓草木零落空池䑓六龍避逃不敢出地上獨有寒崔巍披衣起行愁不惬歸且把巻闔且開永懐古人今已矣感此近世何為哉申韓百家爇天起孔子大道寒於灰儒衣紛紛欲滿地無復氣熖空煤炲力排異端誰助我憶見夫子真竒材楩楠豫章槩白日只要匠石聊穿裁我方官拘不得往子有閒暇宜能來晤言相與入聖處一取萬古光芒廽哭逄原王安石布衣阡陌動成羣卓犖髙材獨見君杞梓豫章蟠絶壑騏驎腰䮍跨浮雲行藏巳許終身共生死那知半路分便恐世間無妙質鼻端從此罷揮斤逄原挽辭王安石蒿里竟何在死生從此分謾傳仙掌藉誰見鬼修文蔡琰能傳業侯芭為起墳傷心北風路吹淚濕江雲思逄原王安石自吾失逄原觸事輙愁思豈獨為故人撫心良自悲我善孰相我孰知我瑕玼我思誰能謀我語聼者誰朝出一馬驅暝歸一馬馳馳驅不自得談笑强追隨仰屋卧太息起行涕淋漓念子塚上土草茅已紛披婉婦且少年㷀㷀一兄婺髙義動閭里尚能致財貲嗟我衣冠朝畧能具饘糜葬祭一本作豆無所助衷顔亦何施聞婦欲北返跂予常望之寒汴已閉口此行又参差又説當産子産子知何時賢者宜有後固當夢熊羆天方不可恃我願適在兹我疲學更誤與世不相宜夙昔心巳許同岡結茅茨此事今巳矣已矣尚誰知𣺌𣺌江與潭茫茫山與陂安能乆竊食終負故人期思逄原王安石蓬蒿今日想紛披塚上秋風又一吹妙質不為平世得微言惟有故人知廬山南墮當書案湓水東來入酒巵陳跡可憐随手盡欲歡無復似當時又百年相望濟時功嵗路何知向此窮鷹隼奮飛凰羽短麒麟埋没馬羣空中郎舊業無兒付康子髙才有婦同想見江南原上墓樹枝零落紙錢風與舅氏吳司録議王逄原姻事書王安石安石啟仲冬嚴寒伏惟尊體動止萬福王令秀才近見文學才智行義皆髙過人見留他來此修學雖貧不應舉為人亦通不至大段苦節過當他恐二舅不欲與做親乆不得委曲不審尊意如何傳聞皆不可信也安石目見其所為如此其可愛也未拜見千萬乞保尊重不備安石拜上又安石啓新正伏惟二舅都曹尊體動止萬福向曽上狀不審得達左右否王令秀才見在江隂聚學文學智識與其性行誠是豪傑之士或傳其所為過當皆不足信安石此深察其所為大抵只是守節安貧耳近日人從之學者甚衆亦不至絶貧乏况其家口寡亦易為贍足雖然不應舉以安石計之今應舉者未必及第雖及第未必不困窮更請酌之此人但恐乆逺非終困窮者也雖終困窮其畜妻子當亦不至失所也渠却望二舅有信來决知親事終如何幸一賜報也尚寒伏乞善保尊重不備安石頓首與崔伯易思王逄原書王安石伯易足下逄原遽如此痛念之無窮特為之作銘因吳特起去奉呈此於平生為銘最為無愧惜也如此人而年止如此以安石之不肖固不敢謂足以知之然見逄原所學所為日進而在髙郵見之遂若不可企及竊以為可畏惮而有望其助我者莫如此君雖足下之言亦以為如此今則已矣可痛可痛然此特可為足下道爾人之愛逄原者多矣亦豈如吾兩人者知之之盡乎可痛可痛安石再拜與王深甫王安石安石頓首近已奉狀不知到否竟不得脱省中巳今日就職聞足下當入都下幸能早來冀得一見若足下來差池則安石此月乞去淮南迎親矣出不過三四日則還至都下幸足下且留以待安石還事欲講於左右者甚衆切勿遽去若令不得一見又不知何時奉見切勿急歸也有王逄原者卓犖可駭自常州與之如江南巳見其有過人者及歸而見之所學所守愈超然殆不可及忽得報死矣天於善人君子如此可嘆可嘆如逄原者求之於時殆未見比不知常君方之孰賢耳可痛可痛恨足下不得見之耳書不盡意自愛自愛安石頓首别孫莘老思王逄原詩王安石逄原未熟我巳與子相知自吾得逄原知子更不疑手把湖上舟望子欲歸時茫然乃分散獨背東南馳寥寥西城居解后與子期鷄鳴入省門朱墨來紛披含意不自得强顔聊爾為㑹合常在夜青燈照書詩徃徃並衾語至明不言疲匆匆舍我去使我當從誰送子不出門我身方覊縻我心得自如今與子相隨隨子至湖上逄原所嘗嬉想見荷葉盡北風巻寒漪巳懐今日愁更念昔日悲相逄亦何有但見鏡中絲客有示余王逄原詩編者因成短韻逄原廣陵人死年二十八嵗張舜民古人深恨不同時雖得同時不識之獨把遺編想風質皇天何負十年期王逄原哀詞郭祥正追髣髴兮故國之山邱與子之相遇兮聼其言而若秋雍雍而肆兮嚴嚴而收樂我之心兮以遨以逰子將娶兮於南州不得從子以徃兮翻自省以幽幽川陸兮沉浮日月兮再周聞子之長逝兮愴我之深憂子不可見兮道將誰求彼蒼者天兮胡與胡求疇如子之學兮使不位於公侯欲奠生芻兮靈何自而荐羞想風期兮奈何悵平昔兮悠悠淮南部使者邵必奏狀臣伏見國家詔下開嵗貢士丁寜告勸勤亦至矣然士亦有負其業不求聞達者臣恐州縣不得而荐天子不得而知臣伏見揚州布衣王令文學徳行俱出人右奉寡姊如嚴父教孤甥如愛子寒飢窮困不改其守求之士人未見其比臣叨列職司國家利病皆得言之見賢不舉實臣之罪先生行實前忠武軍節度推官知滁州來安縣孫侔為通直郎致仕侔上言尋醫已二十二年乞致仕特除之侔字少述吳興人四嵗而孤與母胡氏居七嵗能屬文既長讀書多自得之文甚竒古内行孤峻少許可非其所善雖鄰不與通也慶厯皇祐中與王安石曽鞏名聞江淮間應進士不中母病革時以為恨故侔義不得仕客居吳門吳興丹陽揚子間士大夫敬畏之知揚州劉敞荐之曰侔居則孝悌仕則忠信足以矯俗扶世求之朝廷呂公著王安石之流也詔以為試秘書省校書郎揚州州學教授辭不赴敞知永興軍奏辟管句機宜文字亦以病免英宗即位沈遘王陶荐侔及王回常秩可備侍從皆除用之侔以忠武軍節度推官知滁州來安縣熈寜三年翰林學士韓維復荐之以為常州團練推官皆不受安石少與侔友善兄事侔安石為軍相道過真州侔待之如布衣時然侔晚年卞急至於罵坐怒鄰論者以為年耆而徳衰也初王囘常秩王令皆有盛名令行能尤異諸公稱述之最早囘亦不夀秩仕差顯惟侔不仕終始出哲宗皇帝實録先生逸事處士之有道者孫侔常秩王令侔揚州人居於蘇州湖間好為古文章尤方亷不能與俗浮沉而接物則㳟以和秩潁州人應進士舉初未為人知歐陽永叔守頴令吏較郡中户籍正其等秩貲薄在第七衆人遽請曰常秀才亷貧願寛其等永叔怪其有讓問之皆曰常秀才孝悌有徳非庸衆人也永叔為除其籍而請秩與相見說其為人秩由此知名及張唐公守頴因荐秩於朝廷賜以粟麥束帛固讓不受自陳方應舉無隐者之實不敢當賜是時余守揚州亦以孫侔聞朝廷賜之如秩侔受而不謝兩人者取舍異或講其意予以為秩尚節而侔安禮者也可謂周之亦可受矣尚節者潔而介安禮者廣而通令亦揚州人時落拓不檢未為鄉里所重後折節讀書作文章有古人風王介甫獨知之以比顔囘也出翰林侍讀學士劉公敞雜録吳夫人傳吳氏臨川人家世儒學聞見習熟㓜而有智既嫁而寡其夫之友王安石弔之曰康子髙才有婦同盖以氏黔婁之妻也王氏吳氏皆臨川望族人物之盛世通婚姻故安石知其賢為詳元祐七年三月唐州言伏見本州泌陽縣上馬鄉故江寜府録事叅軍吳蕡女年二十二嵗而歸布衣王令未及一年而令卒是時王婦方二十三嵗獨有遺腹一女其兄欲奪而嫁之號泣弗許歸老父母之家屏跡田桑以事兄嫂荆釵布素不事塗飾如此三十二年矣今在本縣黄池陂獨居掌治陂事每嵗農隙躬率農夫數千餘人修治堤堰蓄水灌田利及一方一方之人循稟教令子弟有不率者自擕檟楚以求治之罪農民無知非有威刑不可以齊苟非節義出衆何以服之欲乞朝廷特賜旌表詔賜絹一十匹米一十石其後以壽終於泌陽所居焉出國史列女傳節婦夫人吳氏墓碣銘姪朝請大夫擢發遣簡州軍州事王雲撰夫人吳氏撫州臨川人廣陵先生元城王公之妻先生諱令字逄原道徳文章名一世二十八而卒夫人抱始生之孤徃歸母兄䘮除議所適泣涕自誓屏居别墅僅蔽風雨惡衣糲食人所不堪三十有五年以終厥身凜然古之節婦天下稱之家始來唐唐多曠土熈寜中詔募民菑墾治廢陂復召信民杜詩之跡衆惮其役之大煩於是畧睨莫敢舉夫人因其兄占田陂旁慨然謂衆曰吾非徒自謀陂興實一州之利當如是作如是成乃闢汚萊均灌溉身任其勞築環隄以瀦水䟽斗門以洩水壤化為膏腴民飯秔稻而其家資亦累鉅萬夫人一毫不私服用之儉猶昔也方且汲汲振窮乏周疾䘮貸不能償則為焚劵徳聲日聞逺邇信服訟不詣官决於一言乆之四境無復凶嵗民深徳夫人之惠相與列言於州州聞於朝優賜米帛而鄉人矜以為榮跡其澤被一方功昭於時豈特古今女子所未嘗有雖烈丈夫建立無以過之嗚呼是真先生之配也夫人尚書屯田貟外郎徳筠之曽孫尚書都官貟外郎敏之孫江寜府司録叅軍蕡之子婉婉慧成父異之嫁不輕諾廣陵先生妙年英特聲振江淮荆公一見以為友勸其舅以夫人歸焉居無何而寡遺腹有一女長有淑徳荆公髙選諸生以嫁錢塘吳師禮厯博士諫官右司貟外郎為時名臣夫人天才超然辭翰之工不假師授喜讀孟軻氏書議論宿儒所不及謂非婦能皆秘弗耀父事兄母事姊姊亡感慟得疾卒年五十九實元祐八年十二月二十七日兄豪竒士也夫人既卒二年以先生葬常州躬䕶柩北來道病亦卒十年乃克合葬一本作窆於唐州桐栢縣之淮源鄉又十四年外孫説擢官大農出佐雍州以其州朝夕之念不逺數千里力請易襄過唐上冡顧墓碑未刻乃使來請雲曰室家之道古難其全清規懿範曠不並紀今先生名在國史夫人繼有佳傳夫婦俱賢偉竒傑出髙視千載邈無與儔昔荆公誌先生之墓以為可以任世之重有功於天下且謂夫人有賢行又詩哭之曰康子髙才有婦同暨銘司録公則曰季女有特操如夫荆公世之師而每稱重如此可以知其賢矣斯又垂世炳如日星孰敢措一辭於其後哉雖然前誌誌常州之葬爾今合葬於唐而無辭以紀則百世之下安所考信族子誠不肖為是悼懼敢以伯母夫人之徳烈碣於墓上為唐人無窮之傳銘曰烈烈夫人婦節髙世有功於民才實國士興陂溉田均利千里唐無凶年歳已四紀方城之南百萬生齒及爾雲來敢忘兹惠桐栢嶷嶷淮流其東維徳不朽維名無窮墓門有石刻紀嘉績凡唐之人過者必式廣陵集附録
