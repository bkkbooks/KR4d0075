  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_014-1a, image: WYG1106/WYG1106-0464a.png}
body:
  text: 廣陵集巻十四宋王令撰詩偶成十日九自病偶平還苦吟萬金無枉志千古有遺心静隐支憑几寒搔髪解簮南風乆寂寞誰繼五絃琴信筆紛紛世趣竟多途失在從人得在吾苟獲一時兒女笑定罹千古聖賢誅㣲生何事疑人佞孟子當年亦自迂滿眼悠悠懶商較盡留來者議賢愚􅎙蜋擾擾􅎙蜋不足評區區只逐糞丸行若乘飲露嘶風便又作人間第一清世言􅎙蜋變蟬騐之亦有然者荅王薄正叔當年論友笑常情誰使風波忽沸騰自有赤心包白日竟無綺語敵青蠅重來赭面還如火自許清誠卒似氷反覆來篇却堪嘆待將遺恨寄朱繩秋懐寄呈子權先示徽之兼簡孝先之熙滿子權詩附樹哭寒蜩草哭蟲何堪覊客憤時窮卒無可樂羣書外百不堪言一嘆中雲黯暮天沉白日土塵平地斷清風支居若問秋來况泪滿遺編髪亂蓬次逢原秋夜見寄滿執中病對園林萬事空肯將寂寞感途窮消磨壯憤詩書外破碎閒愁笑傲中霜苦亂蟲清呌夜夢寒孤竹冷敲風思君别有悲秋意不為南湖一釣蓬送仲寳叔赴秦幕秦闗千古有雄名秦地寧時自心戰爭草野英雄無敵國朝廷勲徳倚長城錦纒紅帕將軍府紫電清霜武庫兵絶幕烽烟沉逺候太平金鼓雜讙聲淮西司馬新恩重魯國儒生舊望清黑膽赤心男子事大弨長劒丈夫行待垂賈誼言餘餌就試終軍請去纓縱不首傳函報死亦須頸繫背笞生當年功業鯨鯢盡振古勲名日月明莫嘆暫從紅幕去待于歸望碧幢迎愚時若忝書功筆未信燕然有舊銘從光師求花我有歸心不可寛憶君花好舊常歡若令醉眼異郷見定作故人相笑㸔知有靈根分客易却憂平地得春難只應胡蝶還相識飛過東風又可嘆九日寄滿子權懶將衰病照清流為有歸心欲白頭幸自好花開便笑不甘為客見成愁長歌欲強秋風醉髙處先輸俗子遊我在無聊元亮死當年今日共悠悠上黄任道家世無䨇舊材資第一良山川儲地秀日月合天光逺色抵千古洪聲壓四方道如天未喪子讓世誰當文斧摩空運儒工縮手藏鎔金斥淄石截玉出端剛追復軒羲舊裨縫典誥亡􅑞傳爭噍噍問望蔚堂堂章甫通期冠緇裘詎合裳計量遺丈引収取竟尋常有漸雖宜賀論才固在傷偶來官簿版何異任牛羊客有装垂槖時窮道括囊貧才完竪褐義不及妻糠劍折終羞屈蘭移不改香幸偷容足地恥學反羮墻同日如無善當年尚取狂互鄉前事在北面有先望荅滿子權兼簡衡父居唱奈髙何君休我試歌古今愚智府天地是非羅何日功名就青雲日月磨俗兒吾不較計此竟誰多寄滿粹翁心愛滿夫子論師不敢交誠明大中性二五老陽爻後學誰思進吾䝉乆辱包思之無見日夢把客門敲寄滿衡父寒葉落傞傞荆榛刺出柯四鄰松竹少晚歳雪霜多兹世居無可勞生計奈何此心須見子不敢向人歌多隂寒雲慘四垂萬景浩成悲白日不可見青天自取欺晚烟先夜色宿雨借寒威借韵泥潦莫相涴西風㑹有時次韵立之紅葉雨露三春少風霜一夜多從來有根本不怕下枝柯楚岸楓相屬吳山橘與和秋居好相慰醉色伴吾酡聞富并州入相元首賡歌樂股肱四方強逺一本作廣喜聲盈忠賢不死天心在輔弼終歸聖慮精中國自今應更重本朝前日可嗟輕要須待見成堯舜未敢輕浮作頌聲寄黄任道勞生滚滚欲何如去髪紛紛日一本作巳滿梳萬古聖賢同夢寐百年天地只蘧蒢詩書計出田園後歲月期收道路餘安得優㳺似濠上共將談笑戲觀魚答劉仲美多謝劉夫子殷懃寄我編何時共杯酒一笑似當年嵗月囬霜雪生涯廢簡編終期收晚學茅屋送一本作賦歸田舟次梢梢修竹夾溪斜樹繫孤篷白淺沙風力引雲行玉馬水光流月動金蛇村酤客聚還成市晚釣舟横便當家山野生涯本閒暇誰令客子自勞嗟次韵子權京口夜宿見寄寒江漠漠客㠶稀獨泊扁舟望翠㣲巳㵼綠􅌬聊自適更邀白鳥共忘機水閑海月寒初上一本作漾樹盡秋城碧自圍嗟我相思邈千里不來同此兩忘歸答孫莘老見寄髙門鞍馬日光榮勢力紛紛起共爭偶以不能聊自便敢于兹世獨求清生無人愧寧非樂死有天知豈待名客食官居同是苟何須稱别異平生登郡樓江城朝雨濕晴烟樓上風㠶送去船苟得息肩閒歲月時來開口笑山川田園啼鳥三春月江海扁舟萬里天何計脫身來此老青山白髪兩忘年感憤二十男兒面似氷出門嘘氣玉蜺横未甘身世成虛老大見天心却太平狂去詩渾誇俗句醉餘歌有過人聲燕然未勒胡雛在不信吾無萬古名聞邕盗病中䨇泪語前流藜藿無端肉食憂常嘆平時輕死士未知誰手付天矛好将弓劍随軍去况是英雄得志秋若使班超終把筆由來何路取封侯登𤓰州迎波亭海面清風萬里寛偶來知巳脫塵闗自嗟客世無虛日却被斜陽占盡山海鳥不來青嶂静漁師歸去暮江閑從來雲水有期約直待功成是厚顔聞雁可憐飲啄鎮随陽何處聞時最斷腸萬里波濤九秋後五更風雨一燈旁乾坤莽莽連舟楫繒繳紛紛羃稻梁安得人同覊旅意悠悠南北不相傷憶潤州葛使君六朝遊觀委蒿蓬想像當時事巳空一本作清談事竟空半夜樓臺横海日萬家簫鼓過江風金山寺近塵埃絶鐡甕城深一本作為氣象雄欲放船随明月去應一本作當留閒暇待詩翁何處難忘酒十首其一何處難忘酒君臣草昧初謀臣偷賊胆力士一本作首幹凶鋤日月明將霽乾坤害欲除此時無一盞何以壮一本作訖又一本作助雄圖其二何處難忘酒天心渇太平焚山急賢出㧞草惡奸生議盡芻蕘口歌囬雅頌音此時無一盞何以快一本作暢輿情其三何處難忘酒登賢入用初一身兼禹稷四海再唐虞去聖千年恨明時一日舒此時無一盞何以酹亨衢其四何處難忘酒王朝四海中魚鳶上下樂𦍑狄朔南通萬玉叢丹陛千簮合辟廱此時無一盞何以樂成功其五何處難忘酒君王宴豫年羣謀安一統無口議將然閒暇開元後優㳺大業前此時無一盞何以慰遺賢其六何處難忘酒王臣立藎方羣邪終自直萬死不摧剛社䑕旁難塞一本作䑕社龍鱗逆易傷此時無一盞何以洗憂腸其七何處難忘酒窮邊壮士歌寒弓彎未試秋劍㧞新磨月落隂山暗沙昏伏甲多此時無一盞何以陷前戈其八何處難忘酒欃槍世不平孤兒未勝甲孀母送為兵氣絶心肝裂號窮血泪横此時無一盞何以活餘生其九何處難忘酒窮才世不知出門無直道開口碍當時白髪無端速青山不忍期此時無一盞何以慰憂思其十何處難忘酒亡君復舊逰黍離經故國一本作土麥秀悼前羞逺目何勝盡行車逆自留此時無一盞何以謝悠悠廣陵集巻十四
