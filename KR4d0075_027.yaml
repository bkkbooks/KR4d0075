front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_027-1a, image: WYG1106/WYG1106-0536a.png}
body:
  text: 廣陵集巻二十七宋王令撰與劉秀才書令惶恐向嘗令子之辱廹於尊命黾勉以從不得終讓自獲來過日見穎發方且駭愕歎愛疑較比而不及何暇自乘以師耶後生可畏聖人猶或難之况令小人學出衆後方期從人以師未終所業惡敢輕自加人以高耶徒以天拙無業早知通文字偶來於此日鈎掇童子以自脱莩餓雖以得飽然其謂所學何以是懼慚無寧日臨食興嗟志折心缺此惟所臨童子猶爾况令子開敏者何可復當也念終不敢自愛懼徒損以無益以孤左右虧辱厚意終宜有償之此其時也伏聞辛君秀才旦夕至縣雖令與之踈素不盡知其為學然齒高日深從事之歳久雖它賢傑無異論苟財如令軰合遠過之况其以貧來所資尚慊令得於人有餘以此易彼甚為允協又况如令實德不加之而令子素所從㳺者不可忽也古人有言曰女智莫若婦男智莫如夫此徒習聞耳猶待久而彌通况志於道者哉是所宜也伏惟加念之令惶恐與束伯仁手書令頓首向托任道奉書得否袁君來辱書甚勤伏承起居無恙至慰至慰令即此已與學朋㑹頗自為學疑繆多矣無從考正奈何比日奉計為學不輟足下居家多閒無衣食之憂能肆然不以外物自干一縱於學此天之資也更在撥其故常無狥世俗則後日將奉見於古人之地可不勉哉藏芝賦以見索之故常録一夲適値發介甫書將附少文字以獻今雖得寫夲而藁草尚在𤓰州葢托袁君録之須後信奉呈近頗作詩亦不能得嘉思惟山中詞江上詞作非苟然雖未為工然其素心也以素所好愛輒謾致之試與㸔之不然示下冬寒保衛元韞行速一作迅不謹令頓首又令啓向嘗奉狀後久不得報中間令亦自揚徃還求不得便者久之固無以為問比日起居何似思企思企任道歸後亦相見否縣中諸事何如别有何相識為學計不懶則進德無量然更望勉之自圖高大無滯區區之間久辱見愛輟望道此高文時見寄春寒自愛不宣令啓又令啓連辱两問及辱賜詩過以所為文示如令鄙者豈能知識然甚喜為學之進唯更勉之後將過是則令益當媿也比日起居安否令居此幸無他向欲至揚後竟以病罷久别再所攀仰近日病何經因便示及鄙文屢辱齒索然以粗繆頗羞示人以故久之虚損勤厚輟録少許奉上惟以所非告之良幸微之兩得書亦以所文為寄比益進可喜春暖自愛無事能至此否必不可時寄書不宣令再拜啓又令啓今日丈文行已附狀洎鄙文計已得之伯仁昆仲固相愛無惜所短見示向托伯易先寄㳺山記去不知得未如未得因便取之令近益偷衣食之間以自學尤思相與講之也新又近有否進學應不已無流於俗不泥於近斯二者皆學之大患所竊思以為戒者辱見愛因道之近得宗魯書知㑹聚如故殊眷眷也家叔累欲奉書多以事廢今又與趙興者不相㑹因不及奉狀也如果見訪甚幸令以女兄之故殊思遠遷恐後難相遇也此事不欲人傳幸秘之未間保重珍愛不宣令啓又令啓前人囬令已在舟中當日遂行到江隂又已經月向累累奉書欲早來圖一相見竟不能如願良用悵然離潤日長奉一小簡後得元韞書知已附去還達否比日安否何如伏計萬福令侍外無他自入夏病作與去年無異可怪南北遷徙事累日甚學益廢奈何奈何令以女兄親期甚廹太平之遺已到自計猶有未足輒以書奉干尊丈薄有所假宜亦見哀若萬一目即闕之不及見假亦望立示一報所假與綿但送元韞可也仍告示送所假徃之潤葢恐去取者相差介甫到常必興學此亦稀濶之遇果來從之大好尤須為長久之計爾師學難遇今世之學分于多門以令所考自揚雄以來葢未有臨川之學也更在勉之餘未及盡令啓又令啓四月南航比今方還道路濡遲連經疾苦復思家謀歸殊無情况抵眞復病今日方似差已雖奉思無已終不暇致書其勢以此故耳比聞兄弟皆失薦殊用驚歎士之食不足干兹世者失此不能得禄故亦可哀伯仁兄弟家幸足雖失亦何足多恤必如以材古之名賢尚爾况吾軰學未巳者則今日之失亦安知非福也比有暇謀學否令於此尚可留數日足下果肯顧之或可得旬日之㑹幸留意切切令脚疾不已不樂南居至家當北遷恐復還潤恐欲知也宗魯安否以病中伏枕遣此不暇上狀想亦見諒也嘗許其子名序在蘄嘗錯鄙意後輒無暇至家當成以奉寄矣不訝不訝諸相識道意千萬一來久别殊思相見一咲樂不可失也令啓又令啓既逓書奉候三日疑足下終不來令以兩家叔歸輙至揚省之徃還復四日得書具審㫖意仍惠筆團皆已収訖愧悚相去甚近令以足病不便乘馬以故不可上謁伯仁昆仲家事皆主於父兄何係而惜一來此耶令留此尚須數日無惜一來甚幸鄙文别後時亦有之令病不能書果肯枉顧可就録之也承見教以自愼此令之所志然每失輙自悔恨其不肖者未嘗不在此今伯仁復以自振我敢不拜貺媿荷媿荷如有所聞無憚頻示人無以言藥我者久矣伯仁果不遺令之幸也餘須俟面盡冬寒凛冽千萬保愛珍重自惜令啓又令啓向遇趙具于常具聞動靜伏承惠書告以不逮相别之久殊慰所思及承來問益恨相遠不得再就所益愧荷無巳愧荷無已令既至家已冬至復以生用之窘已從常人之招旦夕當遷既定居且復近書以講所未至甚思足下與同也不審伯仁昆仲能一來乎常視潤雖差遠要無所虞一也何惜而不見顧乎餘須靣謁冬寒比劇千萬保䕶不宣令啓又令前以家事干丈人言愉色垂似有意窮困者退歸喜幸達旦不寐思其遂有成宜如何圖報也令每觀前世豪傑之士方甚窮溺時或偶有力者鈎援之每色然背靣汗如身承若人賜者因自喜願有德于人而未能今而乃希望門下令雖不肖不能自修尚以及古豪傑以光承盛德卒徒以死猶將忍絶而歎息狐首以不瞑爾侍餘幸開説之非敢廹促也備忽忘於左右爾如何如何不宣令啓謝束丈令皇恐不肖無所用於人因縁于此去而復來苟得食以自延其於丈人有賜素厚也居自念之卒與足酬報者廹于莩餓又不得自引以去其慚于旦暮不忘也一有所貺見之汗出且憂甚區區無以辭與辭而不得請媿于中而拜于外則心迹判别而相羞所不安乃此不謂復辱所命輙道此唯薄其賜圖其安所以望也何勝欵欵不宣令皇恐又令頓首令觀古之聖人賢者賤事開端初亦似有可疑者及諦讀而審思之則有義焉無疑也故孟子於長者之賜雖不義之許卻而弟子疑之而孟子不自疑也後來學者不貪其得而於進退之間不自疑如孟子者希也又况令哉雖然取之者義也又復赧然于外而心悛而不皇暇也令不肖無才能又少孤以故不容當世近于飢餓不能不濫思其西來以所聞學欺紿童子以貿易旦夕之餓含愧忍恥有靦面目固非古所謂仁義孝弟宜得食於人者豈容復拜他賜耶夫周恤貧賤古人皆望于諸侯大夫而不在丈人也何以承奉不勝愧赧不宣令頓首謝束熈之令老鄙徒犬馬之齒加長所學與為皆荒茀不蹈道晝夜自思冀一二於千萬間或能力行自脱於小人亦非今日之謂葢終身云也熈之春秋富盛聞見蒂核延蔓接連而不殊絶作為文字皆純粹遒勁使當世有盛德美材者皆將畏伏懼縮崩角折􅀈而願相朋友如令軰何敢冀望後塵哉比此西來而足下窮餓之憫恤也借之聲色為幸已過昨日復偕令昆抗拜堅强不可移易承奉之際髪立股栗不知何自而當之也憂愧未輟再拜詩賜閲其言詞若形容千百歳古之人者不然則須當世之賢者而後當之或者猶讓也令獨何人非敢售也少當詣門拜從者之辱不勝恐慄不宣令啓答王介甫書令再拜啓辱所賜書伏承起居萬福令已至眞吏歸不過三五日耳令以足疾不樂南方竊欲於潤謀一息肩之地不知果得否也人情不易遽去既至家當遲留至春初車馬至江寧幸一見問當謀侍謁也道路時聞流議固俗人常態耳求之於義未見有失也此職安可以久居所請雖頻要有得而後止耳辭既遜順雖煩亦何所害承見示諸君之論以謂不宜自求便安數溷朝廷此似不量為使與請郡輕重者也使要之不可為則請雖煩有不避也世之與官爵有所徼求與自以為寃而求直者書有數十上矣若以義論之則使不可為决矣以義論之則雖煩與彼何異耶何為而遽止以憚煩耶近聞江東在位徃徃怨怒此皆令所親見介夫所待遇未有以失之也然而人之如此者以其所為異耳特公心不阿黨以逰兹世難恐久而不免人禍也古之人非其時有魚鹽賈販自沽者多矣然未有為貧而為公卿大夫者非惟不可亦勢不便耳今既参差其間要得郡後止耳不審何如配兵不習水事竊以為上論無害今居其職安得無所言耶若乞河北山東関西河東等路應已配人量道里遠近各配重役或無江河處但非邊江雖在江南似亦可若江池太平等州或上以更有邊江州郡似此類者必闕兵士應役或於旁郡不廢綱運州郡如舒蘄信歙等州抽壩應用如江東轉運司於江寧别作小營聚十州兵士祗偹上綱之類如已配在江池等州此人不㑹水者並乞改配不邊江腹内州軍不審亦可否或聞亦有條不許差北人上綱信否仍問知兵士既上綱為重役法當二年一替今既上綱即四五年不替多為用財者所侵聞支士既滿限飢寒不能自存多逃竄以求脱雖十將節級皆然其下可知也但不知提刑司亦治此否道路其他無聞其所施置所置炭定磁民間甚以為便乞知之冬寒砭骨伏乞保愛令再拜後批請郡事不可已幸思之以北人易他郡南人雖連家遷亦似無害與王介甫書令啓舟行濡遲以十一月到家十二月遷常久不得行李所在殊竊怪人向辱賜書定來淮南遇人之此來者輙問之竟不得所審以至今不知比近起居如何伏惟萬福所請後復如何使不得所欲後更匱乏未審何計以自持必不得已以從之後且有大于是者何以辭之乎然必欲不受以今日之窮觀之彼有以制我矣雖無從可乎苟必為不受一作苟必不為不受則孰與今日自必乎此亦機㑹不可不愼者也不審所擇如何令之來此事故亦紛紛矣徃還雖多不見所同只以廢日足疾之餘心虛喜忘恍惚無聊學固廢矣思仰教喻不審何時復得侍謁若在淮南異時或幸一見未間時乞賜問春末日熱伏惟愛䕶不宣令再拜廣陵集巻二十七
