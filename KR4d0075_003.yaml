body:
  text: 廣陵集卷三宋王令撰吕氏假山鯨牙鯤鬛相摩捽巨靈戲撮天凹突舊山風老狂雲根重湖凍脫秋波骨我來謂怪非得真醉揭碧海瞰蛟窟不然禹鼎魑魅形神顛鬼脅相撑挾偶聞有感鯨豗海翻飛陸塵鐡房孤劍枯紫鱗擠排壯士仆不起天公始自誇為神誰令冦敵牙枿橫不拔不鋤安得平常星作彗倘可假出手為掃中原清寄題韓丞相定州閲古堂始聞定作閲古堂又聞定有閲古詩揚之逺定五千里思得兩翅擘以飛偶聞人來説堂事初敝兩壁無塵疵間時公來命繪匠親以玉指交畫揮教令某載若某狀匠拜奉命唯不辭左圖守相父母吏右狀將帥熊羆姿長冠峩峩偉笏佩鬬以玄白為裳衣屹如丁寧立以議遜若避讓行而隨圖成儼一本作嚴毅色可讋過吏不敢竊目窺仍令大筆署行事寫出黑膽朱肝脾死者有靈如不泯合有英氣來附兹故公之謀不知出宜有神鬼一本作物陰助其茫茫九泉謂巳朽豈意一旦存形儀請留中壁素莫繪待千嵗後公以歸當搜國匠第一手狀寫公像存依稀要知文完武繩備遺與萬世瞻思資我知觀者定墮淚不復峴首羊公碑又聞當世大手筆磊砢詩句相撑支手摶蛟龍拔解角爪擘虎豹全脫皮鄆州溪堂遂寂寞韓詩塵蔽人不吹想應從此傳萬世粹玉貫串珠縈纍小戎何為而縮伏久滯公斧血不滋何事功成事業就兩手一掃清三垂一本作陲歸來天子喜以頷泰階輝煥平無欺一本作欹次招當世草茅士各使呈露心腹披締裾聨纓上廊廟留與後世圖為師然後回謝閲古堂彼合異代今一時龍興雙樹春城花草一本作草木窮朱殷俗兒趂走腳欲穿問來無悰喜自適時到雙樹為竒觀莊如天官植幢蓋毅若壯士蒼衣冠老枝又芽忽並出似欲併力擎青天靈根深盤不可究疑與地軸相拘攣不知培栽竟誰手而又始植為何年行捫步繞不可問但見茂色連雲煙東風牽人少遊此佛屋日日重門關雖有大蔭人不及於此尤得志士憐束蒿為楹樗為柱居者略不憂其顛乃令遺材抱美植不得總載桷與椽髙堂傾欹未支柱匠者日亦經其邊不思大幹有強用反以斧鈍難其堅吁今誰是愛材者定知惜此雙樹篇原蝗蝗生於一本作蒲野誰所為秋一母死遺百兒埋藏地下不腐爛一本作朽腐疑有鬼黨相收一本作扶持寒禽冬飢啄地食拾掇穀種無餘遺吻惟掠卵不加破意似留與人為飢去年冬溫臘雪少土脈不凍無氷澌春氣蒸炊出地靣戢戢密若在釡糜老農頑愚不識事小不撲滅大莫一本作不追遂令相聚成氣勢來若大水無垠涯蓬蒿滿眼幸無用爾縱嚼盡誰爾譏而何存留不咀嚼反向禾黍加傷夷鴟鴉啄銜各取飽充實腸腹如撑支兒童跳躍仰靣笑却愛甚密嫌踈稀吾思萬物造作始一一盡可天理推四其行蹄翼不假一本作反上既載一本作戴角齒乃虧夫何此獨出羣類既使躍跳仍令飛麒麟千載或一本作始一見仁足不忍踏草萎鳳凰偶出即為瑞亦曰竹食梧桐棲彼何甚少此何衆况一本作而又口腹害不訾遂令思慮不可及萬目仰面號天私天公被誣莫自辨慘慘白日陰無輝而余昏狂不自度欲盡物理窮毫絲要袪衆惑運獨見中夜力為窮研思如知在人不在天譬之蚤虱生裳衣捫搜剔撥要歸盡是豈人者尚好之然而身尚不絶種豈復垢舊招致斯魚朽生蟲肉腐蠧理有常爾無何疑誰為憂國太息者應喜我有原蝗詩别老者王元之二敵之來始何自乘我中國方迷昏各投一本作設陰誣一本作險怪張誕妄尋附罅隙為株根例誇難能壓甚畏釣博天下要推尊其流汗漫巳不制尚自沖蕩洪其源一敵中侵欲內侮猶遣萬甲疆場屯何哉二敵日內壞不思刷去仍資存嘗聞古人第氣類皆以化外不足論惜乎無倫弗禮義幾希不得人相捫吾觀世之陷此者不啻火立足向燔豈期之子既自悟不思跳出乃欲􅢶余方往就西北食聞子亦整東南轅雖然去就固在子安忍惜手不試援答李公安自古名士紛如毛多見博帶裳衣褒如其可學不可逮一本作殆三滿夫子皆儒豪其文淵源尤可愛江海駕蕩相吞滔方吾少時未識愧引領日望聲齊髙窮吮折吻氣力絶始盡退伏非所曹近來筆硯思置去新詩苟有亦自韜間時屢索不肯出若欲獻貴賤厥操李君南來久有日我姑得見試捾搯忽逢詩挑欲我接快句鋭利磨一本作如矛刀要令口獻近章句若急敵迫不可逃顔頳舌澀不可吐滯若亂緒強抽搔惟其自陳尚訥怍况又聼者寧不聱退歸自與敗者比誓欲棄甲弓矢櫜新詩見殺又須和咄哉自守何不牢廣黃醇正叔二思詩木落不去根水流常背源木落方病寒尚覆本根溫水流忘由來散亂一本作漫卑濕牽讀子二思詩起豫二者言木實類君子老有孝感一本作慕存水亦一本作乃人迹然動由名利一本作為世俗牽一本作纒使我父母感一本作感我父母恩一夕身百翻人世但可悲一本人生徒可悲小官何足言情蒙有相奪心迹固此一本作巳分勉之多自寬行見西歸轅晝睡太古一去浩萬世百智競起紛修治平聲交將砭刀潰瘡痏縱得平好無完皮傾山竭河論麯水都投大海為酒池中間秫稻不滿掬日益醖釀成澆漓不知淳風竟何適萬手齊舉招一本作爭不回北窗清踈鳥聲好晝扇自穩間支龜塵埃不到日影薄枕簟拂拂生涼颸四支舒安百慮廢髣佛認得太古遺散一本作精魂怡愈不旁適心肺正靜無邪思因能不有世俗夢獨與淳氣相盤嬉伏羲持刀割文畫古意蕩盡無銖釐睡無吉凶無得失縱欲強卦安能為故能獨存至今日人各已有反不知須知睡義大亦一本作益盛一本作甚豈獨床第誇昏迷君子勞心事業暇得時休息安天倪小人一心包萬險逮退就枕皆平夷使其睡心大充擴去與君子何毫絲當年嘗聞曲肱樂曽及至聖宜無非何况於夢更有得不見公旦因嗟衰後來紛紛不知樂舍去大路趨邪歧竹林猖狂事飲鍛捫撥蚤虱無留衣好惡低上浩萬端竟不及此亦可嗤蚊虻紛然始誰造一一口吻如針錐食人肌膚得腹飽不解默去猶鳴飛攘拳揮臂不可却聒耳不異笙匏吹雖然今尚爾無奈當有獵獵秋風時爾軀糜潰爾口壞我床安穩我枕欹平時多賢貴不及念日偃瞑休恬怡一本作怡怡哭辭一哭摧心肝屢哭雕朱顔心肝摧日痛朱顔雕日乾二十人未壯我衰巳毛斑古人不得一本作可見今人誠可嘆古興出門將何從與物隨紛紛不得所欲為還與俗人羣外迹久巳非獨嗟心所存自信有可羞彼人何足論秋居秋居寒蕭踈秋意愁交并飽犬無吠志飢烏有凶聲庭空鳥交下墻穴鼠更爭浩歎欲出門日暮不可行雪中聞鳩孰謂拙者鳩巳厭不可彈吾寒方病雪爾何雪一本作喜自喚寒城千萬家什伍赤兩骭通衢結沮氷走指墮或半門閉市無人竈冷煙不㸑俗以雪為賀我獨雪之歎富貴宜為憂不憂亦何患吳江長橋老匠鐵手風運斤一挾刃入千山髠明堂有在不見用此為失地猶濟人西瀦巨澤江海通獰風撼地波撑空當道獨能支地險更東安得與天窮莫比垂天紳莫比跨地帶渴龍枯死乾無鱗絶海失舟踏鯨背秦帝東遊逐仙迹纍重肉多飛未一本作不得三洲水隔不到山借得紫虹千萬尺平時塵土埋吳雄吾亦棄劍來遊東欲觀水盡朝宗海安得身乘破浪風為約他年可歸處頻倚欄干不思去季鷹范蠡不足竒待我為名千古歸題滿氏申申亭申申亭者名自誰河東大人身銘一本作名之方其作亭自休息固欲申暢名其題雖然自奉頗幽樂豈敢兼忽當世為若日所憂非所及因以遁世無悶辭丈人踈髙喜自適志不限約來無時門無賔僚車馬絶室有几杖衣冠一本作巾冠欹夜徑行招海月伴晝榻坐與天雲期春林喧和鳥聲好勝聼俗論相啞一本作嗢咿塵埃縱爾得風力卒不到此徒自飛亭前朱朱有冶態亭下白白無俗姿好木留存竟見實惡草鋤拔無容茨嘗聞景勝未易敵須有大句相參差故吾經年不敢往日望詩老力可支偶來為遊適巳晚花梢尚有春餘遺髙哦繞樹惜時節拾嚼紅廳行逶遲回看北林竹萬顆一本作箇寒氣一本作翠欲起凌人威清風時來助氣勢寒甲夜聚言語私方將投間日來此腳踏樹下成交蹊無端塵土又為隔明日跨馬西北馳心思夢好定頻到不必直俟歸風吹晚嵗晚嵗一本作嵗晚意不適新詩老無情萬古共一本作去一嘆百年行半生貧憂世纍重賤喜身責輕義有不可嗟一本作必可嗟非吾不能平聞太學議白日流上天牛蝨無遁形萬目盡為用而不駭日明穴鼠夜值螢嗾嗾相聚驚鼠穴不日通鼠足不日行巳矣不日識乃此螢爝矜鮞蝦陷井坎莫與江海爭籠禽不失飛詎識雲漢𡨕咄哉浮薄兒勉為髙大營贈别晏成績懋父太祝懋甫相門兒家世踏一本作沓纓紞早年綴官薄青衫蔚於菼本宜多驕矜不謂鋭意敢意貪英雄交一手欲四攬偶來濫豫會臂搦手巳頷酒獰誇胸襟頂踵都一膽壯心羞摧藏義內喜葅歜要言相死從一本作死相從顧豈苟難斬聼其自陳論峭拔不平漸要之當一切固令不黤黯一本作黮憶豫少年時亦自喜黠㴸於今老而悔壯意一本作志日凋減惜夫相遇遲君放我巳檢驟聞強大語若虎餓得啖巳無相髙心徒有志氣感春風吹天昏醉目睨愁慘念當相别去兩懷不無黲何時重來過慰我涸轍噞唯其去後懷猶一飽復歉幸有西南風時作寄我槧别張粵南夫溫子堅元白滿執中子權黃兾端微始吾得三滿自謂得過人一日不見之巳恐愚賤濵憂思叢中來腹腸生毛鱗輕舟刺而南久結願解紳入門顧我笑喜氣沃以新徐徐相抽尋軋軋聼引陳先生固天賢擬議何可鄰諸君人相得熱炙杳相熏而我拱其間貪喜乃失神鳯凰朝百鳥鴟鴉亦來羣然其氣類同終獨鳳鶴親發為鳴聲和上下相鏗純苟非治平世不得此類馴故其聞之者舞蹈相搖振輕風促回舠後會無涯根一本作垠作詩謝幸甚顛倒迷歡欣如將銘自賀又欲書諸紳廣陵集卷三
