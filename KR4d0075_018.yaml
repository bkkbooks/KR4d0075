body:
  text: 廣陵集卷十八宋王令撰詩九曲池悼古刳地決洪波深流隱一本作引木鵝檣髙帆繫錦堤暖栁藏河泰甚心方兆顛危念則那去都如脫屣東下若瘳疴殿腳千論女宫眉斛計螺迷樓插空逺水調揭聲和忠切聞無路愚諛面自阿君顔未回笑賊首已稱戈運去天移鼎人遷地見禾當年遺廢沼及此尚名歌古往悲奚寄今傳跡未訛水寒波刺甲土老岸髯莎落照留歸一本作飛鳥西風困舊荷暮林迷逺嶼夕靄暝前波一本作坡亡國誰堪問羈人恨自多憑欄不成去歸意為蹉跎寄宿倅陸經子履勳業悠悠未可貪直須隨處酌醺酣君知仕路三無愠我與人情七不堪聞借朱衣為别乘想回青眼憶髙談東風尚有西行約甬水橋邊定解驂太湖西南無盡望吞恐罄吳郊海近私憑蓄天低不敢包蛟龍宜自宅蚓蛭莫令巢逺浦才分㸃歸檣略認梢水乘潮更濶地過底宜坳鳥絶烟維斷風凌浪脊交大橋橫作書別岸缺成爻吟恐詩無氣圖憂筆費抄歸輸范蠡得官許季鷹拋志憶心應繫歸誇口定勞窮何須蹈海來好卜編茅著户生同隱居民釣自庖滄浪未容濯魚枻夜停敲答劉仲美莽莽晴川水寥寥病客舟來隨風浩蕩去逐雨淹留生計梁邊燕歸心海上鷗多慙故人句欹卧一長謳平山堂寄歐陽公廢苑繁華未可尋孤城西北路􅋂崯檐邊月過峯巒頂柱下雲回草樹隂賓客日隨千騎樂管絃風入萬家深知公白玉堂中夢未負當時壯觀心歲暮呈王介甫平甫歲暮逺為客一身歸計深塵沙日翳翳雨雪夜隂隂喜色開南信悲懷動北琴感時須寂寞何獨少陵心塵土呈介甫塵土紛紛起處微祗隨風力亂噓吹髙張白霧橫宫闕低引輕雲暗路岐客坐昏䝉歸耳目人行斑白上鬚眉誰知雱霈天飛雨洗滌輕浮㑹有時溪上溪上清漣樹老蒼行穿溪樹踏青陽溪深樹密無人處祗有幽花度水香金山馬蹄行盡九州閒無處歡娛得破顔只有此中宜曠望誰令天作海門山朝雲朝雲飛飛來無窮暮雲漠漠昏相䝉間來既自不成雨拂去安用遮長空擬鞭屏翳問白日更謫星伯誅長風盡一本作書令萬物被光景夜看北斗朝天中登城病來萬事懶自宜髙城有樓間登一本作可躋來期清風脫日熱坐厭逺日看天低間郊一本作雪草樹漫䝉昧落日燕雀爭依棲臨風一嘆人不㑹一本作人誰㑹直氣飛去添虹霓招束伯仁杜子長夜話久隂忽晴已可賞况復夜氣驅蚊藏清風逆回六月熱急雨借得三秋凉非惟歸雲人目快更有白月天心當從來萬古有未盡待子一夕心胸張臨別瓜州十年來往常依依此日復去來何時青山有意退弗忍白髮不逢歸未遲乾坤不盡萬里望草木無限西風悲塵纓欲濯惡獨潔滄浪流去清無涯春意春空漠漠多愁容春意冉冉隨歸鴻寒雲飛髙不肯雨白日翳暗何時風閒花野草各意態濃烟弱栁相昏䝉北窗厭睡不知夜起見海月如秋空雜志性說或問性者何謂也曰難言也曰古聖人亦不言歟曰古聖人言不得巳而言不得已而言是哀生民之愚也余業聖人者也敢廢言乎哉曰然則性何出也曰上而億萬世下而億萬世其源吾心是也推吾心而以通萬物之心一心也是則性者萬物之源乎廓而無形象也寂而無兆朕也不日不月陰陽不能晦也不雷不霆氣象所由應也天蒼然禀之而上也地隤然禀之而下也日月星禀之所以經緯也山川禀之所以融結也然則人介其間禀之粹者也人皆有禀之之資而不知所以禀也是蔽之也蔽之來非一日二日也當湛然之時無思也無為也粘湛而情生則感氣而育矣感氣而育則溺之形質矣溺之形質則事物之攻將千馳萬驟而不能反其源也嗚呼物格則局之視也聲激則局之聽也事牽則局之思也舌鼓則局之言也樂生則欣喜集也苦纒則悲哀來也好惡相兵也是非相戰也異而出于同同而反之異以繩墨辨曲直也而不知不繩不墨所以為曲直也以氷炭等寒暄也而不知不氷不炭所以通寒暄也噫大道昭昭彌綸于天地間奈何世之人不逹也世之人所以不逹者喜惡之情為之縳也善者曰吾守是舍吾守何道之有也惡者曰吾守是舍吾守亦何道之有也善者泥于善惡者泥于惡頑然封執而不知聖人之變也曰然則善惡等歟曰善與惡利害則殊矣要其事為皆出于情也今夫霜露之濡生殺不能廢一也知露之能生霜之能殺而不知霜之所以為霜露之所以為露要之于潤則一耳彼人所以執霜露云者局之于生殺之情也善惡之于人豈異此哉曰然則善惡之情不足辨歟不辨何以為聖人也然則善惡之來各緣其習也薄也厚也隱也顯也人固有始善而終惡者始惡而終善者本末渾然而善者始終渾然而惡者有善惡參相用者此皆何也曰向吾所謂善惡之來皆緣其習也者此也始善而終惡是善情薄而惡情勝也始惡而終善是惡情薄而善情勝也本末渾然於善善善者也始終渾然於惡惡惡者也善惡交相用是善惡之情交相勝也曰然則性果無善惡歟曰性無善惡也有善有惡者皆情耳曰善惡紛紛何由復其性也曰夫明覺之人不留善也不滯惡也善惡忘則好惡平好惡平則物我等物我等則湛然無情于其間故能與太虛等矣曰當是之時則與太虛等亦無有為歟曰是何言也水之止萬物之鑑也谷之空萬物之應也聖人者天下之母肯遺天下之子哉天下之子不可計也非而悖于是者有矣惡而忘于善者有矣非而悖于是惡而忘于善聖人未嘗忘于心也心不安則思有制作行于其間矣紀綱教化所以敦天下之本也典章法度所以開天下之誠也符璽斗斛所以公天下之平也刑法號令所以檢天下之奸也春秋以是為春秋也禮樂以是為禮樂也易以是為易也詩書以是為詩書也噫古之逹此道者皆聖人也伊尹曰以先知覺後知先覺覺後覺豫天民之先覺者也豫將以斯道覺斯民也伊尹覺斯民之道上而億萬世下而億萬世舍吾所謂性者無可覺者矣噫聖人沒典法淪喪知吾道者幾人也後之世德行不修仁義不著使天下之人泯泯然入頑獷之俗而不自知者皆不知性之罪也有志于天下者可不念哉師說上古之書既巳汩沒其他治具不可稽見而五常一本作五帝之學求諸傳記間或見之夏商之書雖號殘缺然學亦有名一本作學之名具存法周則大偹故其施設炳然彰白若然帝王之於治具一本作日它雖世有取舍于學則未聞或廢也豈非君師云者兩立不可一蹶歟夫惟至治之世其措民各有本而次第之以及其化故地各井而民自食其業雖有士農工商之異未嘗不力而食因其資給然後繩其遊惰澄其淫一本作遷邪鋤其強梗其治略以定矣然猶鄉遂有庠序之教家國有孰學之設自庶子以及卿大夫士之子皆入學為之師以諭其道為之保以詔其業示之知仁聖義中和使相充擴一本作存藴孝友睦姻任恤使相修飭一本作行禮樂射御書數使相開曉故其左右之聞前後之觀不仁義則禮樂逮其淬磨漬漸一本作漸浸之成則入孝而出悌尊尊而長長然後取而置之民上則君盡其所以為君臣盡其所以為臣卒無有一背戾者其出於學而存於師也道之衰微迄於餘周一本作戰國如絙石之於將墜其引綴未絶者猶一線髮繼之暴秦不扶而抑遂至崩壞漢興宜大更制而財補縫之故其俗無所防範聽民所為卒放壞不至治然能郡縣創孔子祠立五經博士置弟子徒員䇿賢良本經術以對當時得失於古雖未為善而其風遂號為治平豈前世遺風餘化漬染而未斬耶抑民苦秦而效見易也當此之時士猶能相尊師故終漢世傳詩書禮易春秋而名家者以百數十計晉魏而下寖以沉溺更數十世惟唐為近古大抵財追齊漢治而未能逺過嗚呼何為而止此也夫天下之所以不治患在不用儒而漢唐以來例常任儒矣卒不至甚治者何也有儒名有儒位不儒用一本作不用儒術而然爾其弊在于學師不立而育賢無方聖人之道不講不明士無根源而競支流故不識所以治亂之本而不知所以為儒之任而又上之取之不以實而以言故也夫人所以能自誠而明者非生而知則出於教導之明而修習之至也如無為師則天下之士雖有強力向進之心且何自而明且誠也夫天下之才力訓導而懋勉之猶患其粃窳故七十子身逢聖人而親薰炙之其聞與見不為不至猶且柴愚參魯師辟由唁賜不受命而貨殖冉求為宰而賦粟倍又况後聖人數千歲其書殘缺朽蠧又資材下于數子而欲聽其自為而不立學與師猶其願穫而顧不耕也如必待其自賢而取之多見其稀濶不可俟也自周至唐綿數千歲其卓然取賢自名可以治國者由孟軻抵韓愈才四人是其力能扶持其教而竟不之用者所以歷年巳逺人出甚少也如其多則或用之矣苟患其少無如廣學樹師續其所不長擢其所未髙使知所以為治而識所以救亂然後名聞而實取之則庶矣天下之師絶巳久今之名門徒教組刺章句希望科第而巳昔者子路使子羔為費宰子曰賊夫人之子今賊人者皆是皆取戾於孔子者其惡得為人師惡得為人師廣陵集卷十八
