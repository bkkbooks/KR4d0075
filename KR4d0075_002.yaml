body:
  text: 廣陵集巻二宋王令撰樗髙操一云仙樗惠子去聖一本作宋望大樗而作崇崇北丘其上有樗一本作崇崇北山其山有樗逺者以為梁或者爭以柱就而睨一本作視之曽無事於欂櫨嗚呼木乎期我於逺者歟一本作何取於求室歟松休操蔚彼南一本作北山有松其猗孰堂而基孰壊不支逺莫與一本作以識其一本作斯斬以狙猿之杙是近是度謂一本作喟家之無桷嗚呼松乎余歸此休乎南山之田贈王介甫南山之田兮誰為而蕪南山之人兮誰教墮且來者何為而徃者誰趾草漫靡兮不種何自始吾徃兮無耜吾將歸兮客吾止要以田兮寄我治我耕淺兮穀不遂一本作穟耕之深兮石撓吾耒吾耒撓兮耕嗟難雨專水兮日專旱借不然兮穎以秀螟懸心兮螣開口我雖力兮功何有雖然不可以巳兮時寧我違而我無時負送黄莘任道赴揚州主學子之來兮東之舟暮不至兮誰牽舊本作撓以留子之去兮西之馬朝何亟兮不秣而駕駕明一本作何適兮徂揚揚之郊兮泮之央泮之氷兮春之水泮之莪兮芽茁於涘泮之鷺兮㓗白以止泮之土一本作官兮除掃不滓泮之人兮立以望子久不可待一本作待子不來兮足併以跂子未至兮謂奚子之至一本作來兮何以慰之招其來而挽其去納以寛而不嚴以恕増其長而救厥玷一本作阽失培其根而使華以實泮之人兮子喜子先何適兮不夙吾治送黄任道歌吾門之達兮爾可疑以入兮進之不時兮吾豈不爾待兮何後未至兮前巳過之來猶有望兮去何勝追俯吾著直居切而即兮况堂若室兮又歌曰敖耶學耶為來徃耶衣之荼荼冠膝膝耶何進趨之舒不若退走之速耶雖終不吾聼兮猶無貽我嗟翩翩弓之張兮詩三章寄王介甫翩翩弓之張兮其亦弛則藏兮惟此乘馬不秣而駕維彼乘駒不駕以芻翩翩弓之觩兮其亦弛則櫜兮廐我乘馬不適以駕同彼乘駒亦食以芻瞻彼車兮既徴其輻有駒斯服有馬斯牧心之憂矣聊以反覆我策我馬寄王介甫我策我馬將安從人之冲冲誰適逢言歸於東我策我馬將安求人之悠悠誰適謀言東之遊井則有泉渇者俯之燎之陽陽寒者附之君子則髙吾則仰之無衣一首招黄任道歸豈曰無衣不能素裳縫齊有鏘直韍以方豈曰無衣不能素履絇以為戒夙夜以無怠素裳夷夷誰渉不褰素履几几誰渉不止始也何所為我推我宗惡余之無從睢盱以為恭今也既宣我力羣心慝慝毁予以自徳曽莫肯巳直爾我目矣何為而睡聰亦云聼曽莫有告謀及於道佛且訕以笑謂白蓋黒或者亦以赤行何必有足巧言以成迹以我有常從爾罔極翩翩者舟在河之深人持不至亦以自濟嗟爾君子歸歟予遲效醉翁吟一本云寄題醉翁亭山巖巖兮谷幽幽一本作山巉巉兮木修水無人兮自流始與誰兮樂此昔之遊者兮今非是清一本作滌吾樽兮㓗吾斚欲御以酒兮誰宜夀者山蘼春兮野鹿遊亭無人兮飛鳥下喜公有遺兮樂相道語從人以遊兮告以其處髙公所望兮卑公所遊公為廬兮燕笑以休摭一本作摝山果以侑酒登溪魚而供去聲羞仰春木以塞華俯秋泉而潄流公朝來兮暮去肩乘輿兮馬兩御來與我民兮不間以處誰不此留兮公則去遽花垂實兮樹生枝我公之去兮今忽幾時知來之不可望一本作願兮悔去而莫追人皆可來兮公何不歸青山宛宛兮誰為公思桃源行送張頡仲舉歸武陵山環環兮相圍溪亂亂兮漣漪花漫漫兮不極路繚繚兮安之棄舟歩岸兮欲進復疑山平阜斷兮忽得平原巨澤莽不知其東西桑麻言言兮田野孔治平聲風回地近兮將亦聞乎犬雞信有居者兮盍亦徃而從之語何為乎獨秦服何為乎異時見何驚兮遌錯貎何野而棲遲問何迂兮古昔聼何感而喑噫秦崩晉代兮河覆山移天顛地陷兮何有不知上無君兮孰主下無令兮孰隨身羣居而孰法子娶嫁而孰媒既棄此而不用何久保而弗離豈畏伏於亂世兮猶魚潛而鳥棲寧知君之為擾兮不知上之可依豈懲薄而過厚兮遂篤信而忘欺將久習以成俗兮亦耳目之無知眷叙言之綢繆與歡意之依稀及情終而禮闋忽回腸而念歸更酸顔而慘頞嘆異世之從容惜暫遇之偶然嗟永離而莫同舟招招而去岸帆冉冉以行風豁山靄之披袪赫曉日之曈曨驚迴舟而返盼忽逕斷而溪窮目恍惚兮圖畫心輈張兮夢中何一人之獨悟遂萬世之迷踪惟天地之茫茫兮故神怪之或容惟昔王之制治兮惡魑魅之人逢逮後世之凌夷兮固人鬼之爭雄抑武陵之麗秀兮故水複而山重及崖懸而磴絶人跡之不到兮反疑與夫仙通君生其地兮宜神氣之所鍾觀顔面之悄悄兮其秀猶有山水之餘風憫斯民之無知兮久鬼覆而仙䝉顧窮探兮逺覽究非是之所從因髙言而大唱一洗世之昏聾我思古人答焦千之伯强我思古人兮不一本作忽古今之異時生兹世之誰期欲勿思而奈何獨斯人之不見聊一本作故永懐而自歌樂吾行之舒舒忘兹舊本作忽忘世之汲汲睇萬里以自驚兮豈寧俯以効拾載重道逺兮予欲行而誰與累九鼎以自重兮顧尫之弗舉矯身以為衡兮權世之重輕廣道以為路兮聼人之來去魯仲連辭趙歌并序司馬遷謂魯仲連不合於大道一本作義以余考之信然要之一時則連固壯士而有所不為此則余喜之一本作所喜常壯其辭趙之意惜其不廣也因為之歌曰秋風起兮天寒壯士醉酒兮歌解顔螳螂何怒兮轍下蟻何鬬兮穴間紛擾擾兮誰者則賢井方崩兮治隧屋且壓兮雕椽生則役兮弗繫念此禍至而知悔兮身忽焉其已死陶唐虞夏兮今則古矣彼秦且帝兮連有蹈東海而死耳山中詞山中兮何游登彼山兮樂天髙棄吾馬以取歩降吾車兮足兩履石當道兮行旁木碍上兮下俯曽蹈險之非艱聊憑髙兮下顧何所視之乃牛而獨見之如鼠彼促促者出其下兮曽其身之非傴吁嗟徂兮離婁之死則巳古之不較其為短長兮何獨計其髙下山髙兮崔嵬山之舊本作山中之路兮百折而千回趨前行舊本作行趨前而就挽笑顧後使推之彼游者誰兮何以子之車來江上詞渡江遇風作江之水兮東流泝湍流兮寄人舟舟無袽兮載函重風乘波兮棹人用濟不濟兮奈何横中流兮涕滂沱來何為兮不待今雖嗟兮安悔舟方乘兮人不吾以覆且溺兮我則同人死江之水兮東流濟欲濟兮何由水浸浸兮灘露暮濤下兮夜潦收舟不行兮推之兮陸力不足兮汗顔行無由兮塗足時不逝兮奈何歸日暮兮塗逺去風髙兮水波行躊躇兮佇望聊逍遥兮永歌江之水兮東流㳂湍流兮望歸舟舟來歸兮何時步芳洲兮濯足陟南山兮采薇江風波兮日暮望夫人兮未來江之水兮東流㳂湍流兮望歸舟風滔滔兮浪波苦嗟徃者兮未還惜行人兮將去去何適兮歸何時執子手兮牽子衣行何如兮來復濟豈無兮他時寒林石屏虢山之逺數千里虢石之重難將持舟車虢來每苦重金盎尚棄不肯携苟非世尚且竒怪孰肯甚逺載以來何况虢人自珍秘得一不換千瓊瑰流傳中州盛稱賞主以詫客客見祈世人賤真珍貴假見者喜色留膚皮强材美幹立修蔭羅列滿野誰復窺我嘗客坐例一見實亦可愛小且竒初疑秋波瑩明凈魚子變怪成蛟螭鱗鬚爪角尚小碎但見蜿蜒相參差又如開張一尺素醉筆倒畫胡髯髭如何石上非自然猶是軟弱從風枝髙樓曉憑秋色老烟容雨氣相䝉垂喬林隱約出天際醉目逺暝分茫微不然誰家老圖畫破碎偶此一片遺借令人乎弄㸃畫尚恐巧拙成瑕疵如何石理自生長安得當世無猜疑髙堆黄金募辯說萬口利鋭如磨錐或云南山產巨怪意欲手把乾坤移先偷日月送嵓㡳次取草木陰栽培天公怒恐浸成就六丁桃斧摩雲揮世人乗此得分裂鍛琢片段貿財貲至今風雨虢山夜樹石號作鬼神悲又云春氣入山骨欲自石裏生蒿藜根株芽枿未及出卒遇匠手相鑱隳多稱老松已變石此固剪截根鬚離又云鬼手亦能畫多向石色成屏帷固知物怪浩難盡誰能向此明是非城狐老能男女變海蜃口或樓臺吹世間自是有此類何必詰曲窮所歸細思此屏竟無用石不中礩木莫一本作不支徒將文理有小異招聚瞽説成籠欺咄哉閉口不復論為語愛者無我譏贈慎東美伯筠世網掛士如蛛絲大不及取小綴之宜乎倜一本作髙儻不低斂醉脚倒踏青雲歸前日才能始誰播一口驚張萬誇和雷公訴帝喘似吹一本作乞少淹盛恐聲名塞天破文章喜以怪自娛不肯裁縮要有餘多為峭句不姿媚天骨老硬無皮膚人傳書槧莫對當破卵驚出鸞鳳一本作飄翔間或老筆不肯屈鐵索縳急蛟龍僵少年倚氣狂不覊虎脅挿翼赤日飛欲將獨立跨萬世笑誚李白為痴兒一本作嬰兒四天無壁財可家醉膽憤痒遣酒拏欲偷北斗酌竭海才㧞木華鏖鯨牙世儒口軟聲如蠅好於壯士為忌憎我獨久仰願得見浩歌不敢兒女聲廣陵集巻二
