body:
  text: 廣陵集卷一宋王令撰藏芝賦并序丙申嵗自四月至六月一本作夏四月大雨而余之所客天長縣東北皆瀕一夲作邊湖澤地浸以下頗以水為患傷草木多死邑居無薪芻而益貴薪益來自逺以余之所居則薪之自北來者常售於余間而有得若枯華斷穎根梗蒂芥支離臃腫與碩實所一本作頗異於常草者而皆取以戲就其中嘗試視之余得則芝也折傷不全計之於完此當一葉耳不知其他安在也其生不知逺近要皆在縣之北以常負薪之所來則芝從可知也示人一本作以之示人則不齊一本作不能辨有由是而知有芝有由是而信為一本作有芝有雖得是而弗之信者然芝之為物不常有而或出可愛者也自古詩之作見於今者凡三百篇其以風賦比興而附見於物若蘋蘩薇蕨荇苞一本作芑苦藿荑唐葍蓫瓠匏瓜葛鬱薁葵藚葑芹藻莫茅荼蕳苓蓬莠蘋蒿萇蒲萑葦葭菼蕭艾稂荍蓍芑禾麻菽麥黍稷豆菽秬秠穈粟稻粱菅苧卷耳芣苡菁莪莠葽荷華遊龍茹藘芍藥之類雜見並出然此特草耳其多蓋如此而未嘗及芝也自詩而下長辭章而善自托者獨有屈原今其離騷九歌具存而可考然其况意所及自詩人所紀之外復益以江蘺芙蓉杜若薜荔木蘭白蘋留荑揭車蕙芷茝菊芰蘅薋菉葹蕪藥蓀而地所常産目所同識之草盡矣若夫陳忠而直私忿廢而怨逐託於彼而取此以見義此則豫之所知至於道則豫不得而一也然稱類巳衆而芝復獨遺是誠何故耶説者遂以九歌之三秀為芝余以其不明又其辭也則曰適山而採之則芝非獨山草蓋未足據信也及觀漢樂歌蓋當時文工槧人緣飾世治以裁一本無裁字主意耳非有如詩人騷客鬱於中而不得言憑於物而後見者皆非豫所好也今豫得芝而賦之意皆在於賦序故不道也庭勾突萌抽蔚擢秀孰非春兮坯培壅堙播溉軋蒔孰非人兮不為常生時見挺出芝則神兮靈幹不阿衆葉類附不孤有鄰兮生莫時期育無種裔天生德兮芣苡薦庭􅐘一本作蘼蕪薦道退野即兮生無一本作有本根拔不滯茹無吝惜兮榮而不華稿而不枯莫損益兮茨萊翳陰髙出下蔽適以取容兮朝囷射干齊長並秀德不校同兮荒原穢壤棄放委廢若將終兮知者謂一本作為誰何為來者似不必逢兮困於不知束於薪蘇自信不恥兮摧戕折傷披本斷幹禍不自巳兮火災木焚投置不縮知命有止兮偶於自生不祈見聞吾與爾巳兮懷感賦寄滿建中粹翁并序懷感賦者何感於此而懷於彼也孰可懷之河東滿姓粹翁其字也懷之者何賦以見之也朝忽忽兮置食而嘆暮戚戚兮默笑與言莞襲襲而重美兮几按按而巳安宜而能自休兮何不安以坐眠既峩乎而冠兮衣而裒完出可以遊兮入居而端幸竊而得食兮他無病患豈怡融之不有兮曷苦心而蹙顔嗚呼莫知我思兮思將奚殫念彼淑人之逺兮東南之偏其人雖小兮巳冠而人肩其德孔明兮百燎其燀既濯潔於江漢兮又秋陽暴其明鮮我俯仰而不知其髙且厚兮疑此而為地天苟世之無知兮猶將盻千世而懸懸既有而不吾托兮如之何而不思旃企長途之坦坦兮人百馬轅而不繫而羈於我足兮勢不得而自前嗚呼命也兮不遇則難吾從事於人兮亦久有年既齟齬於不合兮間一收於百千惟燭外不燭內兮一本作言恂恂如可信兮但見睨美而笑妍一本作面睨美而笑妍惟其心不可量兮如平流之與深川忽揚而波兮急而為湍以木而涉豈不既利兮亦時忽而摧顛昔吾平地而不之信兮今乃為解維之船巳濟而悔兮嗟曷為乎此緣以是望夫子兮實純白而完堅使我有得如夫子者兮則我之思將二三而不專今不見而疑無兮浩東望而泛濫一本作泛瀾非我能一於夫子兮實世無夫子而使然言歸賦三章歸乎歸乎從兹世以奚為世不能以是而從吾吾安能從世以適非求吾志則不得苟以食則從之非大人之獨畏吾且慚於臺豎之窺彼皎皎之潔不受汚嶢嶢之髙不受瀦吾盍繇一本作從此以歸乎歸乎歸乎人誰適從盍求一本作守吾之志乎俱杲日而有一本作以是逃乎恤影之息乎從夫人以適越眷吾車之柅乎不剡足以徇屨合終跣而巳乎嗟匏瓜之不食安知不得之一本作自濟乎歸乎歸乎吾何歸乎吾食無田吾寢無廬吾㸑無芻吾餔無葅四方不可遊吾亦無馬以取道眷魚鹽與工賈吾豈從買賣子以為撓然則無以歸而奈何安吾命以施夷從吾志以委蛇歸乎歸乎歸何時乎南山之阿竹賦於此有物焉其材劇而色剛其軀瘠癯不配所長色盛氣充膚理有光臨臨兮其髙其可仰也挺挺兮其直其不可以枉也毅毅兮其羣其不為黨也其立自樹一本作直而不倚其長絶衆而不離恬無盛衰以聼四時置身嘗安視物死生弟子不敏昧於考成罹世斫刖甚者遇烹其守不移附者益一本作日增愚所不知請筮以明筮曰斯夫其始甚鋭既極而止一本作上者歟後生晚起超出輩類者歟確乎不拔以節終始者歟死傳其徒不私以一本作其子者歟生久處而不回死知命而不恐老者求以自輔少者得之而無用是其繇曰誰藏孔殷而不思藩彼架未柱我安事一本作俟椽優哉遊哉聊以永年幸聼筮之請以竹言倚楹操序魯漆室女倚柱一本作楹悲吟鄰人疑其有淫心而欲嫁也漆室女曰楚一本作魯人得罪於其君逃吾東家馬逸蹈一本作食吾園葵使吾終年不食菜吾西鄰失羊請吾兄追之霧濁水出使吾兄溺死終身死兄一本作使豫終身無兄政之致也吾憂國傷人心悲而嘯豈欲嫁哉自傷為人所疑入山林見女貞之木嘆息絃歌作二操而自經死馬則食葵而余則飢盜則得羊而余無兄知誰為此一本作同兮余不聊生誰余哀兮余思深中忽忽兮外不知其嘯吟野哉鄰妻兮曽謂余淫以己逆人兮余不知其何心亡羊奔奔豈不有鄰子可閉門亡羊不復去何自逐身則非牧霧濛濛兮水漰漰謂兄無行兮兄行不忍一失於鄰而思失厥身雖然一本無此二字殞子之身兮其亦如亡羊之鄰鼷鼠操序魯文公七年鼷鼠食郊牛之角魯南之野老聞而嘆曰不可不知懼也既而又曰天下之事備矣鼷鼠鼷鼠實食其牛牛則不知彼牛彼牛既卜以郊傷則免之鼷鼠傷物而物不知故世謂之甘口鼠噫田操四章章六句寄呈王介甫田彼黍矣則食於秋我人之耕載芟載薅一本作春載來耨豈不憚勞將食無攸田彼黍矣幾不螽蝝我人之耕而不謀年唯其一本無其字不謀年是用卒食伐木伐木無廢於勤不足柱榱猶用以薪豈弟君子無易於人誰能一本作云采芹不適有獲果蓏樹之則食其實豈弟君子孔敬且力終雌操林鳩之雌兮不有巢而子兮而有巢以止兮吁嗟乎巳兮終雌之從兮吁嗟乎雄兮終巢之樂兮吁嗟乎鵲兮終風操雲之揚揚油油其蒙望我雨以卒一本作適從以風雲之油油揚揚其去我挽不可泣立以佇終風不休終雲不留不雨我田不穀我收巖巖南山有川其下徒能必雲不能必雨蓁蓁者林有越而樛人伐以歸我徂安休嗟今之人顧己是求有顧者木曷為而材大折以薪小生何哉嗟今之人誰同我哀夕日操煜煜夕日逝何忽兮有輝而星爾留曷其我視而冥我適不行我盡日乃傾獨何求於爾星煜煜夕日不尚有朝皎皎君子去誰繇招死如可從生百不聊繹繹道周伊誰之園夙不築自一本無自字垣今安以樊人各有心亦不思旃於忽操序劉表見龎公將起之而公不願也表曰然則何謂公曰我可歌乎既歌命弟子治一本作絃之凡三操於忽乎不可以為其又奚為離婁之精夜何有於明瞽曠之耳聾者亦有爾一本作塞何有於聲束王良之手兮後車載之前行險以既覆兮後逐逐其猶來雖目盼而心駭兮顧其能之安施委墨繩以聼人兮雖班輸亦奚以為於忽乎不可以為其又奚為椽櫨桷榱之纍重顧柱小之奈何方風雨之晦陰行者艱而莫休居者坐以笑歌不知壓之忽然兮其謂安何於忽乎不可以為其又奚為謂雞斯飛誰得而羈謂豕斯突何取於縳是皆以食而得之吾方飢而噫雞兮豕兮死以是兮辭粟操序子列子辭鄭子陽粟歸而作是操食人之粟飽復何一本作奚為當人之賜罪亦一本作欲何辭有以我為是兮豈無以我為非巳兮巳兮吾何以勝人之言兮陬操孔子去趙作行曷為兮天下老吾身而不歸人固舍吾而弗從吾安得徇人而從之昔所聞其是兮今也見之則非嗟若人之弗類尚何足以與為彼天下之皆然嗟乎去此而從誰信亦命巳矣夫固行兮而曷疑廣陵集卷一
