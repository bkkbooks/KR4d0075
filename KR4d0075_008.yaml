  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_008-1a, image: WYG1106/WYG1106-0432a.png}
body:
  text: 廣陵集巻八宋王令撰謝客二首擾擾車馬客各一本作出以勢利奔自問閭巷人何為亦紛紛與客成徃還勉就俗所敦禮不經聖人頗厭後世煩欲問無所得歸視紙上文非以孔子心尚拜陽貨豚乃知偪仄間心跡乆一本作固已分去矣可奈何更問来者門又躚躚出何為奄奄歸就卧不知身所謀徒與俗相和本無聲利求一本作營乆厭車馬過詩書雖滿前走奔不暇坐收身衣食餘抱病嵗月破得不勝所忘進亦一本作益何可課前躅杳一本作莽難躋下愚旋易墮一本作知自墮得勢有然爾命矣何可奈春遊一本作城西遊春風誰相呼鳥語到庭户罷書起何遊一本作徃繫馬城西樹寜須客衆隨聊與春相遇髙林美風竹踈影有清覆可以便行坐觧脱快巾屨日長天地寛飄戾飛雲度風枝緑未柔一本作舒日蕚紅先露芳辰信可尚嘉興惜無寓舊聞黄公壚頗一本作屢枉壯士顧予雖輕數子自適偶同趣起觧身上衣就貰青旗酤獨酌不待勸一本作誰勸酬興至還自注對物無所語似若喧譁惡雖無歌舞勸幸可篇章賦乾坤本閒暇人物自紛遽勞苦曷不樂嵗月失巳屢酒䦨起四望落日不可駐饑馬自知家何須問歸路游江陰夀寜寺寥蕭枝上風蜩蟄以秋告黯靉道旁樹䕃緑凉可冐况承積隂餘急一本作忽雨蕩晴昊初凉逞一本作騁新威宿暑懲舊躁漫漫一本作悠出門路踽踽可誰造江聲洶西奔海逺劇東到中間可行望洗滌一本作濯去塵一本作陳抱况於林阜間古屋架晴燥蚊蝱稍歛收軒户可淹傲惜乎余獨游不可一本作自擕所好踟蹰竚歸歩風作冷相勞賦黄任道韓幹馬天寳天子盛天廐吐蕃入馬上天夀紫衣馭吏偏坐前騎入都門不容驟西極苜蓿得氣肥六閑飛黄卧嗟瘦千秋一本作承明殿下誰把筆當時人無出幹右傳聞三馬同日死死魄到紙氣方就鐡勒夹口重兩衘墨絲丱尾合䨇紐天門未上人就觀老騶驚嗟失開口生搜朔野空毛羣死斷世工無後手當時天子惜不傳送入御府置官守邊塵勃欎燕薊来宫闕蕭騷既焚後誰棄千金出手收足踏萬里避奔走幾經蹂蹀道邊塵今日寜無紙上垢罇前病客不識畵但驚馬氣世未有冀北駿骨無時無生不逄幹死空朽世工無手不肯休任使氣骨陋如狗甲午雪平居汩汩喜自墮萬事過目不省窺一年南北兩見雪未始把筆成一詩朝㸔氣象浩茫昧夜歸瞑想通幽疑夢乘虛空謁帝所砆礩象柱承瓊榱坦塗壁堊相照射鶴扇虧蔽狐腋帷帝旁鮮鮮舞萬女寳綃雅冶吹裳衣纍蠙舊本作珠貫瑀錯組佩斥棄朱黛素兩眉撩搔王母戯華髪袒脱一本作指㸃姑射爭膚肌提璫擲珥互投報顧我塵垢加笑譏其傍臨臨立萬鬼帝所寵與借色辭密呵細紵賜裘舄笑齒發露寒差差諸神斂舊本作畏避不敢望棄唾墮落成珠璣朝懽􅐵怡棄烟霞暮慨吁一本作呼吸成雲霏互偷天帑購黨與散布舊本作布散萬與分千珪紈羅練縠不計數一本作較計逆取倒曵交横披鞭驅巨靈刦夸父揮斧觧繫一本作繫觧關星機東觀豗頺墮壁角南顧秃鬝亡斗箕其他雜冗舊本作冗小莫分辨從見漫亂如籮篩雷公爭前泣訴帝至此豈可無省知願分羽衛勑一本作急天討助以積雹千山舊本作山中齊金神擁遏舊本作前驅按行道後乘駕以萬玉蜺寳刀聨舊本作聊翻夹鐡盾玉㦸鈎子横珠旗天舊本作霜風蕭蕭吹縞素貝甲合陣舊本作夜合窮天圍磨砮揷羽注萬矢强弩競發相聨飛奸窮詐極不保守引組自縛相連歸纍俘奏舊本作獻愷闖天陛越雉㧞羽按舞儀帝呼祝融付焚棄散灰下地無留遺徴朋索黨計輕重斬戮屏翳囚風師扶桑瞳瞳露軒豁日御復反天衢馳覺来四顧駭皓白心與恍惚爭是非冬雷無聲電不照疑亦衆鬼乘其私天髙地下非所職且可把酒無咨嗟日蝕錢塘山人大署壁曰十月朔日且蝕坐者跳起行者留愚聞之驚智為惑我時過市偶自停眩兩目視閙耳聼自嗟身賤不有位安得置此誅四刑惟此丙申日在未天面黯欎昏不濟舉頭仰日巳半虧羣隂得志雲不披塵函欲開鏡尚掩誰把白壁塗之泥大哉𤣥象浩難測安有庸人以術得天乎反成竪子名不念吾皇禳以徳吾聞日名為大明光一自出减月星今乃為之成薄蝕安得君子不為小人乘送曹杜赴試禮部霜風琅琅鳴鼓鼙鳥寒夜噪樹折枝居者不出行者歸廐馬解銜車棄脂長河夜冰船就維百賈晏起朝閉扉為問當今行者誰出門千里到何處母送拊背父嘆嘻兒惜欲去哭挽衣上馬反顧紛涕洟非所願欲去何為家雖有田豐嵗稀所得償公不及私况望羶薌事庭闈結髪從學今十朞始自有志狥孔姫豈願從世成依違髙堂華髪紆素絲暮年待子為光輝望我日乆莫報之苟得一笑辱弗辭况望舊本作得三釡家無飢吾於二子乆所知怪其才髙所就卑今乃語此誠可思近聞天子變典彛欲撥舊况收新竒子行出仕適其期驊騮得路無啣覊罷酒行矣無自遲去取天寵酬親慈同孫祖仁王平甫遊蔣山作山形欎盤陀石路隨直紆一本作迂䕃松坐興長飲泉百煩除憶望江上樓采翠横晴虚愛之不能去取席卧與俱若逄佳賔客不暇一本作假外禮拘意愛交自然笑語畧可無常思一徃遊杖履窮昏一本作朝晡忽從賢豪招氣類喜不殊更以肴酒隨傾瀉談笑餘仰躋蒼崖巔下視白日徂夜半身在髙若騎箕尾居懽餘悲感集論説追古初在昔天下衰羣姦起相屠相地視八極懐險歸此都全吴既臣魏餘晉仍避胡此右山所瞻形勢髙四隅游者昔為誰名字不見書想當出塵樊盤礴望八區固宜有髙興何亦妄滯濡憶在初元年虎狼出當塗衆豪泣相盟萬甲聚一呼樓船下三江千里懸旌旗忠謀屈巨猾弱力張逺圖乞靈訴明神至此當踟一本作躊蹰想當得請初勝勢先羣誅雖時幸成功偪仄已可吁豈無當時人縮伏巖下廬約身甘賤貧卑勢無憂虞坐視擾擾中同為禍福軀我當明時来木石聊自娱遺祠今莫問故邑已成墟歸謝山下民相期在犁鋤對竹竹風何撩一本作寥蕭晝盡發寒籟修纎諤天官揚揖縱玊佩豈無俗子遇自㑹幽人愛心虚中養恬節密外禦介春萌喜含養夏籜竟分解無花與物爭有䕃亦人頼威威南山鳳爾飛何時届舊本作戒道逺寜不飢寒枝乆虚待豈非繒繳虞安有羽翮態一本作􅉵當奈葉間蟲蠧爾所食壊暮行晴烟去人髙暮色上天半山衘日入深雲佇星出緩塗昏歸鞍長林近去翎短悠悠宵偃慵衍衍暮行欵南城岌髙躋近野匝四坦来期遐思舒暮雲所見罕星星颭風燈歴歴吹月琯一本作管靜樂遺世喧清思破塵懶心通江海浮舊本作清氣寒天地滿兹興將誰同舊本作同誰兒輩未宜筭野歩乆攖末俗喧脱一本作去就緑野靜方隨巾屨便那暇賔客命林紅落春衰草一本作桑緑爭夏盛時從老農語乆佇行子聼謂言勞苦後各以一本作相與閒暇慶時逄瓶盎酒一本作活亦有肴核稱喧嘲忽無次歌唱仍相詠酒䦨紛起坐白髪忽一本作或兩凴兒乘旁樹嬉牛卧前籬瞑予方困俗累愛此近天性何當從之歸買舍與相並古風古風何寥踈世方盛誇慕利塗劇先趨直軌迷曲注渾渾九河翻仡仡百川注分爭或多岐險枕纔一趣睢盱承至歡讋叠謝絶怒才得升斗多勉售形骸顧不知萬鍾得孰與一日裕况承丘山羞願易頃刻遇誰能脱近役自放就遐騖航湖足茭魚㧞野厭芼茹行招千古遊坐與来世語延風敝虛襟揖月坐嘉樹此意固有然一本作自有尚童兒一本作兒童未堪預蘄口道中三首舟行邈棲遲江流潏排蕩魚驚躍或出鷺下飛何颺交游偶相舍偃息聊自放回首失匡廬雲霏暮方上又稍稍一本作悄悄江上雨聲入牕壁寒悄悄一本作稍稍舟中人曲肘自枕眠安卧不成寐起坐浩長嘆離家日逾百行路忽巳千昔與燕俱来今見北鴈還道里苦不通寄書如棄捐風水相噴薄歸期𣺌無端空令秋夜夢反覆如循環維舟泝江流人力與水爭回視東下人恍如御風行誰能倒長江奔瀉暫西傾聊用快客意何憚魚龍驚廣陵集巻八
