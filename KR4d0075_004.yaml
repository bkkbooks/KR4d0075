front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_004-1a, image: WYG1106/WYG1106-0411a.png}
body:
  text: 廣陵集卷四宋王令撰寄李常伯滿粹翁我思古人不可見獨以兩眼紙上求苦讀才疲即伏枕亦兾夢寐從之遊每疑賢聖世間有豈獨古出今則不心之所藏弗靣見常恨世腹不可搜雖然其中充美者間或外發文章彪揚淮而南誰名聲盛說李滿乾萬喉青天白日所同見衆亦不敢加瑕疵而余零丁始就學獨矯衆棄先拈一本作抬收要其所學與必至不止顔孟須孔周决將健走獨取到顧我不肯少待留新詩惠見薦自讋若遇重壓併見投星機織成付地錦神冶鑄出舂天矛輝光交華目反眩􅬄咀過美涎并流退歸畏愛復願學恍若見富潛謀偷顧其才力非當對猶以一髪紖十牛使我苦勉不少一本作可得搦筆欲下先慙羞有如姣惡各具一本作異體肉骨不可强彫鎪或云才華乃天與何寡不益多仍一本作猶裒幾時髙車得一本作來㑹合預期蹈抃呼旁陬臨風呻哦欲有寄自恨拙繭無長抽寒林石嘗聞千嵗松為石豈意今逢林出屏苟非木根久自化豈此石理能有靈世間萬怪浩莫一本作難問枉哉山海徒有經舒山虢水固險異疑有神手藏幽㝠謝束丈見贈賤生不自辰親没身孤零家無一稜田不得農以耕巧智不迨人工賈難自名妄來覷一本作親文字朱墨紛縱横合窮心狂髙不肯束世程掲欲望孔孟今昔相招迎去古逺莫到復今難回行窮歩匍匐歸失虎犬不成顛倒塵土中甚若魚噞羮祖死不反骨姊寡歸携甥蒼黄無為謀嘆慨私失聲叩頭屋厦借解衣鍋蓋一本作盎釡賡一本作更甔石固莫致升掬猶時營學左世共笑身賤人交輕父戒子勿効妻引夫無朋妄承西來招喜色轉以騂非惟巡脱死始有心期生兒童相回環朋友推弟兄有問多無對新聞多慚驚自羞陋淺人偷竊幸未黥風窻敝清虚飽腹摩膨脝睡足起有書案几交堆盈自喜主人仁不我賢而惸新詩重來貺褒揚借光榮何以示相謝以銘踰血盟夢蝗至和改元之一年有蝗不知自何來朝飛蔽天不見日若以萬布篩塵灰暮行嚙地赤千頃積疊數尺交相埋樹皮竹顛盡剥枯况又草穀之根荄一蝗百兒月兩一本作再孕漸恐髙厚塞九垓嘉禾美草不敢惜却恐壓地陷入海萬生未死飢餓間支骸遂轉蛟龍醢羣農聚哭天血滴地爛皮蒼蒼𡨕𡨕逺復逺天聞不聞不可知我時心知悲墮淚注兩目發為疾蝗詩憤掃百筆秃一吟青天白日昏兩誦九原萬鬼哭私心直兾天耳聞半夜起立三千讀上天未聞間忽作遇蝗夢夢蝗千萬來我前口似嚅囁色似寃初時吻角猶唧嗾終遂大論如人間一本作然問我子何愚乃有疾我詩我爾各生不相預子何詩我盍陳之我時憤且驚噪舌生條枝謂此腐穢餘敢來為人譏爾雖族黨多我謀久已就方將訴天公借我巨靈手盡㧞東南竹栢松屈鐵纒縛都為箒掃爾納海壓以山使爾萬噍同一朽尚敢託人言議我詩可否羣蝗顧我嗟不謂相望多我欲為子言幸子未易呶我雖身為蝗心頗通爾人爾人相召呼飲啜為主賔賔飲啜嚼百豆爵主不加詬加歡欣此竟果有否子盍來我陳予應之曰然此固人間禮儐价迎召來飲食固可喜蝗曰子言然予食可愧哉我豈能自生人自召我來啜食借使我過甚從而加詬爾亦乖嘗聞爾人中貴賤等第殊雍雍材能官雅雅仁義儒脱剥虎豹皮借假堯舜趨齒牙隱針錐腹腸包蟲蛆開口有福威頥指專賞誅四海應呼吸千里隨卷舒割剥赤子身飲血肥皮膚噬啖善人黨嚼口不肯吐連床列竽笙别屋連嬪姝一本作别室閑嬪姝一身萬椽家一口千倉儲兒童襲公卿奴婢聨簪裾犬豢羡膏粱馬廐餘繡塗其次爾人間兵皁倡優徒一本作兵倡釋老徒子不父而父妻不夫而夫臣不君爾事民不家爾居目不識牛桑手不親犂鋤平時不把兵皮革包矛殳開口坐待食萬廩傾所須家世不藏機繪繡緜一本作繡繪錦衣襦髙堂傾美酒臠肉膾百魚良材琢梓楠重屋擎空虚貧者無室廬父子各席居賤者餓無食妻子相對吁貴賤雖云異其類同一初此固人食人爾責反捨諸我類蝗名目所食况有餘吳饑可食越齊餓食魯邾吾害尚可逃爾害死不除而作疾我詩子語一本作言得無迂寄滿子權吾愛子權詩苦嚼味不盡窮思欲名狀百比無一近初如貪追兵屢請忽許進旗旄左右幢㦸劍後先刃方爭奮拏先忽覩斬亂狥徐驅得平郊萬甲合一陣偏裨走起頗中間坐吳臏喊呀鬭志酣髣髴窮敵訒前軍奔交兵後馬走斷紖須臾聲金收萬噪快一儁羣降挑戈矛叩拜乞用釁蒼黄請命間竊視不敢瞬𤣥雲壓空虚半夜暴霆震睡耳起欲掩驚仆失肝腎壯者固巳然况余乃齠齔及其久詳味欲吐復自恡有如羅百珍次第嘬嚼順貪豐不辭多愛美忘餘餕故其㽞人口雖乆咽喉潤何時匹馬來一本作東畏愛氣兩振唯其未合間如不獲謝藺望風為此詩顛倒猶合燼再寄滿子權二首秋盡啼衰蟲君思云奈何我愚得君思合少君賢勞我心則多非獨辭源長瀉海為江河平生未始有㸃一本作玷缺玉日拂拭金燒磨尋常貙與貍見一足已蹉又况一地卧三虎狗彘雖勇何敢過揚州我何思青山無一螺午市不畜寳米鹽財如他而吾三夫子一身各丘軻瓊林自生寒結露成氷柯文章日組緯玉機飛金梭誰有真珠繩結作張麟羅㧞為當世祥聲為太廟歌我願叅衆民手足揺婆娑有錢莫買金多買江東紙江東紙白如春雲獨君詩華宜相親綴連巻大十牛腹要盡寄我無寄人我將携之東一本作携之東海去脚踏海水洗齒唇轉來清澈飲百斛蕩滌腸肺無纎塵嘗聞泰山髙髙處天為鄰借如無梯不得上亦欲大呌呼天神鋪陳君所詩噪口雷鼔震世多俗耳固莫告當冀上帝依稀聞正聲定不感凡類舞躍百鳳千龍麟安能學俗兒一巻不復呻天公聞否尚未快一本作决安得纎翼穿秋旻答束徽之索詩世味久已諳多惡竟少好惟詩素所嗜决切欲深造人安已不休衆恥我獨冒有如獺行跡欲改復自蹈肝腸困尋搜吻舌倦搏造心靈無餘多為此日有耗巳勤尚無成既苦每自勞自笑如秋蟬飢極不止噪努力排韓門屈拜媚孟竈惟此二公才百牛飽懐抱我如餓旁一本作旁飢者盻盻不得犒不知去幾多窮行究未到無門隔籓籬發罅窺堂奥愛之不可入抵觸發狂譟借使苟有成不知竟何要孤名非所求弊俗詎足傲况乃非所及窮海未為浩不知何時休定訖死與耄因疑今世人恐有我同操徽之才超髙竿幢出標纛為學尚淹藴富櫜不肯暴文章内未豹外襲一以皂大論尤堅强推舟出行奡珉砆不施功徑欲制珪瑁幸此不我陋敎誨日陳告昨因語及詩請我使自道屢謝不得命迫窄遂顛倒披堅誘羸兵伏瓴待穿盗取勝雖然必窘窮亦堪悼勉為瓦磚投幸有金珠一本作珠玉報寄滿居中衡父前㑹去莫追後見來死期别嘆後見難悔恨前㑹稀惟吾衡父兄一本作友金純玉光輝裁磨殺圭角不與瓦礫齊大匠陶百窑不問履下泥一衡舉十鈞何棄毫與釐余獨何為人乃不忍使遺有如横道芻萬足踏不疑子何嗜好殊獨俯掇一本作拾以歸整束使不茨欲令襍蘭芝蘭芝有天香芻賤雜則非然其厠置間適與薫染資文章每借觀罅隙窺晴曦議論使坐聼穴瞶聞英池春園或承招遊騎亦許隨劇雲愛風枝爇火圍夜棋縱談心一本作襟開張倒笑冠欹披匹馬載以來東首頸脰疲夜夢不厭勞百里夕一馳想見目與眉百障千藩籬不虞自投置遂若鳥遭黐何時獲因縁連箠促馬蹄誓當盡晨昏不復起退辭自訟答束熙之洞洞之室或者穿巖巖之墻或者縁墻縁室穿一本作墻室穿縁來何哉中有玉萬黄金千金玉固非盗所有盗者然衆人不知謂爾富不知爾自一本作亦何心顔盗財固為小人戮盗名自是君子奸咄哉自訟毋自欺幾希不在穿縁間謝李常伯人從東南來忽得連紙詩行義不赫曄名聲無萎蕤雖嘗誤見辱旋則拜席歸别久謂巳忘不圖猶記之長封大書字顧我巳忸怩開縢把之讀推與果失宜剥虎䝉羊猪借使出類竒見豺先自奔遇豢還羣隨是故古之人為巳賤若斯有聞未之行季路終不嬉名浮過所實孟氏恥以非今而承所賜乃此亦可噫賢者寧過哉當是我有欺忍愧讀終篇喜驚改肝脾嚀嚀教誨言舉舉仁義辭初令探本根喻以海與池乾坤老六經遺編爛孔姬尚恐惑異說教之無遷移强聞終日乾仁不三月違卒以二者終要我勉不疑百誦百再拜下淚如掛糜一本作麋交朋百愚䛕此語聞之誰憶初從粹翁睡耳忽得提震驚破百昏寐覺悼前迷今而去之久苐塞心叢茨驟承夫子言快斧加芟荑舊穢忽剗削新除一本作涂坦平夷念當不舎去戴服同冠衣猶恐免袒間復作須臾離且將鑱之心不止涅之皮二者苟不能終死庶不遺平生苦嗜詩此篇况驟馳喁哦夜不休齮嚼午忘飢仰嗟天骨雄俯嘆人莫為星明有常髙日圓無食虧讀久口益嚵舌軟涎流垂想當措意初嚼雲吐虹蜺唇牙哆華鮮肺腸湧光輝故其紙上言飄有霄漢姿何可對酬謝約一本作度海量珠璣對月憶滿子權長風掠海來吹月散百鍊一本作白鍊青天豁四碧雲靄不容縁牕軒飄先秋露氣入簟扇寛一本作空庭生夜凉蚊口不得擅人靜暮客去坐偃適自便清牽睡思醒明發醉膽健披風睨白月瞪視不為眩未甘景獨勝思出大句衒狂搜得無竒猛吐復自吮篇成若奴婢氣骨終一本作竟凢賤棄置不復收嘆感退自旋起探君寄詩兀坐諷百遍駮哉劇雄勁百札洞一箭間逢騁新竒春雲弄晴霰古鏡終重厚九鼎掛一鉉吾嘗笑夫人語富則自願及嬰愛君念始自信惓惓閲女當求嬙慕士在獲彦鄙哉尋常者何用目識徧得逢誠幸多既别遂堪喭乖離時况久㑹合卜未先思之不可見飛魂不身戀秋城崔嵬髙圍我屹若圈安得擘風翅飛出不自殿巧為相見謀反覆竟未善惟當逺相要共借月為靣相離苟同天舉目亦兩見又况相去間財止百里縣不知竟可否寄詩代請勸八檜圖客有要我八檜吟手携八檜圖來懸掛張滿壁惕可駭盼顧左右同嗟嘆旁摹石刻署名狀各有憑附相夤縁或髙相扶互倚礙或斷欲蹷猶支顛强枝抝回信有力髙幹復俯蛟虯拳尋根及枝逮條蘖例不㧞直皆旁偏雷疲風休雲雨去蛇龍鬭死猶鈎纒安分爪角一本作無與尾鬛徒見上下相蜿蜒不知生時竟何謂畧不參類常木然宜乎今古惑昧者揺擺舌吻歸之仙一龍盤拳老髙大傳云一本作曰聃者由飛躚當時駕鹿蹋以上跡有町疃遺相連多應蝎殘鳥啄啄不爾誕者强鑱鐫聃能惑人已自幸豈此上去能欺天借如聃功可升躍鹿亦何幸飛相連於中一木特甚異膚華逆理紐左旋傳云聃人一本作手所自栽我知此語定鑿穿苟令實為聃者植推以天意猶可言當年曷不紐向右若曰世為左道牽如何衆輙一本作識不省究反重神怪令聃專乾坤中含萬品彚此獨自異誰令旃一本作殊陶甄窮思竟慮莫可索欲世不惑誰能搴一本作褰仙書虛荒喜誕妄推説事理尤緜延世人一讀即化變日望飛奮相迷癲豈非此木乆樹此浸漬亦為異說遷故其形植與生死時以異怪招驚憐先時世不早斤斧放大其老訛誇傳當年同生好材幹半以直伐成燒燃憑妖附誕相樹立卒自死活終完全葉枝凋踈不有蔭材直弗柱曲莫轅不知留存䕶飬者竟以何理惜不捐我有尺鐵大剛利久以鑄斧磨山巔卒無柯柄尚棄置懶乞月桂求嬋娟秋夜秋夕不自曉百蟲齊一鳴時節適使然鼓脅亦有聲爭喧鼠公盗窸窣蛇陰行獨有東家雞苦心為昏明答束孝先純金出鎔鑪一本作爐烜赫掩熾火錦成洗春江衆目炫莫柰魚鹽物誠微誤用幸不涴君家兄弟賢我見始驚夥文章露光芒藏藴包叢脞關門當自足何暇更待我固知仁人心姑欲恤窮餓苟論才不才自合棄如唾憶昨西來初戚惕侍一本作恃客坐交持駕説口張闔不可鏁間發辨經義鐵舌莫摩挫髙文忽下投白日駭天墮眩怖欲前掩布帛不可裹初視一本作觀固宜驚獨獲亦堪賀又如遇一本作逢貴人繡錦飾婀娜回眸忽自鑑惡靣復窶裸屈降心巳甘嘆憤志亦頗雄髙豈復爭愛恤亦加荷大詩又一本作忽來及推與太浮過自無賢可稱以是惡甚播譬如享尫人豆食止則可苟强擔石負蹉跌適足禍何以論報心結草効鬼一本云結草同魏顆戯食雀秋風雲氣寒秋雨晝夜兼飢禽濕不飛左右煩顧瞻有雀獨飛下施徐入吾簷毛羽刷參差嘴距交鈎銛一本作鉗跳乗新舂箕取飽公不嫌而吾本有意聼之取微纎忽驚自飛去􅀈聿不少淹反就髙髙枝啁􅑜氣不恬嗟乎此微類豈不無以厭來既冐彈射固難責其亷然一本作而余乃無罪見怒何過嚴廣陵集巻四
