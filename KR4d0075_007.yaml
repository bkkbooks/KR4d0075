  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_007-1a, image: WYG1106/WYG1106-0427c.png}
body:
  text: 廣陵集巻七宋王令撰送李公安赴舉行子冠上塵梁宋道傍土塵逐冠敝損人来還復去馬蹄日月長踏盡西北路近者何紛紛姿状頗秀舉傳言天子詔士得四方赴来如鵲翅翻去若蠅頭聚市兒屈指計過百日未暮昔周方盛時得士纔十數唐虞此為盛中復容女婦昔何稱才難今也寜異趣但恐所取異今古殊尺度夫君乃髙才乆有及物慮今又奮絶去挺㧞欲自樹余窮非所知乆有山林素但無百畆粟乃就羣才賦仕道得亦嗟困窮失為懼二者各有命予亦一本作又何所與離髙郵答謝朱元弼兼簡崔伯易昔来何悠悠今去亦泛泛豈自果進退姑且便飲啗三代今去遼士食乆已濫徒死不為義可無苟石擔平生墮百為且就投鈆槧束身入世程開口就人歎怒喜有失得眉睫煩窺瞰野鳥或在籠山猿有終檻能安此為命雖失亦何一本作何所憾予嘗勇自明磨古得前鑑抱關賢所容較獵聖或暫庶未負初學尚為神所監予行人之嗟我笑不為頷子獨辱所厚以詩繫歸䌫命和始自書狂言庶非儳東園贈周翊嘗聞東園游觀嘉晩趂時節亦自到東風不知来者多一日芳蹊踏無草山櫻着子寒尚遲江梅殞蘤香可吊扶踈枝葉未成䕃偶来正值斜陽照千株紅杏暖自酣風引髙炬燒晴燥夭桃未老已抽青略略朱旗冠翠纛雖然素李不爭花似洗朱丹誇瑩皓其他百種不可名如列錦繡快晴曝何低何髙何後先一一盡觧承春笑楊花輕佻最得力飛過青天去何冐弱柳低垂弗辭賤以力憑風為春掃黄鸝嘲啁一本作啁啾聲語和似對逰人見情抱蝴蝶填委不知數飛亂人眼漫顛倒黄蜂雖忙不為身以甘遺人竟何道子規終日勸客歸吾無間然念何報嗟余多病所趨乖又懶讙呼逐年少經年一春為嘉時行過不恤每自譙然雖無酒不觧歌索逰尚少貧交召何時期子早再逰風雨不一本作何可旦夕料龍角歌和崔公度伯易嘗聞螾出軒轅丘其長百尋圍十牛民驚臣愕爭論詶帝亦謂應土徳修賜螾傍海連十洲俾朝食壤暮飲流仍命九龍狎其游視龍有角急起羞亟去訴帝龍有一本作可憂帝憐不呵許為謀召一龍食繫其喉揮萬力士乗其頭披肉斷角塞螾求螾取而冠萬鬼􅀈雷號電一本作雨泣竟莫捄黿擗鼉踊弔蛟虬奮穴出哭勞鱔鰌八龍怒走乞天仇天賜六丁皆劍矛取螾㧞角磔大幽下龍載一本作拜帝問何由臣攀墮髯不可留竟去不知天所尤龍寃雖復骨不収傳流下古説易一本作不浮我聞其語疑有由以龍易螾理若不愛不知蔽似有繇人皆傷龍為歎啾我獨鄙其與禍投嘗聞龍徳神自周出飛于天入海休棄此不處與螾儔以養就人理固偷果死以此嗟何仇我来但愛遺角觩是非欲竟理莫搜君學窮物功一本作巧搳掊其説獨挽萬蠒抽當有實論破衆廋勉矣投以釣海鈎春人春人輕飄喜聚散春筵笑長白日短柳芽嚼雪噴盡寒桃花燒風作春暖春衣少年當酒歌起舞四顧以笑和紅天緑爛狂未足春更不去將奈何送贈王平甫士學何漫漫近習忘逺紹文章多自名誰出得髙調子才希世珍㧞俗起孤峭如觧萬里駿不以覊縻要篇章綴清新霞電絢天彯一本作縹夜歸借之讀掩紙疑有耀洗手脱世塵飛身就遐眺舌骨誰謂朽死魄如可召縮手不願學神巧謝人妙余材生何偏日月費吟嘯収竒欲身名攬古願獨弔平生勇前爭未始卻自料一日接大敵説舌忽忘挑如秋九磨鏡廹我以醜照貪觀朝日明退失兩目瞭願假斧斤惠刻形近天肖寄聲誠甚勤獻璞定逄笑山陽思歸書寄女兄淮風情舒舒楚水日夜流風能駕吾㠶水可載我舟余歸知幾時子望懸百憂念我兄弟寡商參各殊州十年不一逄㑹合何所由幸逄子来歸與我相慰投甥兒入吾牽甥女出吾留子吾笑其間貧不知可愁心如熈春陽樂若醉酒酬憶我别子日將行更逗遛泣恐傷子心淚出仰目収别日才幾時别思日九秋心隨西北風日望東南樓主人仁且賢憐我覊旅遊晨粳玉炊香暮酒金注甌盤蔬羅春青豆脯兼夕鱐為食豈不美義咽不下喉要當歸子同半菽飽亦優始予志所學義當望軻丘朅来與世評衆口忽起咻嘗觀世金朱此道乆巳偷胡為不奮去附世如贅旒而子亦待人特以貧不謀參差兩如此偃蹇勢畧侔要當共引去逸世出網罘遐追避世徒子與侍巾裘吾將亦娶婦力以石臼求貿田結歸廬種樹屋四周子居課桑蠶我出鞭耕牛教妻績以筐使兒餉東疇坐笑忘嵗時聚首成白頭歸乎當何時一本作歸依期何時詩以侑子謳大舟大舟無風㠶不舉小舟榜入青𡨕去漁子舟中呼且歌夜半聞魚誰得多望花有感春来幾時余不知但怪日日柳梢好我嗟無地自種花常恐東風只生草誰家有園不可入時時縱欲信自到寒梅最香落巳䦨桃杏雖遲亦顛倒髙枝飛鳥夜踏空低樹狂兒日摧抝惟余零落滿地紅主人更聼奴頻掃悲来四顧慷慨歌要且傾酒澆顔酡春歸欲挽誰有力河濁雖泣行奈何小雨一夜風聲驚屋破四鄰叩壁呼我賀乆知旱勢非所期果見雨逐浮雲過庭塘流注已有餘田畆不霑亦何奈一本作那雷嗔電笑竟何為一本作雷嗔電笑爾奚為幽人空廢南軒卧餓者行雨雪不止泥路迂馬倒伏地人下無一本作扶居者不出行者止一本作返午市不合入空衢道中獨行乃誰子餓者負席縁門呼髙堂食飲豈無棄願從犬彘求其餘耳聞門閕身就拜拜伏不起呼羣奴喉乾無聲哭無淚引杖去此他何如路一本作道旁少年無所語歸視紙上還長吁世言紛紛世俗言病一本作倦客乆厭聼聖賢没已逺一本作賢聖轍巳逺是非乆無定六經紙上言黒白欲誰証獨有自信人中得不外競暨陽居其一出無王事牽入不治居舍蒿藜一本作菜入墻屋塵垢變几架糟糠苟無憂智力取自暇逄詩即廢日得客輙忘夜積懶遂成性習勤反如詐幾不類怠傲一本作放愧一本作羞恥將何謝身非爵與官車馬乆不謀家無田倉儲雀䑕非我仇朝出從人居詩書講前修暮從兒子嬉歡笑何所憂間將筋力疲懶使志慮収斗糈尚煩送誰謂能無求復繼前題二首自吾暨陽居巳見月四周流年不我謀寒暑忽巳遒老来何足嘆一本作嗟苟死固一本作亦可羞子今一本作而今用力薄暮齒將何収斯道乆冺冺斯人固悠悠歸豚非吾心在禮惡不酬從人效屈伸俯仰不自由於命有當然信矣何足羞寄題宣州太平縣衆樂亭為孫莘老作令君架亭樂荒幽得地適興萬景投亭成雖名為衆樂地僻無客誰與逰訟休民去吏隨散獨有文字與令留把書開闔坐自笑囬視令職忘卑陬昔聞酒賤喜易醉今説魚美予一本作余何憂彈一本作權琴有聲尚近俗要觧弦絶以意求况持髙懐屈下邑志氣畧與彭澤侔身嬰民憂手持一本作提版心愛山水寜非偷景好不見但聞説使我耳目私相仇亭前行跡不破草亭下野鳥常喧啾山雲朝嘘翠巘出海月夜下清溪浮春花夏䕃巳有一本作可愛况使風雪一本作馬囬冬秋惜予不得與快意共上岑崒望九州黄山聞好眼未識夢想欲到迷無由圖傳粉墨固未好願假壮筆一攬収果逄来篇騁雄勝一本作怪若執造化窮凋一本作雕鎪一本作搜一時文工豈不偉千里寄我何以酬耳昏俗語乆欲洗為我一謝山前流廣陵集巻七
