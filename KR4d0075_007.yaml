  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0075_WYG_007-1a, image: WYG1106/WYG1106-0427c.png}
body:
  text: 廣陵集卷七宋王令撰送李公安赴舉行子冠上塵梁宋道傍土塵逐冠敝損人來還復去馬蹄日月長踏盡西北路近者何紛紛姿狀頗秀舉傳言天子詔士得四方赴來如鵲翅翻去若蠅頭聚市兒屈指計過百日未暮昔周方盛時得士才十數唐虞此為盛中復容女婦昔何稱才難今也寧異趣但恐所取異今古殊尺度夫君乃髙才久有及物慮今又奮絶去挺拔欲自樹余窮非所知久有山林素但無百畝粟乃就羣才賦仕道得亦嗟困窮失為懼二者各有命豫亦一本作又何所與離髙郵答謝朱元弼兼簡崔伯易昔來何悠悠今去亦泛泛豈自果進退姑且便飲啖三代今去遼士食久已濫徒死不為義可無苟石擔平生墮百為且就投鉛槧束身入世程開口就人歎怒喜有失得眉睫煩窺瞰野鳥或在籠山猿有終檻能安此為命雖失亦何一本作何所憾豫嘗勇自明磨古得前鑑抱關賢所容較獵聖或暫庶未負初學尚為神所監豫行人之嗟我笑不為頷子獨辱所厚以詩繫歸纜命和始自書狂言庶非儳東園贈周翊嘗聞東園遊觀嘉晚趂時節亦自到東風不知來者多一日芳蹊踏無草山櫻著子寒尚遲江梅殞花香可吊扶踈枝葉未成蔭偶來正值斜陽照千株紅杏暖自酣風引髙炬燒晴燥夭桃未老已抽青略略朱旗冠翠纛雖然素李不爭花似洗朱丹誇瑩皓其他百種不可名如列錦繡快晴曝何低何髙何後先一一盡解承春笑楊花輕佻最得力飛過青天去何冒弱柳低垂弗辭賤以力憑風為春掃黃鸝嘲啁一本作啁啾聲語和似對逰人見情抱蝴蝶填委不知數飛亂人眼漫顛倒黃蜂雖忙不為身以甘遺人竟何道子規終日勸客歸吾無間然念何報嗟余多病所趨乖又懶歡呼逐年少經年一春為嘉時行過不恤每自譙然雖無酒不解歌索逰尚少貧交召何時期子早再逰風雨不一本作何可旦夕料龍角歌和崔公度伯易嘗聞蚓出軒轅丘其長百尋圍十牛民驚臣愕爭論酬帝亦謂應土德修賜蚓傍海連十洲俾朝食壤暮飲流仍命九龍狎其遊視龍有角急起羞亟去訴帝龍有一本作可憂帝憐不呵許為謀召一龍食繫其喉揮萬力士乘其頭披肉斷角塞蚓求蚓取而冠萬鬼􅀈雷號電一本作雨泣竟莫救黿劈鼉踊弔蛟虬奮穴出哭勞鱔鰌八龍怒走乞天仇天賜六丁皆劍矛取蚓拔角磔大幽下龍載一本作拜帝問何由臣攀墮髯不可留竟去不知天所尤龍寃雖復骨不收傳流下古説易一本作不浮我聞其語疑有由以龍易蚓理若不愛不知蔽似有繇人皆傷龍為歎啾我獨鄙其與禍投嘗聞龍德神自周出飛于天入海休棄此不處與蚓儔以養就人理固偷果死以此嗟何仇我來但愛遺角觩是非欲竟理莫搜君學窮物功一本作巧搳掊其説獨挽萬繭抽當有實論破衆廋勉矣投以釣海鈎春人春人輕飄喜聚散春筵笑長白日短柳芽嚼雪噴盡寒桃花燒風作春暖春衣少年當酒歌起舞四顧以笑和紅天緑爛狂未足春更不去將奈何送贈王平甫士學何漫漫近習忘逺紹文章多自名誰出得髙調子才希世珍拔俗起孤峭如解萬里駿不以羈縻要篇章綴清新霞電絢天彯一本作縹夜歸借之讀掩紙疑有耀洗手脫世塵飛身就遐眺舌骨誰謂朽死魄如可召縮手不願學神巧謝人妙余材生何偏日月費吟嘯收竒欲身名攬古願獨弔平生勇前爭未始卻自料一日接大敵説舌忽忘挑如秋九磨鏡迫我以醜照貪觀朝日明退失兩目瞭願假斧斤惠刻形近天肖寄聲誠甚勤獻璞定逄笑山陽思歸書寄女兄淮風情舒舒楚水日夜流風能駕吾帆水可載我舟余歸知幾時子望懸百憂念我兄弟寡商參各殊州十年不一逄會合何所由幸逄子來歸與我相慰投甥兒入吾牽甥女出吾留子吾笑其間貧不知可愁心如熙春陽樂若醉酒酬憶我别子日將行更逗遛泣恐傷子心淚出仰目收别日才幾時别思日九秋心隨西北風日望東南樓主人仁且賢憐我羈旅遊晨粳玉炊香暮酒金注甌盤蔬羅春青豆脯兼夕鱐為食豈不美義咽不下喉要當歸子同半菽飽亦優始豫志所學義當望軻丘朅來與世評衆口忽起咻嘗觀世金朱此道久巳偷胡為不奮去附世如贅旒而子亦待人特以貧不謀參差兩如此偃蹇勢略侔要當共引去逸世出網罘遐追避世徒子與侍巾裘吾將亦娶婦力以石臼求貿田結歸廬種樹屋四周子居課桑蠶我出鞭耕牛教妻績以筐使兒餉東疇坐笑忘嵗時聚首成白頭歸乎當何時一本作歸依期何時詩以侑子謳大舟大舟無風帆不舉小舟榜入青𡨕去漁子舟中呼且歌夜半聞魚誰得多望花有感春來幾時余不知但怪日日柳梢好我嗟無地自種花常恐東風只生草誰家有園不可入時時縱欲信自到寒梅最香落巳闌桃杏雖遲亦顛倒髙枝飛鳥夜踏空低樹狂兒日摧拗惟余零落滿地紅主人更聼奴頻掃悲來四顧慷慨歌要且傾酒澆顔酡春歸欲挽誰有力河濁雖泣行奈何小雨一夜風聲驚屋破四鄰叩壁呼我賀久知旱勢非所期果見雨逐浮雲過庭塘流注已有餘田畝不霑亦何奈一本作那雷嗔電笑竟何為一本作雷嗔電笑爾奚為幽人空廢南軒卧餓者行雨雪不止泥路迂馬倒伏地人下無一本作扶居者不出行者止一本作返午市不合入空衢道中獨行乃誰子餓者負席緣門呼髙堂食飲豈無棄願從犬彘求其餘耳聞門閕身就拜拜伏不起呼羣奴喉乾無聲哭無淚引杖去此他何如路一本作道旁少年無所語歸視紙上還長吁世言紛紛世俗言病一本作倦客久厭聼聖賢沒已逺一本作賢聖轍巳逺是非久無定六經紙上言黑白欲誰證獨有自信人中得不外競暨陽居其一出無王事牽入不治居舍蒿藜一本作菜入墻屋塵垢變几架糟粳苟無憂智力取自暇逄詩即廢日得客輒忘夜積懶遂成性習勤反如詐幾不類怠傲一本作放愧一本作羞恥將何謝身非爵與官車馬久不謀家無田倉儲雀鼠非我仇朝出從人居詩書講前修暮從兒子嬉歡笑何所憂間將筋力疲懶使志慮收斗糈尚煩送誰謂能無求復繼前題二首自吾暨陽居巳見月四周流年不我謀寒暑忽巳遒老來何足嘆一本作嗟苟死固一本作亦可羞子今一本作而今用力薄暮齒將何收斯道久泯泯斯人固悠悠歸豚非吾心在禮惡不酬從人效屈伸俯仰不自由於命有當然信矣何足羞寄題宣州太平縣衆樂亭為孫莘老作令君架亭樂荒幽得地適興萬景投亭成雖名為衆樂地僻無客誰與逰訟休民去吏隨散獨有文字與令留把書開闔坐自笑回視令職忘卑陬昔聞酒賤喜易醉今説魚美豫一本作余何憂彈一本作權琴有聲尚近俗要解弦絶以意求况持髙懷屈下邑志氣略與彭澤侔身嬰民憂手持一本作提版心愛山水寧非偷景好不見但聞説使我耳目私相仇亭前行迹不破草亭下野鳥常喧啾山雲朝噓翠巘出海月夜下清溪浮春花夏蔭巳有一本作可愛况使風雪一本作馬回冬秋惜豫不得與快意共上岑崒望九州黃山聞好眼未識夢想欲到迷無由圖傳粉墨固未好願假壯筆一攬收果逄來篇騁雄勝一本作怪若執造化窮凋一本作雕鎪一本作搜一時文工豈不偉千里寄我何以酬耳昏俗語久欲洗為我一謝山前流廣陵集卷七
