body:
  text: 廣陵集卷十五宋王令撰詩送錢公輔赴舉廣庭簮紱立差肩黼坐雍容第一本作當衙一本作䇿衆賢士得采衣如晝錦人瞻歸馬若天仙况提巨筆乘時出應有髙文與世傳我久踈慵無壯思聊傾病耳待江邊春興眼前紅緑日加增欲遣春愁興未能安得好花渾自實使無閒地得生荆欲圖一本作願圖長醉貧無計起逐東風懶不勝芳草斜陽正柔一本作姿媚益知髙處不堪登庭草庭草緑毰毸庭花閒自開長鴻抱寒去輕燕逐春來時節看風栁生涯寄酒杯傷春欲誰語逰子正徘徊平時巳多病春至更蹉跎惡土種花少東風生草多客愁渾寄泪野思不堪歌獨有詩心在時時一自哦春怨掃地待花落惜花輕著塵逰人空眷戀踏去却尋春春來還自有逰人常是春歸獨念春落後見花尤更惜不知誰忍掃和塵又三月殘花落更開小簷日日燕飛來子規夜半猶啼血不信東風喚不回暑中懶出暑雲無雨易飛揚旱日當天不可望浪走俗塵無逺到不如嘉樹坐餘凉巳嫌風少難平暑更被蟬饑取實腸夢到周公才我事如何陶令說羲皇暑熱思風坐將赤熱憂天下安得清風借我曹力卷雨來無歲旱盡欣雲去放天髙豈隨虎口令輕嘯願助鴻毛絶逺勞江海可憐無際岸等閒假借作波濤悲秋歲事荒凉晚易悲西風日夜弄寒威秋來寡婦尤勤織誰是行人未有衣常恐衰顔隨節換空看落葉倚風飛從來最是悲秋者况是悲秋客未歸秋日寄滿子權樓前暮靄暗平林樓上人愁意思深未必薄雲能作雨從來秋日自多隂三年客夢迷歸路一夜西風老壯心欲作新聲寄遺恨直絃先斷淚盈琴次韵介父冬日客夢愁生枕雞號喜向晨朔風能動地短日更隨人宫栁看埋凍江梅想漏春淹留歸未得塵土暗烏巾白雞冠花如飛如舞對瑶臺一頂春雲若剪裁誰為移根蓂莢畔玉雞應為太平來去草毶毶出土初如直嫋嫋隨風競自斜漫借人鋤勞剗拔只消夜雨又萌芽良田力盡農夫嘆直道春荒志士嗟滿目青青盡蕪蔓更於何處問蓬麻次韵和人古松直枝難立一本作與鳥徘徊地瘦根孤一本作孤根礙石回山野不逢終更老閭閻無用始為材更無匠伯身嘗過祗有幽人眼暫開誰與一本作向東一本作春風記霜雪爭令平地肯栽培大松十尋瘦幹三冬緑一畝濃隂六月清莫謂世材難見用須知天意不徒生長蛟老蜃空中影驟雨驚雷半夜聲却笑五株喬嶽下肯將直節事秦嬴松直道􅟭􅟭日蚪拳雷拔僵龍出靄烟一本作長枝冉冉葉戔戔龍失風雷卧矯拳但假深根常得地何憂直幹不扶天雖然世匠遺掄度肯與凡材較後先可惜春一本作東風愛桃李獨令霜雪漫年年和人雙柏一時封植由誰力萬古樵萊偶自全不惜以材同失地好留更老共支天人疑久有神靈守客愛生無雨露偏為語長松號孤徑得秦封爵果何緣慈竹不求丹鳯食不學景龍吟自有慈仁意相依歲月深潜符君子道可愧世人心徒爾秋郊外青青數畝隂落葉暮秋木落剝霜紅俄覺平林一夜空茂遂本憑枝幹力却辭枝幹逐西風不雨去歲秋霖若决川今春不雨旱良田道邊老幼饑將死雲外蛟龍懶自眠赤日有威空射地清江無際漫連天誰將民瘼箋雙闕四海皇恩一漏泉雨後毶毶栁色緑垂齊草引青天去自迷人說春園有尋路我嗟荒徑正行泥蝶多平日渾如夢花好誰家又有蹊兒女狂嬌隨馬逐髙眠可惜日垂西約僧宿北山庵先寄平甫上人合動山間興吾恨衰遲學謝安納屐操笻那有限吹雲落雨漫無端先憑報信春枝破預想分題雪屋寒林下不諳人世苦笑將霜鬢與君看和人久雨拂拂春郊起緑煙羣農日日望豐年龍移海去遺天漏蚓得泥深樂地穿憶酒有心吞俗價傷春無語寄哀絃無田却作無憂者贏得豐凶一聽天對月栁梢地面絶微風一片寒光萬里同氷骨直疑潜裏換塵心一本作襟都覺坐來空蚌胎有露珠成顆蟾窟無雲玉作宫莫怪幽人吟到曉不知清興自無窮夜月可嗟落日志悠然便有羣星出見天夜月自明人自愛不妨人亦閉門眠孤雲一片孤雲逐吹飛東西終日竟何依旁人莫道能為雨惟恨青山未得歸晚晴寄滿子權常恐朝隂至夕曛好風吹去信多勤得逢白日忽開眼可惜青天尚有雲安得植梯懸碧落共操長帚掃妖氛恨無玉纊充天耳垤鸛鳴鳩願不聞晚虹晚虹隨雨過山巔誰插青雲倒掛懸可惜兩垂空到海不令一直徑冲天不堪暮靄難相蔽嘗到斜陽亦可憐好使渴來能劇飲且教溪壑减清淵春城望湖春城緑野鬱相望間客間來興自長不見暮雲成宿雨空看芳草到斜陽花生惡土終成笑蘭不逢人自信香雖有塵纓無處濯坐觀漁者滿滄浪樓上望湖樓上人腸渴欲枯樓前終日望平湖無舟得往滄浪去為問漁人得意無江上羃羃江城沒逺烟暮雲歸族忽相連春江流水出天外晚渡歸舟下日邊杏蕚春深翻淺纈栁花風逺曳晴綿無錢買得江頭樹輸與漁人繫釣船野外緑野愛平寬偶來或永嘆村兒駭車馬野犬吠衣冠亂草無間地斜陽有去鞍良田半蹊徑始信直行難暮歸馬上口占林密村村暗寒鴉一本作鴉寒處處啼水光連野白雪意逐雲低風徑童呵指泥深馬失蹄客心兼暮色歸去兩凄凄小雨平生從事漫徒勞時以休閒近酒醪東海可從誰自重南山如與客爭髙老將日月來雙鬢生委乾坤寄一毛更展韋編探萬絶懶從人世問滔滔餘杭倦逰醉倚秋風笑自攻偶來還去竟何蹤巳夫鳯鳥今不至行矣鱣鯨非所容且把心胸同伏虎誰知頭角是真龍歸乎伊畝殊難得死爾西山尚有從送和祕校野客從誰忽解顔樂聞髙論厭樊間致身富貴時寧少仕道功名古亦艱好說青山從我老當分白日與君閒扁舟聞說明朝别何日音書可到山送聱隅黃先生黃風吹土截天橫瘦馬著鞭驅不行尚說苦心酬直道誰知白髮為蒼生平時夷狄恬忠藎常日公卿足仰成雖有英雄無用處却令老去買牛耕送周器之歸潤再索何須别子始沾衣久有江南去夢飛為語青山幸相望壯夫終不白頭歸送庭老罷尉金壇心無畦畛見天真落落男兒七尺身莫嘆一官淹聖代聊將三釡慰慈親月明空照居民侣風急隨飄去馬塵寂寞西軒人別後海棠花好為誰春送李廷尉濠梁直道無通可小官真漫論夫君自行義而我更何言獨柱難為力橫流不奈渾此心持送子飲泪當前樽送束徽之入京出處身之道窮通命有時九門無直謁千里去何為南畝春耕近西風去馬羸白雲况多恨歸計莫令遲別陳藥院客居平日有誰親一别三年百病身為道難言輕感慨羡君無病更醫人寄介甫天一本作髙門廉陛鬱一本作益巍巍勢利寧無淡泊譏誰與跖徒爭有道好思吾黨共一本作自言歸古人踽踽今何一本作誰取天下滔滔昔已非終見乘桴去滄海好留餘地許相依奉寄黃任道蒿萊日日沒幽居時得新詩亦自娛為有逺懷希稷卨或時飛夢見唐虞久諳末俗難謀道益厭庸兒妄問儒絶筆斷絃無意寄笑將逺目睨清虛奉寄朱昌叔勞勞忽忽欲誰從要有田園去自終衰俗未知誰得失古風期與子窮通三年客興看秋葉萬里歸心寄斷蓬知有世嘲無意解自慚踈懶甚揚雄廣陵集卷十五
