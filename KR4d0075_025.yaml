body:
  text: 廣陵集巻二十五宋王令撰上孫莘老書乙未莘老老先生座下六經之道備矣而學者必以詩為先雖聖人教人亦然昔者孔子嘗言詩矣曰詩可以興可以觀可以羣可以怨邇之事父遠之事君多識於鳥獸草木之名莫近於詩葢孔子之言詩如此而令嘗按聖人既删之後而㕘求後來世作之詩殆與古異矣承流相沿終不反以至今而詩之道大壊嘗推索孔子所謂可以興觀羣怨者幾絶矣則是邇之事父遠之事君之道其亦畧乎今其僅存者鳥獸草木而巳烏在其能識之乎然令嘗怪後世待詩之簿而探求當世之所以敝而後知其然者詩之無主故也古之為詩者有道禮義政治詩之主也風雅頌詩之體也賦比興詩之言也正之與變詩之時也鳥獸草木詩之文也夫禮義政治之道得則君臣之道正家國之道順天下之為父子夫婦之道定則風者本是以為風雅者用是以為雅而頌者狀是以為頌則賦者賦此者也比者直而彰此者也興者曲而明此者也正之與變得失於此者也鳥獸草木文此者也是古之為詩者有主則風賦比興雅頌以成之而鳥獸草木以文之而巳而後之詩者不思其本而徒取其鳥獸草木之文以紛更之惡在其不陋也然詩既有風雅頌之體凡三而頌者待成功以吿神明而後作則平時固未易為而風雅之道後世亦無采取而散逸草野然士之有天下之志者言天下之事則其詩當近於雅有一國之志者言一國之事則其詩當近於風而變正之道又繫之時而為詩者多無所主而不知所懼則詩之得正而不變者有幾以是言之則詩之得者槩少矣然甞聞説者謂古詩之數葢三千而孔子取者三百後之學者皆爭不謂實然以謂多不稱所取然以後世之詩觀之非徒得聖人所删之多然又勝聖人所取之少耶其亦可知矣而令嘗讀詩至幽厲之後天下大亂之際觀天下之窮臣怨民棄妻逐妻之心而求之詩而後又得之興也觀其言辨而當質而不俚文而不華曲而暢婉而不隱以順言之則可以議禮以公言之則可以論義以直言之則可以議政以曲言之則可以議刑然後知詩之道博而聖人删而存之者不徒云而古之詩者得之多也令甞愛之而傷今焉然猶未之有能也始者既承從於弊學而甚久晩而知詩之不易為而絶筆於今者久之然聞先生之風而願見之退求無以宜贄者則追索舊作得數十篇以獻學未副志無以自白又敢書所説以通左右者意有待也先生何以教之詩三章道其所以來爾憐不加忽則幸矣不宣令再拜上王樂道書人未甞不自直也常直而行然未甞卒善自直也何以謂人未嘗不自直者以其氣而言也是未嘗不自直也何以謂人之未嘗卒善自直者以其非道與義而有也是未嘗卒善自直也何以言之夫一言狹容也一犯易恕也卒然及之終悖不沉容奮然而色作忽然而氣動覆目以相睨手指口質以相訾祈長短於横釐較重輕於塵烟爭用是以相曲直相加不休更轉鬬而入死是辨者事之未用也然辨者以曲而爭之是人未嘗不自直也千鈞之重一羽之輕其懸有殊也顧尫而腹饑與駢脅而勇飽者豈易並哉卒然及之有奮不顧慮起鬬而入死者是鬬嘗不敵而人之所難不為也然而鬬者以勇而為之是人未嘗不自直也多枉之弓重前之矢修矛之鍛房鈎㦸之摩刅而能者為之前敵之殊也與其迎前而踾膺冐撥以嬰脅豈若退恬逸之安全哉卒然及之有忿蹈死不遑暇視者是死重故也人之所難能也然而勇者以敢而為之是人未嘗不自直也雖然皆未足議直也夫人有是好辨有是必為有是決果前掩死而不回後延生而不顧信乎其自強且勇也然要其所求志在一直而巳等為之直然何嘗失於輕褊邪故勇而直氣者愚常見矣勇而直道者何愚常願見而不遇耶然常較之夫自信不阿孰若怒辨以相訾性同一作確固而材可勉孰若疰力以相懸守義盡死而不囬孰若蹈敵而不顧死然而常恬於為彼而愕於為此者豈不失其素心哉所以為然者何也情動於氣則易而義勝於心一作氣為難爾是果為難耶亦存之不素也故曰徒直不足與議道徒勇不足與議直謂其非義士也士之為士也衆矣何直道不若直氣之果哉使其直道如直氣一本作而為直氣則道猶有不直者未信也昔令嘗觀鬬者矣終日而不休夫張弮據兵代巾代傷豈不為苦哉計其中豈無折脅殞目之憂也然終日而不休是以直所不直爾待勝直而後止心放而氣安甚哉人之果於剛也及直道則懼不偶人而從人何曾不若必鬬之剛哉可羞也已始令有志於是也常恐不得天下剛鋭之士而見之每誦詩讀書去其人已千數百年猶惕息起㳟如將親見之者及其恨有所不盡於其人也猶流涕而嘅嗟况同令之世不遠而有者耶伏惟閣下明道篤義其聞有以起不肖也有日矣卒然遇之而令方貧有朝夕之役不能決舍以徃從事則其自嗟傷無時而巳也念區區終不自效輙敢以書告所期而道其向慕焉伏惟閣下憐而念之不宣令再拜再上卲不疑書丙申知軍學士閣下貴富矣何求而不得哉窮南之珠極西之玉山海之象犀蜀里之錦楚南荆北之材天下之殊也然皆水斷陸絶去其人常千萬有餘里然一日欲之則無不如意而至前何其甚易如出於左右哉然一作然哉能不愛􅎇幣重寶以易之則其得如取爾一本無其得二字故曰富貴矣何求而不得哉惟其不可得者士也士則有窮而無求不可以貨取也賤而不屈不可以勢動也行義以達死不可以力脅也世雖有富貴假有求而欲得之非其義也非其道也則其人亦肯自一本無二字枉耶世之藏珠玉象犀而衣錦以居荆楚之材者多矣貴富者皆是也而潔定之人信篤之士不幸而世不欲之假有欲之而可從者誰也斯語不敢講於人久矣常謂閣下其所好惡為與不為殆有異於世富貴者而令雖不肖竊有意於古之士而願學之昔者嘗有一日之幸而閣下以令有婦以貧而不嫁過時將捐金幣以資之時適無可親者則止矣世之靡靡方以妾馬從事而閣下乃獨恤人之孤世之方思得其所無而閣下乃思散其所有以令之甚賤才謀不足以裨左右之長譽説不足以取當世之重不識閣下是誠何求哉信亦與世之異也故令今且將終其所賜以實閣下之德焉夫高郵小地也是亦地一作勢不能分高而借人力不能舉重以與士也亦明矣而一時之人勢力出閣下者猶衆然不之彼而之此去有餘而就不足以求之良以閣下之所好惡而為與不為者與世之富貴者異也異日閣下常有以賜之而令辭不受今則謁之而閣下之所得士之自信如此難有也閣下之德如何雜文一軸少見所志幸加采焉不宣再拜上人書某官閣下世之富貴者其勢如父而令非其子其次如兄而令非其弟其次如其君長而令非其臣𨽻奴嬖其次有官府貴賤而令適無左右使令之役以故漠然雖富貴之門當路而日過之以其無事於其間不敢謁以入也前日聞閣下風義甚高意者若將求教然久之思所以幸進而不得辭念無以通左右則止矣退而益學每追講古人之義原其所以進退之槩上自堯舜下逮聖人賢士中行者之所嘗言觀其上下所以交合之際似皆有命而殆與今世異然果於有聞則將矜以為守豈心之所知而古之有道皆若是顧身不繇哉則雖心存閣下之下而跡有不敢至焉者良以身在人下而進於上苟不繇道則何也豈獨異於人哉視古之人所謂㳟敬者多如此久之益困而令則有姊身為人弟不自有衣食之能以自苦又餓其長上年過齒長無資以歸嫁間坐思之則其中忽然不知其心之何如也然謂猶有命耳不敢不安也而不腆之交平時與令遊者多矣未嘗以言及令之窮也自閣下當路而哀令者多以為言其未從之則為令者以謂可罪矣誠其皆愛心後義則未敢信然乃至得長者之教育耳間而思之士之所自信者顧其心之如何耳古之人所以進退信美矣然猶有見可之仕若其勢也今則已異矣古之人雖甚窮要猶有以自足不如令之皆不然也上縣令書元城王令謹内謁以書自道於長官執事令多見今之士人中無所存外不能自高媚以勝倨出入公卿大夫之門與奴𨽻俱視其靣則喜若得志者而未嘗有愧令雖不肖乃中有所存者視今之公卿大夫揣巳之所自存故未嘗一自枉見非特但異於人也亦有可見者而後見之焉耳伏自執事居䘮時令與公子遊每得窺公之為人至今二三年間始卒若一伏惟執事之孝之亷固當世之所不有古人之所未易過也然則小子安得不就見耶不宣令再拜定吳夫人書令啓昔者聞閨中之淑而士大夫言宜之令始放意以及且不自實宜乃謂得請耶巳辱來命竊羞其非當雖然何辭及矣秋初較爽於前惟尊候安否比近何如伏惟萬福輙有來幣開在别紙七月初九日不宣令再拜丈人都曹坐前廣陵集巻二十五
