body:
  text: 廣陵集卷十二宋王令撰呼雞雞呼雞來前犬嗾犬至止夫豈必可召役以食乃爾今吾曷為悲人而雞犬為自計無自存西山謝夷齊江上其一風吹平江起長瀾野客坐嘯酒在顔興來就上南山觀固應散髮遊更好何用美質加弊冠其二夢載十舟勝一鈎曵緡萬里懸十牛飽食身至東海投還踞秦山待魚食所得果可餔九州其三山頭斫竹下作竿繫鈎沉水坐岸觀餌魚水濁魚不干棲遲終日或有得歸去猶可一本作取妻子歡其四江頭風平可照水衣冠面目略相似與我同笑固相喜何用妄携客子來不可與語祗相視飲客一本作青山青山何巗巗江流自渾渾欲由白石道先自長松門其間有萬景軒豁忘乾坤適可得以心不可為客論安得山水交共無世俗言携琴寫古聲酌泉求清源適時固雖一本作巳踈謀道豈不敦誰能歌此詩侑我飲客一本作此樽江城江城酒熟賤賣一本作買醉江人提魚不到市半道得錢相一本作歸和歌翁倒子扶相枕睡江南山髙不見天江北水逺無復地馬驚墮崖舟一本作船覆波可惜行人一本作子死聲利效退之青青水中蒲雙雙水中鳬足短翼有餘飛髙既能逺行陸安事俱又雙雙水中鳬來疾去間暇江湖風晚波泛泛自髙下又雙雙水中鳬已往又回顧弋者窺未知舟來避還去又雙雙水中鳬常在水中居還有籠中䳱騰軒仰不如又雙雙水中鳬食飽不出水靈鳯來何時鴻鵠志萬里霜風一本作冬夜霜風裂寒窗餘響到我牀聞鼠有嚙聲不省何物傷兒呼須我起顧無燈燭光伏枕置所念志夢通扶桑孟子孟子不肯比伊尹仲尼方可一本作且期文王聖賢自得一本作待固厚重庸俗始以已較量微生喜以佞面一本作為詆臧氏惡非禮所當惜哉二子不自重一本作思以人可否何不詳過揚子江長江來何從逺自西極詹中破蜀山流始與巴水兼川原日混合激射勢益嚴奔渾萬里流不自頃刻淹駭如㵼天來急若赴海添潮汐日往復旦暮難安恬攻冲氣何雄吞囓勢未厭因思禹功成自匪堯謀僉久巳口效噞豈復頭今黔余來方冬時怒風何沾沾掀轟駕髙浪山阜相聯粘有如合萬鼎就沸烹羣憸天陽盛焚爍鬼力爭炮燖聲勢欲狀說有口嗟如箝須臾稍收斂晴風蕩氛􅀢涵澄動自息拂拭痕無纎宛然帝女鏡仰照青天奩遐觀清神心俯視分眉髯有如堯舜時惠澤四海霑登賢默與慮流惡聲無霑一本作呫洗除巗穴空蕩滌昏奸殱恩波浩滂沛浸潤咸滋漸羣山西南來垂天下帷幨霜風月凌厲紫翠生觚廉無波互澄照黯慘畫一縑扁舟出中流俯仰迷顧瞻人生貴自便苟信何用占方期謝黃塵竊身放蒼蒹閒從魚鳥逰默相蛟龍潜築室近舊本作水起釣岸巉崕插居簷行春掇苞薇坐晚登鱨鮎仰思峻極髙俯愛善下謙更與虛曠間日放詩鋒銛行求避世交望醉江城帘出處要皆道終窮亦何嫌晚泊月形如張弓下影射秋水寒江風靜時逮目失洲址漁歌去時唱歸和歡未巳豈無人間樂自快適為喜客子有倦懷歸心動秋葦更假滄浪清聊用洗塵耳姚堅老見約偶成初正布新和餘臘爭近候升騰陽力微恇怯老隂鬬江雲蕩空碧舊本作無據踈舊本作朝雨沐清晝林梢釋冬枯土蘖壯春簇萎蕤風日舒刻畫山野秀關關先春鳥格磔弄晴咮無人與調和去聲終日自嘲詬唯君卜近適過我許來就遷延日屢蹉嘆惜月復彀人生誠多故世事那可究惟當自推置障絶俗慮冦休閒倘能偷踈懶當自宥徒行苟憚勞借馬欲誰廏清沽如定携佳客可先購勉之無使遲梅蕚舊本作蕊已堪嗅初聞思歸鳥憶昨寄崔伯易朱元弼去年春日花盛開嘗有鳥啼歸去來余詩告爾東海志子笑屬我南山杯將睎遐踪蹈髙軼就拔去跡離俗堆同時遊者最誰上朱子峭擢凌春材門關午景卧正懶過我呼號如春雷鄰驚偷一本作爭窺婦女怪婢騃奔一本作棄走兒童咍門開納坐聼論列笑口侈哆傾胸懷寒葅半菽要同飰韲醬呌乞喧鄰隈僧從南浮雲一本作櫜異角尉解西去遺亭臺心爭誇漫一本作誕詰蜒蜿日樂虛豁留崔嵬栁梢黲黲坌晴絮杏蕚爍爍翻遺埃春湖平停照空碧涯帆曉上攙天桅西歸頗厄窮餓久南泛未免丐乞哀朅來隨人事卑折忽自顧影慚紙摧平時客坐不敢語苟以唯諾償嫌猜胸中糾結浩千萬到口不吐如橫枚比來頗自撥俗礙日傍竹樹良徘徊昏昏萬事置不省知已踈懶心難裁一聞春風動啼鳥猛若重睡忽喚回咨嗟嵗月急若矢嘆息無地安蒿萊比于見人日加懶行恐合一本作接俗老益乖不知飄浮寄兹世竟亦何計收形骸春林沾沾風日好飛止自便冝爾諧何為猶尚歸不得世間萬事真悠哉望招隱山花回逰江山思崔伯易因寄朱元弼一本作春日春山曬日開百花紅紫亂眼生交加青一本作晴天晴一本作青髙褰翠幄繡被堆叠帝所家平江千里鋪一席扁舟晚若棄履舄安得一醉眠千年一本作百年世間萬事都棄捐同顧保之逰靈隱閉門不知春色到出城始見江梅開行探幽泉至髙絶共坐巨石聊徘徊時逄天風吹客過還有野鳥驚人來林間躬惜所未歷歸馬空載斜陽回揚子江阻風揚子江風十月初西駕巨浪渺無隅常憂傾搖地為動意欲起塞天無虛大舟不行就繫岸小舟分去爭得魚舟中壯士起坐笑有酒更為斜陽酤山中山中亦有出山路山人自不與世通拂衣起行飲流水枕書就卧聼松風地寬江河競搖蕩天濶日月爭西東乾坤自為四時役萬事不到幽人胸出門出門萬事非聊復閉關坐親識久相逺與世絶弔賀適時既非謀接俗益加惰外物等不來何必問客過南徐懷古昔人戰血化為土今人常懷昔人苦大江冥冥截海流鐵甕城髙排萬虎乾坤未定龍蛇爭日月須歸仁義主江山本不為英雄英雄自負江山死東城昔豫出東城初見壟上耕忽忽自北至嵗月令人驚雖云一草死萬物尚華榮誰能當此時歎息微隂生餓虎不食子餓虎不食子飢鷹不雌求虎餓不擇肉盛怒遇子收鷹飢爪喙獰尚與雌同韝人豈二者然恩義冝綢繆親戚不冝怒割恩以為仇此割非常割此傷無血流肉割愈有一本作有愈日恩割傷不收一割大義死一本作喪再割面相仇親戚尚皆然况又他人儔是巳與世絶于世何足尤松江曲松江深處八九尺去眼百里長風波吾山井泉廢不汲一泓不知深幾何君家自無千尺綆那知江深不如井贈王介甫當世胸懷萬古淳平生才術一本作平生事業老經綸况逄堯舜登賢日不復伊周望古人得志定知移弊俗聞風猶足警一本作起斯民九門無謁天旋邃一本作過何惜長令仕為貧贈王平甫當世所交識者稀十年聞子幸見之平生所負自信重他日可期人莫知誰肯草茅窮釣築世方簡策誦臯䕫丈夫出處誠何較却痛蒼生為泪垂贈孫莘老至愚不學常如足盛德之充久自彰管小始疑天可盡綆窮終信海非量始慚自待從來薄不及時中適取狂安得此生天與幸沒身得不去門墻思京口戲周器之江南别日醉方醺貪愛青天帶水痕忘却碧山歸路直誤投浮世俗塵昏終期散髮江邊釣當有漁舟日繫門但恨故人猶喜仕他時胸腹未堪論舟中作杳杳波濤去莫窮要須流合海無東長帆百尺嗟無用醉絶重湖笑逆風寄束伯仁身逐南舟去不回匡廬留滯得徘徊峰頭夜宿平看斗岩下朝隂俯聼雷西顧波濤浮日月東歸天地入塵埃何時得遂幽棲志常把韋編靜處開題假山擾擾人心巧謂何我腸愚只愛無它目前好且留平地浪愛山髙險自多廣陵集卷十二
