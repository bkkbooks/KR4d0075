body:
  text: 廣陵集巻二十九宋王令撰故屯田郎中張夫人許氏墓銘許氏之孝愛三世而益聞當世之賢士大夫多喜道其事而見之書為之譜説序記甚詳凡數千言行于世而世益信其孝愛之篤也葢許氏之先巳一作既嘗通顯矣今又貴暴而有聞且世有孝實亦宜其然也夫人先司封外郎某之女而今天章閣行制元之兄適屯田郎中張公某若干年而卒方夫人之歸張公已嘗娶有二子一女皆兒孩夫人撫之曰是亦吾子也吾獨何忍不愛之愛而不能教猶非我心也故二子某某卒頼夫人以成登進士第而夫人亦有二子沆瀣沆亦以進士入官今為某縣令瀣好學有文既立矣而卒然葬夫人者沆也夫人少時於文學聲技無所不學而卒通于詩樂于琴時習于筭數故其子正静淡漠不失于幹者殆其有以自資也尤于詩能考而知義張公之在恩州夫人巳病念父母之逺而涕泣嘆息曰既從夫矣如吾父母何死于此命也病且亟如欲有所言者公曰雖然有不幸吾且俾子為進士而女嫁士大夫夫人曰然無憾矣然終如其言夫人之卒先公十有㡬年而葬與公同日沆既以夫人尹氏祔于公則夫人之墓次于左也以夫人徳宜有銘銘曰詩始國風以家所自夫人以之資就完懿孝不忘夫慈能成子云誰不學而克能此西頭供奉官王君墓誌銘君諱懷忠字孝傑世家開封府開封縣景徳中契丹入邉天子視師澶州募民間可使將者于是同日見者十人上皆與之問荅審知其果能也人與兵二千使分城北隅為十寨其一人即君之父貞也後至殿前班都虞侯以卒詔贈其父美率府率以君為三班借職上即位恩加奉職監在京河南草埸澶州河南酒務加右班殿直監興元府西縣商税和州兵馬監押坐免遇寳元郊祀恩起為右班殿直潭桂二州廵轄馬遞鋪黄捉鬼為盗荆湖提㸃刑獄司言自盗起不意兵擾未治更多無足頼者輙擇其可用以聞幸上聴從之詔以君為全邵永三州同廵簡改左班殿直自羣蠻亂南方皆天下至險之處兵雖乆頓不敢言入有敢入者随敗君諜知山川道里之詳夜召壯士數十人與之俱行襲之遇賊輙戰戰而巳屈者聴降前後斬首一十九降者四十六人所奪甲弩鎗盾過當明年轉運使議於衡道永三州置寨奏以君為樂山主寨君城樂山塹山為壕鹿角四重城上為乳垣敵樓石砲連弩吊橋閘門所以防域之具畢備城中廬巷㑹庫各便其所而易守又蔽山為隧道突門通城中以備賊斬白水峒主雷勝父子及其党一十八人自是羣蠻去君部無入者矣君居南方八年罷歸去安撫司奏君功可賞樞宻使難之與兩次合人家便差遣而巳以故得揚州江都廣陵兩縣廵簡改右侍禁用大享明堂恩加左侍禁用大臣薦充泰州如臯等縣廵簡加西頭供奉官卒於京師年四十有九君娶田氏有子七人男四人確礪皆舉進士女三人長嫁殿直趙資令四人並㓜將以某年某月日葬君開封縣某鄉某原確礪問銘于守元城王令令以謂國家自景徳以至慶歴四十年間南北互有事而王氏父子仍踐其地惟其任軍有輕重遇敵有小大故其收功有厚薄要皆嘗捐身原野争冒鋒矢之下方是之時死不暇顧寧論異時之富貴乎由此言之豈有他哉忠者不忘其上而勇者羞于苟生其大欲遏亂沮暴于天下小亦盡其職而無媿也一食其食畢其死力而不悔此與夫世之事人以職而苟為容容之計者其行義固有間矣此予之所以銘也銘曰宋有天下登民於平吏守弗䖍胡敢内驚既齮我邉遂飲于河疇奮自民為王前戈桓桓虞侯氣動上顧勇形于軍指死而騖君于前人實纉實類在昔南荒羣獠方猘窮崖絶峌保為巢穴無復人行鴥為騰猱君居其間捍城厲軍時入其阻輙以㨗聞吏苦無功稍自誣冒君縱使降不以俘告皇有顯澤用嘉爾績君不言薄曰維臣職謂宜大壽以它就功曷壯未老遽仆以㓙惟汴之隂陽原之下鑚石勒銘用關萬古左班殿直袁君墓銘并序袁氏之出為舜後與陳分於袁鄉而世居陽夏其流不可窮巳君世于舒天聖中以家自西來吏於江淮發運司親死不歸葬遂占藉為真州之揚子人景祐中以乆能平亷例當官得三班借職更三官而得左班殿直廵簡楊之銅城鎮坐免以歸君亦適老矣退居揚之尹婁河上其地蓋君嘗官而樂之也既居二年令侍叔父以官來令方少得君之子相歡也君雖以病瘖然一聞客來争冠帶以出間有過之者與之相對終日而笑喜自如獨其言呐呐無能矣以是益不知平生之所為而君之二子視尚之尚㓜于君之為概不能省念間有所聞亦不過公能忘私苴補奸漏得稱能官而巳計其是亦有以過人而取之也獨其官乆而益貧家居如新為生顧其用又甚儉則信矣如忠亷者而君尤喜書人亦多稱為能雖君亦嘗刻于學也而其子遂以世其家既數年而令學自省加於前時間嘗怪二袁齗齗無所異而樂自鄙以循俗令亦誚之二袁慨然曰如子儒者也雖予亦樂此吾親老矣左右之飬朝不謀夕自知家貧以得食為急古之士者處之燕閑則業專修而知益明顧予力有不足者雖然我豈盡忘之聞常道自孝弟始如此固予不敢不勉也令嘗憐其志而傷之間觀其事君然後知其言為實然也居無何而令去聞君亦卒矣葬有日二子來請曰雖然必子銘顧所與之如何予亦曰令固知無銘為難也君諱某字某二子翼軫葬君于真之揚子縣某鄉某原從先人之兆次時某年月日也銘曰已矣凡莫不爾尚何嗟此葬父母于是君亦歸于是距葬君者又子死生之義備矣前左班殿直袁君墓誌銘君既退居令始與君子㳺後七年而君卒卒三年而葬前葬之三月君之子謁令以銘令為次其行事而銘焉叙曰袁氏之出于陳為舜後君之先世乆不顯忘其譜記不知其流何别也君諱康字諱之世家舒之懷寧仕于淮南江浙荆湖發運司積十五年而得三班借職監𤓰州堰遷奉職監䖍州税某州銀銅場遷右班殿直改揚州銅城鎮廵簡遷左班殿直坐免歸老于揚州之𤓰洲君為人寛和其御事平亷其涖家整約其教子修謹娶某氏卒從娶楊氏有二子翼軫與令㳺者也其葬以某年某月其地在真州揚子縣某鄉某原銘曰地阜而隆曲宛而窪中卜以宜君宮嵗月既諏日時孔良洵求且祥君安歸矣不騫不圯以祉其孫子叔祖左領軍衞將軍致仕王公行狀王氏舊望太原自公之五世祖居魏之元城縣不知其始何迁也以至公皆元城人曾祖某仕某朝至閣門通事舎人祖庭温開寳中仕為泰寧軍莭度副使考奉諲右班殿直贈左武衞大將軍公諱乙字次公公生少孤長能自奮以學連以進士上輙罷下㳺于江淮間景徳中詔求秘書于天下公適有之去獻之京師上書言臣父常得事許王府推于先帝有一日之幸臣實其子天子下其書問騐補三班借職廵睦衢婺三州私茶監改三班奉職温台明越四州廵簡用舉者監越州西興鎮兵馬轉運使薦公才可益就用之改蘇湖秀州青龍鎮廵簡於是上居東宫公上書言太子方少陛下為擇師傅皆賢誠甚盛美獨左右小臣行能未聞有以過人夫師傅之進有時則太子與小臣居以為常苟但無過猶嫌不能有益一有不正其習可不慎哉願陛下擇于朝庭賢有聞者益求其比以輔成太子書奏不報故事士之出兩川仕朝庭者雖老猶不聴歸公獨上言曰陛下幸以其材任官何獨猶疑之如此蜀地雖險陛下臨之蓋甚惠仕者又皆其賢人情不宜有他且蜀去京師逺老者不可載之與俱則去離父母生嬰終身之憂死弃萬里之外臣誠恐孝愛之士終不為國家用也臣愚以謂聴還之甚便詔許兩川之士復歸又得離其旁近官自公言始又言奸貪吏如李溥邉肅材雖有過人幸復聴用之猶不可使為州以近民又言比年制度請益復古而朝廷大臣下至九品吏皆無廟與士庻人同祭於寢非所以嚴鬼神長恩愛厚孝實于天下也幸以次限之立廟不報恩加左班殿直乾興初朝庭新逐宰相大臣用事指巳之不便者以為党逐之宣徽使曹瑋素名忠正亦在譴公以䟽争曰曹瑋忠臣先帝用以為陜西河北三路部署以藩陛下蓋察其材任之也豈顧不知其忠耶陛下新即位亦當引瑋類聚以自助何逺散逐之臣固知非陛下意而大臣敢以奸亂國也賞罰天下之所信陛下可自取用之毋聴大臣自便書奏一時皆為之驚改監楚州啇税請廢北神堰置閘嵗省役二十一萬一千三百人米六萬八千石詔以公言為閘果便加右侍禁大臣荐之加閣門祗侯監定州兵馬改提舉黄河埽岸上書言將帥微弱所養非所用不可應一旦其畧曰臣觀三代之政至于乆而不能無弊况其下邪自唐末大亂盛强者争起以分天下所在阻兵以自守國家得之于戰争之後上天厭兵乆矣故太祖皇帝稍歛將帥而奪之權行之既乆其弊微弱卒有四方叛而起者恐非邉將之能應况天下之勢弱甚陛下獨不監秦耶夫北方之盛日乆矣極盛必衰其外有黒水強大之敵下有中山廣平強弗順之族臣觀其勢不能無變假如五單于復分于今有若呼韓邪附而願歸者不從之則合而為患從之則為朝庭者計將安出耶夫人之材能不同則上之用舎各異夫駢脅多力臂強走悍刺堅而中深此人之能也可為人用而不能用人今置將不問其材謀何當一以能使之臣見其敗軍也夫以能將能以指使指不若臂之使指也臣視在邉之將誠論其材謀幾能以臂指之不同耶夫軍事至重陛下既遣將又置監軍監軍苟知兵尚安俟將苟不知兵後與將衡决于事無益也夫兵趨時如飄風搏利如飛鳥機發于心變見于目身走赴之一跌則後矣其為豈一一以盡傳耶使皆上聞報可而後用之是兵乃陛下與大臣自用耳安用將居千里之外耶如必疑之則勿用不疑而用之一切可聴其自為無以尺寸䋲之如是而不效更覆其軍皆可斬之無赦以懲艾其後敢以非其任而當此者使知其果死也夫茶鹽取之山海其出無窮陛下苟聴民之有力者行其利于天下卒使輸粟益邉則邉實可備也不聴天聖中遣御史河北聚糴以備邉公獨言河北粟少又近邉不宜糴以空民食不若以茶鹽募江淮入穀河隂良便事下三司議以為非是公奏曰臣言誠甚利三司徒以臣為賤故沮之臣願身置三司辨其非是狀已而發利害十事三司不能折其一詔以公議當是從之果便由是三司始害公能加右侍禁監杭州駐泊兵馬公自言曰臣始言入彀河隂嘗與三司使胡則有曲直後葢自以事罷獨疑以臣故罷之是豈能無忿于其心今知杭州而臣官屬之後應有以報臣也書上改真州駐泊加東頭供奉官以病乞監滁州商税改泗州普照塔用舉者改揚州駐泊兵馬坐免復起為東頭供奉官監光化軍商税復閤門祗侯荐者言公能幸它用之改淮南西路都廵簡使恩加内殿崇班連上書請民牛聴耕迯開田請賑飢民以息冦賊請罷荆湖路酒課以便民限民出錢償官則民不觸罪請如殺牛馬之賞更倍之以購殺人者則罪輙得又言鑄銅為錢其利甚薄兩母一子今銅復竭宜禁民鍚雜銅鑄之法其付二宜能支一切皆不聴上書言臣方少時常願盡其能以進効今老矣願觧所官上以為左領軍衛將軍聴其致仕書方下卒于海州年七十有三公内剛外恂居與人交歡然及加以不直雖强其才不可以勢得也故公之所在雖嚴貴人多憚之于其所職每列以是非争之每揺而不動去而其下亦多思之皆能道其行事以嘆其後反不然者然其直亦其平生終不以進退得失之故以自枉故仕嘗材名矣大臣屢荐之卒不用其言之又多廢者亦以此然公盖自得不悔也嘗從容言于客曰義固有必直雖天子敢以死争不憚即如非義雖賤人吾屈矣然則吾守亦約矣居家慈其族多頼以飬公先娶林氏早卒後娶劉氏于公之卒林巳葬今用劉氏合葬焉子三人越石秦州觀察判官子建仁傑皆舉進士女二人長嫁進士林度次嫁項城主簿宋适孫三人之翰彦暉彦卿將以某日葬公真州揚子縣某鄉某原謹状公之行事將求世之有道者銘之謹狀荆公作誌廣陵集巻二十九
