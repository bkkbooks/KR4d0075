body:
  text: 廣陵集卷二十六宋王令撰上葛閎都官丁酉知郡都官閣下士之無所用於世久矣閣下乃愛之何耶以其卑陬曲拳樂其為恭耶進俯退傴樂其為容耶將與之考正道德使承下風耶士固有辱身以為恭媚世以為容縟文而薄質假其華以鬻其實是皆欺冀之道而閭巷之士與市井之人相與修之而日陳於前以為衒侮爾是豈君子之宜蓄哉異日士有主閣下之門以歸者皆忠信倜儻自信之士固有以身為是恥天下以為非雖於利祿爵賞在前一不得於已則去之一作逃而去之山林而不顧其自重如此則肯以非其道而見閣下耶於是乎閣下之賢於世逺矣蓋士之主於人而能以道德自直一作重者此皆當世之人所難有士惡夫不然而不肯從者此也而有能之者宜乎士之主閣下以歸也前日令忘其不肖於閣下之容與雅有一日之幸異時聞其緒餘嘗為閣下道之一日閣下聞而未之見且將疑其是非又其去閣下之門非有道里之難致而其身不至於前則左右有以為不恭者此則令所懼也輒敢以書通焉不宣令再拜與知縣令聞古之君子雖居富貴貧賤之間其勢則異矣及至進退出處則其道一也然則富貴貧賤之勢既異而進退出處則一者何也必有道而云也然古之為士苟時之不遇雖萬鍾之祿非其義則不往也非其道則不取也苟有所遇雖尺寸祿亦可以進而仕也然皆有以存心而然也心之存者亦有常矣然則何謂常也謂舉措不失其道而然也苟得志而處王公之位居卿相之聯而其勢可謂尊且大也然有賢未嘗不欲見之也苟未得志退而處草萊之下亦未嘗以道自屈之也退而尊德樂道必待時而用也然苟在上者樂育多士而急於下賢而何嘗不往而從之也哉蓋時有遇而然也是皆古之君子進退出處之有道矣而令竊嘗仰其盛德而願學之矣恭惟知縣贊善抱明誠之資懷聖賢之道勳烈之傳亦有日矣凡居之邦雖困迫窮處之士小有異能則何嘗不蒙被餘澤哉而令獨敢以古人之道進於門下亦不忽矣惟執事不以狂狷而不教之則不勝幸矣不宣令再拜與主簿令嘗惑今之世士者無志而官者無求無志故不知其有貴也無求故不知其可貴也不知其有貴者賤其身不知其可貴者賊其身賤其身者求於人之謂也賊其身者自取之謂也故一失於不自高一失於自高不自高者非也失於自高者亦非也令嘗惑而悲之且又喜自得也間而思天下富貴不能淫貧賤不能移者果誰耶幸而有之信夫可以賀不幸而不見之其又如恨何伏惟閣下屈主縣簿三年矣邑之士者日造焉退而皆自得也令固賤世之士者雖不敢仰疑盛德猶懼而未進也今而決自來期不辱而有得也孔子曰居是邦也事其大夫之賢者友其士之仁者則愚何敢廢哉惟富貴不能淫貧賤不能移將有所得而又願親之焉不宣令再拜答劉公著微之書令再拜辱詩大見稱奬反覆讀之而益慙置而評之如斯言為當世盛德者發而不在令然夫聖人之學賢有道者之事業此固不可假人以悅惟盛德者宜當之而令亦不悅也惜乎足下不留以副敢當者而妄以况令假令得此名而悅乃淺小人曷足以辱足下交使令得名而不敢悅則適資之恐且懼耳何足以賜令也此所以反覆而益慙者也夫德名者天之尊爵也今夫人爵人之求者猶研精苦思捫隙發罅以窺求門户雖所學固不中節然張巧射中之心不為不勤矣然猶有老身長子而不之得者况天之尊爵豈易干哉學者乃思不一心而學不竭力耳其名而苦所行慨然自謂得之而已足忽然人謂之而不愧吾亦見求之甚妄而得之亦淺也令雖不肖又敢自陷於此耶則若令者何敢當足下云耶雖然嘗聞足下自序矣日病無賢師友而妄學章句烏識聖人之道者此又見足下自枉過甚也然令亦有一説試願陳之所謂儒者非謂踽踽涼涼者也謂其蹈道而得德耳蹈道故行已以義得德故足中而不外求行已以義則於富貴不妄足中而不外求則終貧賤而不羞惟二者然後能守道能守道然後能治人治人者無他正巳以待天下耳故古之君子者以此夫今之士不學章句也亦有以古之國有學遂有序黨有庠家有孰者所以養材也夫人生各有材自非上聖者不待教則就其下者須養以成故為之師為之保者教六經六行而巳及其成也則曰賢德行之下者曰藝禮樂射御書數而巳及其成也曰能能者能此而巳則所謂賢者固巳有差殊焉以是知古之聖人教人之有道也如此故曰德成而上藝成而下藝且猶下之况成而不名藝者耶今夫章句之學非徒不足以養材而又善害人之材今夫窮心劇力茫然日雕刻為事而不暇外顧者其成何哉初豈無適道學古之材固為章句之敗耳自章句之興學者日馳以爭入其為言皆鑽鑿破碎又有尺寸物色之限終其業猶忽九牛而計其毛假能舉其皮而忽其一犍猶未得能名嗚呼亦巳勞哉夫古之為衣服器械禮樂名物之用大要不過適時便人爾自夫三代之君各有損益非固為異也亦沿時而制作爾假後世有賢聖者作計未必盡取此其間亦各有取舍又况足班班盡心耶古之人未有聖如孔子孟子者也若畢戰問井地孟子曰嘗聞其略哀公問舜冠孔子忽而不對使蒂芥區區可名為學則二聖人者可忽而不言耶然則今之名數事物之學何足稱君子之門也自章句之學興天下之學者忘所宜學而進身甚速忘所宜學則無聞知進身甚速則謀道之日淺甚者不知誦經讀書何以名學徒曰求入以仕夫學者仕比之市人市夫市者所以通貨財也人之有貨財則有適市之心如無貨財徒能疾走以入市於道謂何哉今之仕者何以異於是夫高位重祿學者之市也道德利澤學者之貨財也有行道施德與民利澤之心然後求位與祿可也今夫章句而進者何異於無貨財而徒疾走者哉雖適市於道何也故士之不學章句者以如此終不得已必待此而後進以仕則始徐徐先謀道而後思進亦未晚也令之所聞如此其自待亦以此足下謂之何也如聞從楊學又將守此以賀不宣令再拜留孫莘老教授書始者先生盛賜令以臨之今而乃久矣而蒙惠猶若也惟視不明視之有不精聽不聰聽之有不詳心之冥頑而窒塞不通以自庶幾雖然亦嘗試之矣進而私得先生之儀悔前之夷退而復企先生之躅忘力之不足雖然先生亦巳勞矣通其來不閉而開而招使之歸曲而教旁疏而逺導不責其無近效口諄諄而氣怡心下接而色垂扳鉗枿牙障杜徑岐父無子憂兄不弟係交名雜贄拜列第次論歸取先後至無地危冠長纓溢出户外雖然令等亦樂矣昕而興默息以聽儲神會精開聖人之經朝而議暮而執所事洗目去穢識先生之禮方圖久而庶乎曾謂先生絶令之忽然也雖然令等先狀諸襟刻剝無所取益如畜舊鼠纍過千百不足取用祇益有損然先生既惠於厥初幸賴終賜之何勝拳拳仰慕之至不宣令再拜納孫莘老教授拜書夫愚不可為甚矣愚而可為幾希而不夷夷不可為也是愚不可為也然所以謂愚者無知也愚而無知雖夷猶可愚惟其有知而不為以自夷則愚之有罪者焉雖然令何知夫六經之學聖人之事業皆所以仰望於先生也令亦何所知始者先生既甚惠不鄙夷而以教日益以所聞此諸生未知獲幸之何由也然從事之日巳久而禮不立無上下之分而雜以相抗非惟不安於心又左右顧以畏人然先生亦何惜不以安諸生也令方兒時固嘗學事人巳知恭嚴禮貌之不可失於人也又况於所師哉今而既學矣反悵然無所下豈有能於童子而不能於成人欲行之於鄉人而忽於盛德此非令之所知也伏惟先生念之夫師道之不見於世久矣願先生少有以示之令所幸也諸生之所望也不宣令再拜慰崔伯易疏令再拜恭弔於伯易足下伏聞不幸以至大故伏惟伯易天崩地潰何以為容心摧腹裂何以為哀坐作起居几案一作杖牆户顧猶昔然而親巳矣何以為思雖然命有適然理有終巳而丈人奄及上壽則伯易之養固有長日矣勉思人子為後之義無至毁滅謹奉慰何勝哀慘伯易其自重令再拜講罷謝卲牧不疑書令嘗聞春秋之學約而暢隱而不沒事皆繫聖人之取舍進退非誠通聖心而志在事變者不可與也後儒沾沾各以意近有不自得弗肯恬巳以意實猜誣巳自聖鑿孔納柄非有條枝務自名家不恤非是則聖人之言暴君汙臣有不討誅聖人之後援類比近一作引比無所證驗以傳合經疑是而非適為二三無足表暴令嘗學之三年而未能也嘗思得通實之士而見之今也既自幸又推思其從來則閣下有以賜之何敢不拜有如窮逹之分貴賤上下之等進皆有拜伏承事之禮是皆僕僕事人之道而令方有所學力不足使令令不敢辱執事亦不敢拜以是伏惟閣下加亮焉不宣令再拜謝卲牧伏承學士明公哀令之窮特有餽贐感愧之素何能巳巳雖然令之所學有不安者一作有所不安輒敢以辭夫士之不敢望於貴有位也舊矣雖得萬鍾之多不願易並日而食雖得執圭之貴顧不如鋤犁棘荆豈惟志不願哉是其有命而中亦有以自足者令每讀其書思見其人顧巳之反乎是者汗出滿背左右顧人以慙非曰能必然亦願有所學也又嘗聞古之君子周之則受賜之不敢拜然閣下必以為周令已有餘而無或不足賜不敢拜閣下必以為賜則士之不敢當有前聞矣何獨今而疑之人固各有志令方志在貧賤願閣下憐其有志全之而不強假為無志則閣下之門亦無所用之不勝皇恐之至不宣令再拜又謝卲牧重承來貺益加愧懼然士之不能自守久矣一不從於朋友猶且懼之况當路富貴之門喜怒禍福所自出哉以閣下之門而容有自守之士顧不美耶以令賤窮而能有不顧之勢所獲多矣輒敢再拜以聞不宣令再拜寄孫莘老書令啓近不聞問巳嘗上狀並鄙詩今應在道也得來教伏承起居萬福近所苦者何事於此絶不聞願一示及所喻介甫甚悉於此疑者固亦多略類此是亦何所疑哉彼教之不改而後誅之固善也以今之世上下代易如朝暮之客耳乃欲以古之成法責之恐非知變者之論也夫聖人之於刑豈樂輕用耶惟過與不知者宥之耳至於後世民之飢寒而刑其為盜不教而責其孝悌故曾子謂如得其情則哀矜而勿喜者此耳論者以謂吏之以賄敗者過邪不知邪以祿食民而為此尚亦哀矜之耶法令之著天下甚矣此屬豈不盡曉耶於此教之而不斥於他尚有斥之者乎必有斥之者於此爭先後耳於他無他者是留以禍天下也夫以位在人上而有盜賊之行尚何以在人上乎不可在人上廢之而不用宜矣論者既牽於古説不察其輕重為此紛紛耳餘須面請不宣令再拜廣陵集卷二十六
