body:
  text: 廣陵集卷二十三宋王令撰潤州逰山記之潤而東順江而下六十里而後至其山名􅂒一作圌昔余居淮南嘗以事至其下而望之則其東皆平去􅂒而西逆江而上五十里而逺始有山三其二合為海門一為焦焦山世傳漢之隱者焦光居之今其旁猶有傳為其後者世以其故名焉江之源出於西南其流至是蓋萬里自金山而分分而復合故其流湍而善覆舟之經者皆逆刺而順下山之道南出人之遊者入於北以至寺其花則櫻其石則崖其樹薄木而厚竹余嘗至其上以望江海之交下求晋將軍王羲之銘而觀之蓋嘗終日焉直焦而南其山石翁去其西六里而逺曰花山又其西三里而近曰甘露二山皆有寺而甘露清輝閣為最佳余嘗至考其往古遺蹟以問狠石之何是其傳曰漢末吳蜀二主之所逰也其地皆岡其東而益盤其城為鐡甕别西折於江其山蒜其下河北距於江以泝金山自余之喜逰上下淮江之間七年之中凡九至其上下憩於頭陀朝陽之巗去而每思之直金山而南其山扁其東之山龍堂其西之山白虎又其西之山蓋不知其幾百十里而後絶其所望而見者若長山若五州若青山若髙麗若覆舟自白虎而南别為阿益卑為阜其附為城其裔為岡屬於山凡十數里山皆石土雜無竹樹其石鑱而轉於城中載而入旁地可為梁可砥柱可捍旁江岸可為道中轍所用既博則取者無日不至其草可爨其下多牧故其山貧獨招隱為最富昔其地戴顒之所居也山負南而抱北寺偏其左去寺而西道數百步而分自南而東得泉二虎跑鹿跑井二煉丹自西而北有庵曰披雲庵之南軒一無四字山之最佳處也其地敏竹其樹宜松其果多梅李桃杏梨栗其他尚衆而雜密不可紀識忽焉視之如髮其西之山盤為虎窟其泉出於真珠步其東而上有泉曰一人下更十數山而至鶴林鶴林蓋竹林也傳云晋末髙祖方微時嘗卧其下自以見黃鶴為祥至其後改之其語應然其東皆岡阜斷輒復續以與鐡甕交潤之地倚江其城亦倚山而為固自漢唐之亂方天下之分時潤常當戰衝其禍久結而不改世傳其民為甚苦方其平時伐山刋林下浮於江海其他黿魚茭蕨萑葦薪炭以擅其饒食用既足棄其餘於旁近至猶得其贏資又因其山水之勝歲時之間憑髙以臨逺思去者以望來皆生遊其間而死葬其下其民顧亦獨樂也州之南北通河江故其俗輕有舟於其歲時都人士女之出無馬俗不用車舁其逰皆委蛇皇暇故於山泉之微木石之細遇有過異輒得傳一州以為觀宜其事物載於民間者多也令既自視無所用於天下去而逃之民間日偷其衣食之閒以軼於事緒一本作物之外忽焉樂而忘疲也間而思天下之盛時君臣相與之際士有出於其時者皆心經萬事之煩日覽天下之㑹身任四海之重乃至有九年於外三過其門而不入其有所思夜以繼日幸而得之則坐以待旦所謂煩勞用其力於天下乃如此於其休閒則其人蓋已貴富非其一作有賔客在前則詔相居右施身於拜跪揖讓之間舊本作是苟目之所及手之所指則左右爭走操執以從事金石絲竹羅而合比於前一作後前干戚羽籥列而舞布於左右雖終其身何暇一日之及山水之間哉假有樂之者又其時土斷壤絶分裂以為國非有天下之事王者之命身不能輒過其下况又得嵗月樂於其間哉自其下君臣相得之日少士之生於其時遇非其道者稍稍引而去之入於山林與木石居與鹿豕逰不願世之賔客儐價也私居燕閒妻子趨坐以相給不願世之左右趨走也泉流鳥啼風薄木以成聲不願世之歌舞也其於朝廷廟社之間非身有其役亦不為之至也斯士者皆士之得所樂於中致其身于進退晋接之次物外之可樂蓋其得失之如此豫讀詩至于考槃而後知士之得已而可巳也彼浴乎沂風乎舞雩詠而歸蓋聖人嘗以曾㸃之言為然又從而嘆之孔子亦嘗曰隱居以求其志未見其人也自孔子孟子沒非有合道而進以其不合而去者也以豫考之要其終不與聖人悖者蓋稀方其去時若真有合一作挾待世之必合而後為者間亦時君世主招之使言一作進得道其欲為於天下而其言多齬繆豫竊惑之然不知於山林果何以也及豫去所事縱身於山水之間以為甚樂而後知彼蓋亦有所惑者也夫隱非求志慕山林以長往與進非其道樂芻豢稻粱而不能去者其事雖殊然為失則一也是皆為玩物之士書曰玩物喪志然則隱者之於此固有以求其志而亦可以喪其志也傳曰苟非其人道不虛行夫隱也其亦固有是哉過唐論隋文帝收前世之弊開南北之礙兼通而無纍矣當時亦謂能久且傳而無窮及其勢去日迫亡不及議而天下巳起而爭逮唐公面睍一顧而天下之士相視以起故李密舉東都薛舉陷扶風竇建德役西河宇文化及據魏王世充汙洛陽李子通瀦江都皆樹兵南面而其他蜂起之師蜋抗之盜所在自名以並一作爭起而不可勝數逺而數年近則數月爭斧析以分天下一跌立失據則水火以相滅及太宗文皇帝戈指筆奮四面以呼而天下震傾以歸雖有長兵深城一作長城深池皆草折卵脆一作碎隨向以壞然猶馬不輟鞍士不替甲者數嵗而天下略平更因餘勇以外事四夷故東舉遼海西蹶髙昌北平突厥其餘氊裘之君鴂舌之長皆心一作氣奪色赤一作失面內而望驚爭祈胭頓角一作首奴入以事朝威德包覆四夷無事矣貞觀初君臣諧熙政事修舉年榖屢登民衆繁息各安無事刑用以稀雖王功未成而稱頌之臣已先一作先言太平矣而房喬杜如晦初猶用有為及其才窮術殫更迎君以入無為以謂堯舜適然爾嗚呼其亦可道哉一作可惜哉然愚嘗謂後世有思貞觀而不得見者喬如晦適能為功後世有思三代而不得見者則喬如晦亦未能無罪也逮髙宗中睿之世其亦一作益無足道而中間武氏女子乃坐以唐周運席上一作以唐為周作運席上則當時用人得材之何如可知矣及開元之間亦號為平而世所指以名世者如姚崇宋璟輩爾是其材知簿書成要之為務刑名聚斂之為職聼弊决斷之為官是之為常俗能耳非有公天下之志追合古先之謀度長計逺之思身相時君手運天下而不能知有為歲久日積賞罰既行矣而不能進退賢不肖當是之時君智不加明朝廷不加修天下之方一作多聞廣一作博識之士不加進左右便嬖幸佞之人不加損民之貧富不知限兵農不知一此同守天下而幸安者爾庸知為相哉及其身死之日肉未及寒而小人滿朝天下浸老矣而明皇帝自若也及范陽之人狼顧一呼而久安之民股慓而不及遁向者倚忠伏用之臣爭狐一作孤爭兔走以失區區西奔求為旅人以自保而不必一作可得視向之荒樂怠傲其得失如之何哉天下方未難一日時假人有試言其必然則明皇亦肯動心而留聼耶然祿山以庸奴之材踐拔起之勢聚險膚臺豎之謀一朝而倒行然猶所攻無前所壓破壞流毒被天下而唐以積世之資貞觀開元之惠天時美豐盛盈之餘府庫藏積奇贏之材扶義以起有如靈武而左右宣力效忠之臣有如郭子儀李光弼守堅挫鋭之士有如張巡許逺逆知隂料之師偹預之智有如顔真卿加以民思唐未厭之心然猶所在鳥驚以散魚爛不收者三年而僅得以誅則為天下計者可不知懼耶殺太子建成論或問文皇帝殺太子建成得為義乎使聖人者如何為處令應之曰是焉得為義也吾聞置天下而兄弟讓者有矣尚未得為聖人也又况以天下而殺其兄者乎聖人處之則讓也讓而不獲死奈何曰是亦命之云爾也然則周公有罪耶曰周公何罪哉天下固成王天下也周公事成王者也周公東征可不行乎及其誅之也人固謂周公我實謂有司也周公不無念哉或猶未之喻譬之曰今人有轉移為人執事者間而主家有盜焉主怒而盜之禦也乃執事是呼不幸而盜乃執事者兄也則行之否乎曰行矣執事念其兄者而不殺之而同行者殺之則執事者猶有罪耶曰無矣然則周公獨何罪哉文皇之於周公又異也曰湯放桀武王伐紂然乎曰然也然則為民耶曰為民也謂其為民而殺君可乎曰桀行不君矣為民而殺之惡乎不可曰建成亦有罪奈何曰君之有天下之尊者以其能君也今而不君矣可不去之耶故曰為民而去之義也兄之有弟之尊者親也親可絶耶况又建成之罪不逮古之取放伐者也抑使桀且紂為其弟者尚不忍於殺而身代之也曰文皇為民則奈何曰是猶一人負販而有千金之家其家又百數十口也而其兄惟奢淫是思日散金數十其家相為謀而饑變是懼因惡其兄而喜其弟焉曰安得弟而家是為也其弟率然曰是不難刃其兄而斃之乃弟泣曰兄非不念也吾為一家爾也然則何異哉或者猶不喻又曰自三代而下數百年間而有文皇奈何又訾之曰以貞觀言之吾故有取焉如附建成而言之是猶惜千金之子曰幸而彼有家奈何復責殺兄也吾見其戾矣今之言太子建成者曰將脅髙祖而為不利吾固疑其加之也設或不為然然則魏徴王圭文皇尚忍用耶廣陵集卷二十三
