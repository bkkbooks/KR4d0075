body:
  text: 廣陵集卷十宋王令撰答友人幽蘭生深林不佩亦自臭天馬苟伏皂駑足日加驟蘭生喻人學不為仕乃究馬伏侔自怠一失遂永後以今曷為言念子不可逗前我初識子愛其肌骨秀又觀所為詩往往擅髙右逮熟相與言低俯如有就我樂成美者遽以古一本作鄙詩叩上言髙雄張中雜富貴鬬且將起其貪固一本作因欲激其懋尚謂非重邀猶恐信不厚揮汗謝為書戴雨去自奏豫始喜此讀若獲弦逐彀如何答我詩遽此與前謬我始得則謝實若答雉一本作雄嗅大凡欲有為當决如蝠狖苟進又安一本作欲退何自鼠穴首吾見人自荒未有一本作見耕不收設或堅决為加以勤自副石將為溜穿曲亦因纍揉大可入聖域中能踐賢囿借使不及然一本作此猶足聞見富中吾不可止在我固無疚已迷不自復懼子遂著陋著一本作䝉聼之無豫違斯言將不又道士王元之以詩為贈多見哀勉因以古詩為答利劍不刺鼠大釣不聯鮞天昏白日沉劍决浮雲披地蕩海水搖釣引九鯨縻固其用不常安得易用為當其未效間是亦鉛與鈹吾非小丈夫胸中少翹竒少年嗜勇黠跨壓百雄低兩眼皆豚羊一腹千熊羆使氣睨羣輩問今當我誰四海有守兵謂豫皆恥之左手將醢戎右手期鋤夷書足記姓名劍亦棄不治平聲一本作持不願當世是不羞羣曹嗤曰富貴在我又何有年時塊視勒山功芥拾封侯龜一日忽自悟吾豈䖍强兒舊聞有六經條一本作修理兩可師無不至聖人有學中自隳勿遂謂不及吾由一本作猶未嘗追好勇不好道吾將自誅非浩乎如有失茫乎其若思望乎如未獲專乎如有期夜或不記寢晝或忘其飢不以懦自卻不以庸自卑樹而不可拔山而不可移拒之不使雜磨之不容疵孰為古之聖孰為今之推孰逺不可到孰髙不可訾置易攻其難力險肆自夷上自太古先岐軒而望羲下至三代來堯舜禹湯姬周公汲汲勞仲尼皇皇疲軻况比踵游雄愈磨肩馳或示我使嚮或導我使隨或鑿我未開或完我已虧或退而我引或墜而我提或輔而我夾或顛而我支或砭我贅疣或膏我瘡痍浴我抆我垢醖我釀我離計昔以較今誤是而恨迷固知於聖賢實辱再造私道逺致力多功大收效遲今而所存者一本作有財一毛於皮苟曰成不成我有罪未知如夫用不用敢繫天為辭若寒餒貧賤此於我何居若誇毁譽訾此其如豫奚王君異學者見我加嗟咨叙其念惜心一本作情投以弔勉詩語愛則然爾燭理似或遺輒自訟由來强答非所宜客杭思李常伯滿粹翁及衡夫子權因寄此始豫既迂疏城郭非所樂聞吳富山水思往頗計較脫身東南來見實與聞效吳之山稜稜吳水清不撓豈無適之徑以可泳以棹而獨何為然反門自間一本作閉罩念我西北州數子吳莫一本作甚較正心醇無醨粹行瑩不皰遞言張聖賢賡口唱弟孝大非友宜當實可師而效我愚不敢望時以管覘一本作窺豹進如暗赴明退必醜厭貌自恥以别白疾匝天地趠坐思朝成癡夢遇夜不覺山水雖素喜實不如誨教嗚呼何時歸作詩以自閙夜坐破忩多穿風冷燭無定焰滴瀝隨衣淚反覆到心念趨生迷夷塗失城陷深塹病拙未為療膏肓不容砭無家可容歸有竈亦斷掭鳬短鶴脛長飲啄兩自贍天有不可問何獨於我缺吾觀序卦辭否乃適泰漸而余何為者獨此不見驗譬如白為緇一造遂永染久生人所羡我獨處之厭安得蓋棺去手足同一斂寄姊夫焦韞叔兼簡三姊風舟挽晴江載客日夜行身逺心在家腹腸何由平未知所到期先計還歸程時尋别時語涕淚下縱橫仰觀風中雲下視水上萍共在天地間可無同飄零瀉此樽中酒美魚其飲羮雖飽不厭飢强醉終自醒笑言雖在逺音問猶有一本作有可形願因東南風時寄西北聲采選示王聖美葛子明酒盞一本作清樽厭連行衆客喧巳醉忽得一本作指簿上籍共出名外仕孤昂忽雄軒泯默亦馴致追爭相後先得失自愚智隨時有能稱逐釁得呵訾有非人力為竟亦一本適與天幸值或果以禍覆亦有終自遂卒無及物效徒自髙人氣回樽變新局忽若巳異世嗟人久巳迷髙爵樂自嗜誰為衎衎飽竟是一本作逐孜孜利矜驕决一本作快雄奢摧折嘆淹滯昏昏忘所大擾擾爭其細安知茫昧間身非天所戲是非未暇辨歡戚先巳至退之昔裁詩頗以豪橫恃暮年志氣得金玊多自慰買居紀堂一本作廂榮顧影樂簪佩喜將閭巷好持與妻子議彼哉何足道進退於焉繫安知九列榮顧是德所纍寧論聖人為適莫固以義有時曲肱樂不以易富貴吾曹頗勉修兹道久自詣何必問浮雲斯理固可視古興颭颭樹頭葉翻翻水中浮暮潮通長河載入江海流顛倒濕就溺紛淪來不休行人坐成嘆風惡久藏舟中秋望月月形何完完秋靜氣彌放玉輪困瑕纇投擲去天仗前無衡軛施憑誰挽能上回旋天地周馳騁固一本作信巳壯古今磨不磷剛耿固可諒豫欲假之游自投上窮亢東折扶桑枝一本作株西塞昧谷曠天機與回斡日馭縱休暢苟留揚輝中無復顛一本作傾側悵是謀敢吾專行矣天一本作期帝訪傳聞天路艱蹉蹶一本作跌就淪喪帝居深九閽有謁未易傍鬼神喜陰暗陳列忌忠亮進知自致艱退使斯謀妄回頭暮堂上一本作中螢爝光相望病起聞說貪山頗有泉石遂不能遊一病百志墮起逢秋物䦨力弱未勝行厭聞客言山言山多在逺雖近尚莫攀拏深吾無舟逐陸誰借鞍不如無所聞收心就恬安南軒頗扶疏古木髙四觀不知秋葉疏但怪朝影斑羸軀便偃側籍有藁與莞仰攀孤雲高卧見飛鳥還苟此且自適何能謀所艱一本作奚能謀所艱衆鳥鴉鴉枝上鳴欲下飛復屢忽投羣輩先以我棄肉去羣鳥起爭攫既失反親慕餓鴟盤且一本作礴下欲奪進復懼羣鵲一本作鶴來何軒軒聚噪如罵怒鳩鴿恨不逮回旋自號呼庭雀審細微知非已能預跳梁暮堂下不舍稗粒顧贈周伯玉下第京塵漠無聊客書聞報罷拔身衆人後載水千里下微裝困無餘歸馬劇連跨邈無失時嘆抗舉與俗謝但言廢文學從今益休暇一本作閒暇詩書得窮搜一作搜尋朋友可邀迓如解萬里駿脫去銜一本作衡軛駕雖時念親貧歎息忽自咤已如嬰兒啼心在聲不嗄悲樂于一本作與俗異使我喜失詫吾聞百年生暫就天地舍中間有逢遇窮逹何足訝譬之適時運寒暑變冬夏炎凉忽焉殊裘葛代相藉於身亦何預時與外物借嘗聞莊生言中不怛外化逢雞就知時遇彈因求炙况持身售人五羖豈真價士材嫌易知女好固擇一本作女好惜輕嫁勉之時我過酒賤衣可貰送僧自總吾病不喜語客來但寒暄頰舌且不能况事文字間彼總乃吾舊不見今三年一日踏我門告我將南遷問之行所止其去何由緣言方學從師惜以日月閒將求佛所宗就乞世未傳浮舟江海波蹀屣山嶽顛行方極所到未可一本作異歲月還謂余昔同遊當得一本作得相送以言噫佛與吾學兩分不相全今余與子遇無異東西轅共憩中道間邂逅相留連我駕志在逺子驅良亦遄吾終不爾從爾終不回旋兩各劇所勤相逺日益懸又出所為文要我加量銓熒熒掇其英曄曄粲滿編惜哉不經師如珠莫鑽穿雖有可寶資終以無用捐吾觀古人書蓋亦不但然道德藹於中口實助使宣豈有拔其根而望華可搴不知源所來何用其流沿人材苟不長得一且可專六經衆子文其治自足觀身當聖人時來學浩萬千獨顔才庶幾他固未可肩人有老於行不聞可逃天子何不從此去就異說攣弗思自解縱又欲引世纒常觀已論徒恥出妻子前彼髠以為羞爾以為欣歡生棄父母養舊本作生而棄父母士得執以鞭彼為則遇刑爾還自稱賢羞惡所不存爾說尚何先豫欲收子身解去子所牽浴以清冷波佩以蘭與荃相從中道驅障塞異道一本作道所偏愛之幸其聼不聼誠可憐雜詩關雎后之淑棫朴君之明兔罝尚好德况乃公與卿所以彼行葦敦然遂其生誰能絃此歌為我發古聲召公方伯尊材亦聖人亞農時憚煩民聼訟小棠下嗟今千里長巳恥問耕稼彈琴髙堂上欲以無為化廣陵集卷十
