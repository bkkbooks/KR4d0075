body:
  text: 廣陵集卷十七宋王令撰詩慵衣冠慵整鬢慵梳萬事從來靜有餘却笑嵇康慵未得區區猶作絶交書金山寺萬頃清江浸碧山乾坤都向此中寬樓臺影落魚龍駭鐘磬聲來水石寒日暮海門飛白鳥潮回瓜步見黃灘當時戶外風波惡祗得髙僧靜處看登甘露寺閣忽忽勞生歲月催時偷髙跡出浮埃風沾草樹江朝動春入川源緑夜回欲出壯懷臨八極可無樽酒到髙臺江山不與人相語似待忘言野客來讀西漢漢得孤秦萬弊時當年丞相要無為洛陽年少空流涕誰謂書生果有知讀東漢漢鼎重炎逆血熬當時天子亦勤勞不能乘作唐虞計未㑹嚴陵所謂髙讀商君傳利害從來識所存固難輕重與人論趙良不自身為客剛欲都君使灌園書孔融傳戲撥虎鬚求不嚙何如縮手袖中歸虛云坐上客常滿許下惟聞哭習脂武侯三顧雖然志意一本作計深出非由道此一本作處何心平時一本胸腹能多少且一本作只與羣兒梁父吟叔孫通弟子從來學未純異時得失一本作失得亦頻頻一官所買知一本作曾多少便議先生作聖人韓吏部宣尼夾谷叱強齊吏部深州破賊圍始信真儒能見用可為邦國大皇威讀老杜詩集氣吞風雅妙無倫碌碌當年不見珍自是古賢因發憤非關詩道可窮人鐫鑱物象三千首照耀乾坤四百春寂寞有名身後事惟餘孤塜耒江濵讀白樂天集北邙山下一孤墳流落三千綺麗文後世聲名髙白日當年榮利等浮雲屏除憂憤歸禪寂消遣光隂在酒醺若使篇章深李杜竹符還不到君分過伍子胥廟西風騷客倦逰吳弔古心懷此暫舒鬼籙久應除佞嚭民思今果廟神胥雖然邪正皆歸死奈有忠讒各異書回首舊江江水在怒濤猶是不平初泰伯廟古廟鬱崔嵬朱門傃道開今人不為讓間或乞靈來和人古劒安知歲月幾經今傳記汗漫不可尋得自廢墟埋萬古失曾飛將購千金客思秋水龍泉冷士嘆中原虎穴深好與壯夫同隱約鐡房寒澀壁塵侵琴古風寥落欲何尋常記南風素意深聞說五絃絃不斷欲于何處借人琴不獨區區操縵間要期追逐古風還吾民有愠何當解學得南風不敢彈謝張和仲惠寶雲茶故人有意真憐我靈荈封題寄蓽門與療文園消渴病還招楚客獨醒魂烹來似帶吳雲腳摘處應無穀雨痕果肯同嘗竹林下寒泉應有惠山存先有詩云寶雲更許同嘗否擬待重烹第二泉故有是句和人孤雁朔磧雲深憶舊行心驚漢月忽騫翔江南水濶無天地漠北沙寒有雪霜逺目送飛沉暮靄西風吹影過斜陽衡南未到歸何日須信張羅近稻粱雁萬里長為客飛飛豈自由情知稻粱急莫近網羅求關塞風髙夜江湖水落秋哀鳴徒自切誰謂爾悲愁送雁來時羣雁去相隨病眼看天逺不知為有客愁歸未得獨憑斜日望多時遲遲南國無春雪細細東風滿栁枝蝴蝶黃鶯有期約好加歸翥莫令遲鴉鳴庭前佳樹緑隂成樹抄飛鴉去就輕自顧主人無敗德豈嫌爾口有凶聲平生直道常多禍兩耳清風一聽鳴輒莫為人輕自重須知彈射易忘生馴鹿日日野心新籠欄外強馴祗消指馬相便有逐原人昔起歌賓興今無伏囿仁豺狼好牙爪應笑角如麟和人放魚春溪水暖緑蒲沉兩兩逰鱗躍紫金必以直鈎應不得果知非命亦何心舟吞逺海鯨鯢老餌滿平湖網罟深縱爾豈知吾有意渭川人去事難尋和人促織秋蟲何爾亦匆匆何處人心與爾同夢枕幾年懸客淚曉窗殘月破西風人思絶漠氷霜早婦嘆窮閻杼柚空更有孤砧共岑寂平明華髮滿青銅問促織衰草風來響不一本作自知破窗燈滅月藏輝白頭老婦無機織卧一本作坐聽鄰兒懶打衣苦熱土燥木根焦禽窮自拔毛龍遺赤日走天避火雲髙虎懼千山熾鯨憂四海熬風微不飽腹蟬亦為身號和束䝉初九日不見菊登髙從來秋菊不曾栽敢向西風怨不開我自傷秋有髙興非關特為菊花來簾髙明庭宇好崇基枉把踈簾窣地垂必欲滿堂隂有樂誰能暗室自無欺卷舒未必風無意開隙須防燕解窺莫道人終可遮障可終遮障亦何為詆燕金屋人嬌奈燕何暮簾好捲放來過今年已見燕無數何况明年燕更多燕答春日樓臺暖氣低東風無主一本作著自東西尋常一本作人家簾幕有多少何處畫梁無燕泥觀飲不飲雖然合衆難何妨衆客自盤桓巳看手足互顛倒更聽人人自謂歡答耿奎浮生飄泊委蓬蒿洴澼無封耿嘆勞心學古人方有愧身從衰俗忽為髙苟慚枉駕干簞食肯謂非時愛一毛末學從兹益知守善人不鄙與華裒江上浩渺烟波不可名我來間自濯塵纓久思滄海收身去安得長舟破浪行天濶水雲連黯淡日間鷗鷺自飛鳴屈平死後漁人盡後世憑誰論濁清洗竹去年春笋密相扶洗去心圖翠色踈髙節欲令人盡見枉枝何惜手親除臨川常可持為釣待鳳猶能飽有餘須看月明風徑夜寒聲薄影滿茅居春夢湘水茫茫春意關岑郎一睡片時間誰知行盡江南路枕上離家枕上還秋日偶成呈杜子長顯之兼簡仲美劉丈丈夫不合自窮愁藜藿先須天下憂君不唐虞皆我罪民推溝壑更誰尤須將兼濟為吾事若只誠身亦我羞滿紙古人皆有道如其所學願軻邱歲暮言懷呈諸友萬事無成只一吁窮年况復嘆窮途功名未立頭先白貧病相仍氣尚粗富貴早知皆有命窮通料是不由吾㑹須開口隨時笑一曲長歌醉倒壺日益無聊賴偶成呈子長一夕西風葉下柯羈人憔悴發沉疴窮來無子知難得命薄于人可奈何困卧牛衣空有泪劇彈鐡劍不成歌陶家壁冷塵埃滿何日雲雷起鐡梭醉後醉裡分明别是天最宜沉溺過流年平時政要全稽古盛世朝廷不乏賢但得有生皆自遂不妨吾屬亦陶然沉湘死屈如何者却把醒名欲自専梅花曉枝開早未多稠屢嗅清香不忍收萬木巳知春盡到百花常負後來羞東風也合相和暖臘雪無端欲滯留滿眼蕭踈正堪惜莫將橫笛起人愁木瓜花簇簇紅葩開緑荄陽和間暇不須催天教爾艷呈竒絶不與夭桃次第開蔬蘭曉折寒蔬野圃間荒林深處有芳蘭世無賢士紉為佩猶有幽人日取餐廣陵集卷十七
